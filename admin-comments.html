<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoNoGo SA – Review Moderation</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main" id="admin-content" style="display:none">
    <div class="admin-header">
      <div>
        <h1 class="admin-title">Review Moderation</h1>
        <p class="text-sm text-secondary">Review, approve, and manage user-submitted reviews</p>
      </div>
    </div>

    <div class="kpi-grid" style="margin-bottom:var(--space-6)" id="comment-kpis">
      <div class="kpi-card"><div class="kpi-label">Loading...</div></div>
    </div>

    <div class="table-wrapper">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <select id="brand-filter" style="width:auto;max-width:180px" onchange="filterComments()">
            <option value="">All Brands</option>
          </select>
          <select id="status-filter" style="width:auto;max-width:150px" onchange="filterComments()">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <span class="text-xs text-muted" id="comment-count"></span>
      </div>
      <div id="comments-list" style="padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)"></div>
    </div>

    <div style="padding:var(--space-6) 0;text-align:center">
      <p class="text-xs text-muted">&copy; 2026 GoNoGo South Africa</p>
    </div>
  </main>
</div>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="components.js"></script>
  <script src="api.js"></script>


<script>
  document.getElementById('sidebar-container').innerHTML = Components.renderAdminSidebar('comments');
  if (Components.checkAdminAuth()) initAdminPage();

  var allComments = [];

  async function initAdminPage() {
    document.getElementById('admin-content').style.display = '';
    try {
      var reviews = await GoNoGoAPI.getAllReviews();
      allComments = reviews.map(function (r) {
        return {
          id: r.id,
          author: r.reviewername || r.ReviewerName || 'Anonymous',
          text: r.reviewtext || r.ReviewText || '',
          verdict: r.verdict || '',
          date: r.createdat || '',
          brandName: r.brandname || r.BrandName || '',
          category: r.category || '',
          branch: r.branch || '',
          status: r.status || r.Status || 'pending'
        };
      });
    } catch (e) {
      console.error('Failed to load reviews:', e);
      allComments = [];
    }

    // Populate brand filter
    var brandFilter = document.getElementById('brand-filter');
    var seen = {};
    allComments.forEach(function (c) {
      if (!seen[c.brandName] && c.brandName) {
        seen[c.brandName] = true;
        brandFilter.innerHTML += '<option value="' + c.brandName + '">' + c.brandName + '</option>';
      }
    });

    updateKPIs();
    filterComments();
  }

  function updateKPIs() {
    var total = allComments.length;
    var pending = allComments.filter(function(c){return c.status==='pending'}).length;
    var approved = allComments.filter(function(c){return c.status==='approved'}).length;
    var rejected = allComments.filter(function(c){return c.status==='rejected'}).length;
    document.getElementById('comment-kpis').innerHTML =
      '<div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value">'+total+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:'+(pending>0?'var(--orange-text)':'var(--green-text)')+'">'+pending+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Approved</div><div class="kpi-value" style="color:var(--green-text)">'+approved+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Rejected</div><div class="kpi-value" style="color:'+(rejected>0?'var(--red-text)':'var(--green-text)')+'">'+rejected+'</div></div>';
  }

  function filterComments() {
    var bf = document.getElementById('brand-filter').value;
    var sf = document.getElementById('status-filter').value;
    var filtered = allComments.filter(function (c) {
      return (!bf || c.brandName === bf) && (!sf || c.status === sf);
    });
    // Pending first
    filtered.sort(function(a,b){
      if(a.status==='pending'&&b.status!=='pending')return -1;
      if(b.status==='pending'&&a.status!=='pending')return 1;
      return 0;
    });
    document.getElementById('comment-count').textContent = filtered.length + ' reviews';
    renderComments(filtered);
  }

  function renderComments(data) {
    var container = document.getElementById('comments-list');
    if (!data.length) {
      container.innerHTML = '<div style="text-align:center;padding:var(--space-10)"><i class="fa-solid fa-comments" style="font-size:var(--text-2xl);color:var(--text-faint);display:block;margin-bottom:var(--space-3)"></i><p class="text-sm text-muted">No reviews match your filters.</p></div>';
      return;
    }
    container.innerHTML = data.map(function (c) {
      var border = c.status==='pending' ? 'border-color:var(--orange-dim)' : c.status==='rejected' ? 'border-color:var(--red-dim)' : '';
      var badge = c.status==='approved' ? 'freshness-fresh' : c.status==='pending' ? 'freshness-stale' : 'freshness-outdated';
      var actions = '';
      if (c.status === 'pending') {
        actions =
          '<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-dim)" onclick="moderateComment(\''+c.id+'\',\'approved\')"><i class="fa-solid fa-check"></i> Approve</button>'+
          '<button class="btn btn-sm" style="background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-dim)" onclick="moderateComment(\''+c.id+'\',\'rejected\')"><i class="fa-solid fa-xmark"></i> Reject</button>';
      } else if (c.status === 'approved') {
        actions =
          '<button class="btn btn-ghost btn-sm" onclick="moderateComment(\''+c.id+'\',\'rejected\')"><i class="fa-solid fa-xmark"></i> Reject</button>'+
          '<button class="btn btn-ghost btn-sm" onclick="moderateComment(\''+c.id+'\',\'pending\')"><i class="fa-solid fa-clock"></i> Reset</button>';
      } else {
        actions =
          '<button class="btn btn-ghost btn-sm" onclick="moderateComment(\''+c.id+'\',\'approved\')"><i class="fa-solid fa-check"></i> Approve</button>'+
          '<button class="btn btn-ghost btn-sm" onclick="moderateComment(\''+c.id+'\',\'pending\')"><i class="fa-solid fa-clock"></i> Reset</button>';
      }
      return '<div class="comment-card" style="'+border+'">'+
        '<div class="comment-header">'+
          '<div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap">'+
            '<span class="comment-author">'+c.author+'</span>'+
            (c.branch ? '<span class="text-xs text-muted"><i class="fa-solid fa-location-dot" style="font-size:10px"></i> '+c.branch+'</span>' : '')+
            (c.verdict==='GO' ? '<span style="color:var(--green-text);font-size:var(--text-xs);font-weight:600"><i class="fa-solid fa-circle-check"></i> Go</span>' : c.verdict==='NOGO' ? '<span style="color:var(--red-text,#e74c3c);font-size:var(--text-xs);font-weight:600"><i class="fa-solid fa-circle-xmark"></i> No Go</span>' : '') +
            '<span class="text-xs text-muted">on <strong>'+c.brandName+'</strong></span>'+
            '<span class="text-xs text-muted">'+c.category+'</span>'+
            '<span class="freshness-badge '+badge+'">'+c.status+'</span>'+
          '</div>'+
          '<span class="comment-date">'+c.date+'</span>'+
        '</div>'+
        '<div class="comment-text">'+c.text+'</div>'+
        '<div style="display:flex;gap:var(--space-2);margin-top:var(--space-3)">'+actions+'</div>'+
      '</div>';
    }).join('');
  }

  async function moderateComment(reviewId, newStatus) {
    try {
      await GoNoGoAPI.moderateReview(reviewId, newStatus, 'admin');
      Components.showToast('Review ' + newStatus + ' successfully!', 'success');
      await initAdminPage();
    } catch (e) {
      Components.showToast('Error: ' + e.message, 'error');
    }
  }
</script>
</body>
</html>
