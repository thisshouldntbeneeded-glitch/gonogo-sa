<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoNoGo SA - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="nav"></header>

  <main>
    <section id="hero">
      <h1>GoNoGo SA</h1>
      <p>Compare South African brands at a glance.</p>
    </section>

    <section id="stats-section">
      <div id="stats-cards"></div>
      <canvas id="stats-chart" width="400" height="200"></canvas>
    </section>

    <section id="top-brands-section">
      <h2>Top brands</h2>
      <div id="top-brands-grid"></div>
    </section>

    <section id="categories-section">
      <h2>Categories</h2>
      <div id="categories-grid"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components.js"></script>
  <script src="api-v2.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav('home');
    document.getElementById('footer').innerHTML = Components.renderFooter();

    function renderStats() {
      GoNoGoAPI.getStats().then(function (stats) {
        var container = document.getElementById('stats-cards');
        container.innerHTML = Components.renderStatsCards(stats);

        var ctx = document.getElementById('stats-chart').getContext('2d');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Categories', 'Brands', 'Avg score'],
            datasets: [{
              label: 'Overview',
              data: [stats.totalCategories, stats.totalBrands, stats.averageScore],
              backgroundColor: ['#2563eb', '#16a34a', '#f97316']
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }).catch(function (err) {
        console.error('Stats error', err);
      });
    }

    function renderTopBrands() {
      GoNoGoAPI.getTopBrands(6).then(function (brands) {
        var container = document.getElementById('top-brands-grid');
        container.innerHTML = brands.map(Components.renderBrandCard).join('');
      }).catch(function (err) {
        console.error('Top brands error', err);
      });
    }

    function renderCategories() {
      GoNoGoAPI.getCategoriesWithBrands().then(function (cats) {
        var container = document.getElementById('categories-grid');
        container.innerHTML = cats.map(Components.renderCategoryCard).join('');
      }).catch(function (err) {
        console.error('Categories error', err);
      });
    }

    (function initHome() {
      renderStats();
      renderTopBrands();
      renderCategories();
    })();
  </script>
</body>
</html>
