<!DOCTYPE html>
<html lang="en-ZA">
<head>

  <meta name="generator" content="Perplexity Computer">
  <meta name="author" content="Perplexity Computer">
  <meta property="og:see_also" content="https://www.perplexity.ai/computer">
  <link rel="author" href="https://www.perplexity.ai/computer">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand — GoNoGo South Africa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="nav"></div>
  <div id="page-content">
    <div style="text-align:center;padding:var(--space-10);color:var(--text-muted)">Loading brand...</div>
  </div>
  <div id="footer"></div>

  <!-- Data + helpers -->
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Components -->
  <script src="components.js"></script>

  <!-- API client -->
  <script src="api.js"></script>

  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav('');
    document.getElementById('footer').innerHTML = Components.renderFooter();

    var brandId = Components.getParam('id');

    (async function initBrandPage() {
      if (!brandId) {
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container" style="text-align:center">' +
            '<h1 class="section-title">Brand Not Found</h1>' +
            '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The brand you are looking for does not exist.</p>' +
            '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
          '</div></section>';
        return;
      }

      var brand = await GoNoGoAPI.getBrandById(brandId);

      if (!brand) {
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container" style="text-align:center">' +
            '<h1 class="section-title">Brand Not Found</h1>' +
            '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The brand you are looking for does not exist.</p>' +
            '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
          '</div></section>';
        return;
      }

      document.title = brand.name + ' — GoNoGo South Africa';

      var categorySlug = brand.categorySlug || brand.category_slug || '';
      var categoryName = brand.categoryName || brand.category || '';
      var logoHTML = Components.renderLogo(brand, 'brand-logo brand-logo-lg');

      // Category score cards (only if categoryScores present)
      var categoryCardsHTML = '';
      if (brand.categoryScores) {
        categoryCardsHTML = Object.entries(brand.categoryScores).map(function(entry) {
          var name = entry[0], data = entry[1];
          var pct = data.max ? Math.round((data.score / data.max) * 100) : 0;
          var color = Components.getScoreColor(pct);

          var desc = '';
          if (typeof BRAND_DATA !== 'undefined') {
            BRAND_DATA.forEach(function(cat) {
              (cat.brands || []).forEach(function(b) {
                if (b.id === brand.id && b.framework_breakdown) {
                  var item = b.framework_breakdown.find(function(fb) { return fb.category === name; });
                  if (item) desc = item.description;
                }
              });
            });
          }

          return '<div class="category-card">' +
            '<div class="category-card-header">' +
              '<span class="category-card-name">' + name + '</span>' +
              '<span class="category-card-score" style="color:' + color + '">' + data.score + '/' + data.max + '</span>' +
            '</div>' +
            Components.renderScoreBar(data.score, data.max) +
            (desc ? '<p class="category-card-desc">' + desc + '</p>' : '') +
          '</div>';
        }).join('');
      }

      var strengthsHTML = (brand.keyStrengths || brand.strengths || []).map(function(s) {
        return '<li><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> ' + s + '</li>';
      }).join('');
      var concernsHTML = (brand.keyConcerns || brand.weaknesses || []).map(function(c) {
        return '<li><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> ' + c + '</li>';
      }).join('');

      // Robust pricing handling
      var pricingArray = [];
      if (Array.isArray(brand.pricing)) {
        pricingArray = brand.pricing;
      } else if (brand.pricing && typeof brand.pricing === 'string') {
        pricingArray = [{ name: 'Standard', cost: brand.pricing, features: [] }];
      }

      var pricingHTML = pricingArray.length > 0
        ? pricingArray.map(function(p) {
            var features = typeof p.features === 'string' && p.features
              ? p.features.split(',').map(function(f) { return f.trim(); }).filter(Boolean)
              : (Array.isArray(p.features) ? p.features : []);
            return '<div class="pricing-card">' +
              '<div class="pricing-card-name">' + (p.name || 'Standard') + '</div>' +
              '<div class="pricing-card-price">' + (p.cost || 'Contact for pricing') + '</div>' +
              (features.length > 0
                ? '<ul class="pricing-card-features">' + features.map(function(f) { return '<li>' + f + '</li>'; }).join('') + '</ul>'
                : '') +
            '</div>';
          }).join('')
        : '<p style="color:var(--text-muted);font-size:var(--text-sm)">No pricing information available.</p>';

      // App ratings
      var gpRating = brand.googlePlayRating || (brand.appRatings && brand.appRatings.googlePlay) || 'N/A';
      var iosRating = brand.iosRating || (brand.appRatings && brand.appRatings.ios) || 'N/A';
      var gpScore = parseFloat(gpRating.split('/')[0]) || 0;
      var iosScore = parseFloat(iosRating.split('/')[0]) || 0;
      var gpStars = renderStars(gpScore);
      var iosStars = renderStars(iosScore);

      // Social sentiment
      var sentiment = brand.socialSentiment || {};
      var posThemes = (sentiment.positive_themes || brand.socialPositive || []).map(function(t) {
        return '<li><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> ' + t + '</li>';
      }).join('');
      var negThemes = (sentiment.common_concerns || brand.socialConcerns || []).map(function(t) {
        return '<li><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> ' + t + '</li>';
      }).join('');

      var categoryIcon = 'fa-tags';
      if (typeof BRAND_DATA !== 'undefined') {
        BRAND_DATA.forEach(function(cat) {
          if (cat.slug === categorySlug) categoryIcon = cat.icon || 'fa-tags';
        });
      }

      var overviewHTML = brand.overview ? (
        '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-3)">Brand overview</h3>' +
        '<p style="font-size:var(--text-sm);color:var(--text-secondary);white-space:pre-line;">' + brand.overview + '</p>'
      ) : '';

      var ratingSummaryHTML = brand.ratingSummary ? (
        '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-3);margin-top:var(--space-6)">Why this rating</h3>' +
        '<p style="font-size:var(--text-sm);color:var(--text-secondary);white-space:pre-line;">' + brand.ratingSummary + '</p>'
      ) : '';

      document.getElementById('page-content').innerHTML =
        '<!-- Brand Hero -->' +
        '<section class="brand-hero"><div class="container">' +
          '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)">' +
            '<a href="category.html?cat=' + categorySlug + '" style="color:var(--text-muted);font-size:var(--text-sm)">' +
              '<i class="fa-solid fa-arrow-left"></i> ' + categoryName +
            '</a>' +
          '</div>' +
          '<div class="brand-hero-inner">' +
            '<div class="brand-hero-score">' + Components.renderScoreCircle(brand.overallScore, 'lg') + '</div>' +
            '<div class="brand-hero-info">' +
              '<div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-2)">' +
                logoHTML +
                '<h1 class="brand-hero-name">' + brand.name + '</h1>' +
              '</div>' +
              '<div class="brand-hero-badges">' +
                Components.renderVerdictBadge(brand.verdict) +
                Components.renderScoreBadge(brand.overallScore) +
                '<span class="badge" style="background:var(--surface-3);color:var(--text-secondary);border:1px solid var(--border-primary)">' +
                  '<i class="fa-solid ' + categoryIcon + '"></i> ' + categoryName +
                '</span>' +
              '</div>' +
              '<div style="display:flex;gap:var(--space-3);margin-top:var(--space-4);flex-wrap:wrap">' +
                '<a href="compare.html?brands=' + brand.id + '" class="btn btn-secondary btn-sm"><i class="fa-solid fa-code-compare"></i> Compare</a>' +
                (brand.website ? '<a href="' + brand.website + '" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-up-right-from-square"></i> Website</a>' : '') +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div></section>' +

        '<!-- Tabs -->' +
        '<section class="section-sm"><div class="container">' +
          '<div class="tabs" id="tabs">' +
            '<button class="tab active" data-tab="overview" onclick="switchTab(\'overview\')">Overview</button>' +
            '<button class="tab" data-tab="pricing" onclick="switchTab(\'pricing\')">Pricing</button>' +
            '<button class="tab" data-tab="ratings" onclick="switchTab(\'ratings\')">Ratings</button>' +
            '<button class="tab" data-tab="reviews" onclick="switchTab(\'reviews\')">Reviews</button>' +
          '</div>' +

          '<!-- Overview Tab -->' +
          '<div class="tab-content" id="tab-overview">' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-8)">' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Score breakdown</h3>' +
                '<div style="height:280px;position:relative"><canvas id="brand-radar"></canvas></div>' +
              '</div>' +
              '<div>' +
                overviewHTML +
                ratingSummaryHTML +
                (brand.lastUpdated ? '<p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-4)">Last updated: ' + brand.lastUpdated + '</p>' : '') +
              '</div>' +
            '</div>' +
            (categoryCardsHTML
  ? '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2)">Category scores</h3>' +
    '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">' +
      'Each score shows this brand’s performance out of the maximum for that category in our framework.' +
    '</p>' +
    '<div class="category-grid" style="margin-bottom:var(--space-8)">' + categoryCardsHTML + '</div>'
  : '') +
            '<div class="sc-grid">' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)"><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> Strengths</h3>' +
                '<ul class="sc-list">' + (strengthsHTML || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)"><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> Concerns</h3>' +
                '<ul class="sc-list">' + (concernsHTML || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<!-- Pricing Tab -->' +
          '<div class="tab-content" id="tab-pricing" style="display:none">' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Pricing plans</h3>' +
            '<div class="pricing-grid">' + pricingHTML + '</div>' +
          '</div>' +

          '<!-- Ratings Tab -->' +
          '<div class="tab-content" id="tab-ratings" style="display:none">' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">App ratings</h3>' +
            '<div class="ratings-grid" style="margin-bottom:var(--space-8)">' +
              '<div class="rating-card">' +
                '<div class="rating-card-platform"><i class="fa-brands fa-google-play"></i> Google Play</div>' +
                '<div class="rating-card-score">' + gpRating + '</div>' +
                '<div class="star-rating">' + gpStars + '</div>' +
              '</div>' +
              '<div class="rating-card">' +
                '<div class="rating-card-platform"><i class="fa-brands fa-apple"></i> iOS App Store</div>' +
                '<div class="rating-card-score">' + iosRating + '</div>' +
                '<div class="star-rating">' + iosStars + '</div>' +
              '</div>' +
            '</div>' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Social sentiment</h3>' +
            (sentiment.summary ? '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">' + sentiment.summary + '</p>' : '') +
            '<div class="sc-grid">' +
              '<div>' +
                '<h4 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);color:var(--green-text)"><i class="fa-solid fa-thumbs-up"></i> Positive themes</h4>' +
                '<ul class="sc-list">' + (posThemes || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
              '<div>' +
                '<h4 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);color:var(--orange-text)"><i class="fa-solid fa-thumbs-down"></i> Common concerns</h4>' +
                '<ul class="sc-list">' + (negThemes || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<!-- Reviews Tab -->' +
          '<div class="tab-content" id="tab-reviews" style="display:none">' +
            '<div id="review-list" style="margin-bottom:var(--space-6)"></div>' +
            '<div class="card" style="max-width:600px">' +
              '<h4 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Leave a review</h4>' +
              '<div class="form-group">' +
                '<label class="form-label">Your name</label>' +
                '<input type="text" id="review-name" placeholder="Enter your name">' +
              '</div>' +
              '<div class="form-group">' +
                '<label class="form-label">Your review</label>' +
                '<textarea id="review-text" placeholder="Share your experience with ' + brand.name + '..." rows="4"></textarea>' +
              '</div>' +
              '<button class="btn btn-primary" onclick="submitReview()">' +
                '<i class="fa-solid fa-paper-plane"></i> Submit review' +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div></section>';

      // Radar chart
      Components.createRadarChart('brand-radar', brand, { showTicks: true, labelSize: 11, pointRadius: 4 });

      // Tab switching
      window.switchTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(function(el) { el.style.display = 'none'; });
        document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
      };

      // Reviews – static for now
      async function loadReviews() {
        if (!GoNoGoAPI.getReviews) {
          var list = document.getElementById('review-list');
          list.innerHTML =
            '<div style="text-align:center;padding:var(--space-10) 0;margin-bottom:var(--space-4)">' +
              '<i class="fa-solid fa-comments" style="font-size:var(--text-3xl);color:var(--text-faint);margin-bottom:var(--space-4);display:block"></i>' +
              '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2)">No reviews yet</h3>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary)">Be the first to leave a review for ' + brand.name + '.</p>' +
            '</div>';
          return;
        }

        var reviews = await GoNoGoAPI.getReviews(brand.name, categorySlug);
        var list = document.getElementById('review-list');
        if (!reviews || !reviews.length) {
          list.innerHTML =
            '<div style="text-align:center;padding:var(--space-10) 0;margin-bottom:var(--space-4)">' +
              '<i class="fa-solid fa-comments" style="font-size:var(--text-3xl);color:var(--text-faint);margin-bottom:var(--space-4);display:block"></i>' +
              '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2)">No reviews yet</h3>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary)">Be the first to leave a review for ' + brand.name + '.</p>' +
            '</div>';
          return;
        }
        list.innerHTML = '<h4 style="font-size:var(--text-sm);font-weight:600;color:var(--text-secondary);margin-bottom:var(--space-3)">' + reviews.length + ' user review' + (reviews.length !== 1 ? 's' : '') + '</h4>' +
          reviews.map(function(r) {
            return '<div class="comment-card">' +
              '<div class="comment-header">' +
                '<span class="comment-author">' + r.reviewer_name + '</span>' +
                '<span class="comment-date">' + r.created_at + '</span>' +
              '</div>' +
              '<div class="comment-text">' + r.review_text + '</div>' +
            '</div>';
          }).join('');
      }

      window.submitReview = async function() {
        var name = document.getElementById('review-name').value.trim();
        var text = document.getElementById('review-text').value.trim();
        if (!name || !text) {
          Components.showToast('Please fill in both fields', 'error');
          return;
        }
        if (!GoNoGoAPI.isLive || !GoNoGoAPI.isLive()) {
          Components.showToast('Reviews require the live GoNoGo platform. This static version is read-only.', 'error');
          return;
        }
        try {
          await GoNoGoAPI.submitReview({
            category: categorySlug,
            brand_name: brand.name,
            reviewer_name: name,
            scores: {},
            review_text: text
          });
          document.getElementById('review-name').value = '';
          document.getElementById('review-text').value = '';
          Components.showToast('Review submitted — thank you!');
          await loadReviews();
        } catch (e) {
          Components.showToast('Error submitting review. Please try again.', 'error');
          console.error('Review submission error:', e);
        }
      };

      await loadReviews();
    })();

    function renderStars(score) {
      var val = parseFloat(score) || 0;
      var full = Math.floor(val);
      var half = val - full >= 0.3;
      var html = '';
      for (var i = 1; i <= 5; i++) {
        if (i <= full) html += '<i class="fa-solid fa-star active"></i>';
        else if (i === full + 1 && half) html += '<i class="fa-solid fa-star-half-stroke active"></i>';
        else html += '<i class="fa-regular fa-star"></i>';
      }
      return html;
    }
  </script>

  <style>
    @media (max-width: 768px) {
      #tab-overview > div:first-child {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</body>
</html>
