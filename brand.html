<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoNoGo SA - Brand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="nav"></header>

  <main>
    <section id="brand-header"></section>

    <section id="brand-metrics">
      <div id="brand-score"></div>
      <div id="brand-details"></div>
    </section>

    <section id="brand-review-section">
      <h2>Customer reviews</h2>
      <p>Reviews are coming soon. For now, scores are based on GoNoGo research only.</p>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="components.js"></script>
  <script src="api-v2.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav();
    document.getElementById('footer').innerHTML = Components.renderFooter();

    function getBrandId() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      return id ? parseInt(id, 10) : NaN;
    }

    function initBrand() {
      var id = getBrandId();
      if (!id) {
        document.getElementById('brand-header').innerHTML = '<h1>Brand not found</h1>';
        return;
      }

      GoNoGoAPI.getBrandById(id).then(function (brand) {
        if (!brand) {
          document.getElementById('brand-header').innerHTML = '<h1>Brand not found</h1>';
          return;
        }

        document.getElementById('brand-header').innerHTML = Components.renderBrandHeader(brand);
        document.getElementById('brand-score').innerHTML = Components.renderBrandScore(brand);
        document.getElementById('brand-details').innerHTML = Components.renderBrandDetails(brand);
      }).catch(function (err) {
        console.error('Brand error', err);
      });
    }

    initBrand();
  </script>
</body>
</html>
