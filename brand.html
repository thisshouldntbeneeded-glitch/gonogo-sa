<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Detail — GoNoGo South Africa</title>
  <meta name="description" content="Detailed brand analysis and scoring breakdown">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="nav"></div>

  <!-- Brand Hero -->
  <section class="brand-header" id="brand-header" style="padding:var(--space-12) 0">
    <div style="text-align:center;padding:var(--space-8);color:var(--text-muted)">Loading brand...</div>
  </section>

  <!-- Quick Stats -->
  <section class="section" style="background:var(--surface-1);padding:var(--space-6) 0">
    <div class="container">
      <div id="quick-stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--space-4)"></div>
    </div>
  </section>

  <!-- Main Content Grid -->
  <section class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:var(--space-8)">
        
        <!-- Left Column: Detailed Scores -->
        <div>
          <h2 class="section-title">Detailed Score Breakdown</h2>
          <div id="detailed-scores" style="margin-bottom:var(--space-8)"></div>

          <h2 class="section-title">Social Sentiment</h2>
          <div id="social-sentiment" style="margin-bottom:var(--space-8)"></div>

          <h2 class="section-title">Customer Reviews</h2>
          <div id="customer-reviews"></div>
        </div>

        <!-- Right Column: Summary Info -->
        <div>
          <div class="info-card">
            <h3 style="margin-bottom:var(--space-4)"><i class="fa-solid fa-star"></i> Key Features</h3>
            <div id="key-features"></div>
          </div>

          <div class="info-card" style="margin-top:var(--space-4)">
            <h3 style="margin-bottom:var(--space-4)"><i class="fa-solid fa-coins"></i> Pricing</h3>
            <div id="pricing"></div>
          </div>

          <div class="info-card" style="margin-top:var(--space-4)">
            <h3 style="margin-bottom:var(--space-4)"><i class="fa-solid fa-thumbs-up"></i> Strengths</h3>
            <div id="key-strengths"></div>
          </div>

          <div class="info-card" style="margin-top:var(--space-4)">
            <h3 style="margin-bottom:var(--space-4)"><i class="fa-solid fa-triangle-exclamation"></i> Concerns</h3>
            <div id="key-concerns"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <!-- CRITICAL: Data files MUST load first -->
  <script src="data/data_partA1a.js"></script>
  <script src="data/data_partA1b.js"></script>
  <script src="data/data_partA1.js"></script>
  <script src="data/data_partA2.js"></script>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB1.js"></script>
  <script src="data/data_partB2a.js"></script>
  <script src="data/data_partB2b.js"></script>
  <script src="data/data_partB2.js"></script>
  <script src="data/data_partB3.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC1a.js"></script>
  <script src="data/data_partC1b.js"></script>
  <script src="data/data_partC1.js"></script>
  <script src="data/data_partC2.js"></script>
  <script src="data/data_partC3a.js"></script>
  <script src="data/data_partC3b.js"></script>
  <script src="data/data_partC3.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD1.js"></script>
  <script src="data/data_partD2.js"></script>
  <script src="data/data_partD3.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  
  <!-- Chart.js for radar charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Components (static helpers) MUST come after data, before API -->
  <script src="components.js"></script>
  
  <!-- API client MUST come last -->
  <script src="api.js"></script>
  
  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav('');
    document.getElementById('footer').innerHTML = Components.renderFooter();

    (async function() {
      var brandId = Components.getParam('id');
      if (!brandId) {
        document.getElementById('brand-header').innerHTML = '<div class="container"><p style="text-align:center;color:var(--text-muted)">No brand selected</p></div>';
        return;
      }

      var brand = await GoNoGoAPI.getBrandById(brandId);
      if (!brand) {
        document.getElementById('brand-header').innerHTML = '<div class="container"><p style="text-align:center;color:var(--text-muted)">Brand not found</p></div>';
        return;
      }

      // === BRAND HEADER ===
      document.getElementById('brand-header').innerHTML = `
        <div class="container">
          <div style="text-align:center;max-width:800px;margin:0 auto">
            ${Components.renderLogo(brand, 'brand-logo brand-logo-lg')}
            <h1 style="font-size:var(--text-4xl);margin:var(--space-4) 0">${brand.name}</h1>
            <div style="display:flex;gap:var(--space-3);align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:var(--space-6)">
              ${Components.renderVerdictBadge(brand.verdict)}
              ${Components.renderScoreBadge(brand.overallScore)}
              <a href="category.html?cat=${brand.category_slug}" class="badge badge-secondary">
                <i class="fa-solid fa-tags"></i> ${brand.categoryName}
              </a>
            </div>
            ${brand.website ? '<a href="' + brand.website + '" target="_blank" rel="noopener" class="btn btn-primary"><i class="fa-solid fa-external-link"></i> Visit Website</a>' : ''}
            <div style="margin-top:var(--space-8);max-width:500px;margin-left:auto;margin-right:auto">
              <canvas id="brand-radar"></canvas>
            </div>
          </div>
        </div>
      `;

      Components.createRadarChart('brand-radar', brand, { showTicks: true, labelSize: 11 });

      // === QUICK STATS ===
      var statsHtml = `
        <div class="stat-card">
          <div class="stat-label">Overall Score</div>
          <div class="stat-value" style="color:${getScoreColor(brand.overallScore)}">${brand.overallScore}/100</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Verdict</div>
          <div class="stat-value">${brand.verdict}</div>
        </div>
      `;
      if (brand.appRatings) {
        statsHtml += `
          <div class="stat-card">
            <div class="stat-label"><i class="fa-brands fa-google-play"></i> Google Play</div>
            <div class="stat-value">${brand.appRatings.googlePlay}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label"><i class="fa-brands fa-apple"></i> iOS</div>
            <div class="stat-value">${brand.appRatings.ios}</div>
          </div>
        `;
      }
      if (brand.lastUpdated) {
        statsHtml += `
          <div class="stat-card">
            <div class="stat-label">Last Updated</div>
            <div class="stat-value" style="font-size:var(--text-sm)">${brand.lastUpdated}</div>
          </div>
        `;
      }
      document.getElementById('quick-stats').innerHTML = statsHtml;

      // === DETAILED SCORES (from raw framework_breakdown) ===
      var detailedHtml = '';
      if (brand.categoryScores && Object.keys(brand.categoryScores).length > 0) {
        // Try to get descriptions from the original raw data
        var rawBrand = null;
        BRAND_DATA.forEach(function(cat) {
          (cat.brands || []).forEach(function(b) {
            if (b.name === brand.name) rawBrand = b;
          });
        });

        Object.keys(brand.categoryScores).forEach(function(cat) {
          var cs = brand.categoryScores[cat];
          var pct = Math.round((cs.score / cs.max) * 100);
          var desc = '';
          
          // Find description from framework_breakdown
          if (rawBrand && rawBrand.framework_breakdown) {
            var item = rawBrand.framework_breakdown.find(function(fb) { return fb.category === cat; });
            if (item) desc = item.description;
          }

          detailedHtml += `
            <div class="score-detail-card">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
                <h3 style="font-size:var(--text-lg);font-weight:600">${cat}</h3>
                <span style="font-size:var(--text-xl);font-weight:700;color:${getScoreColor(pct)}">${cs.score}/${cs.max}</span>
              </div>
              ${Components.renderScoreBar(cs.score, cs.max)}
              ${desc ? '<p style="margin-top:var(--space-3);color:var(--text-secondary);font-size:var(--text-sm)">' + desc + '</p>' : ''}
            </div>
          `;
        });
      }
      document.getElementById('detailed-scores').innerHTML = detailedHtml || '<p class="text-muted">No detailed scores available</p>';

      // === SOCIAL SENTIMENT ===
      var sentimentHtml = '';
      if (brand.socialSentiment && brand.socialSentiment.summary) {
        sentimentHtml = '<div class="sentiment-card">';
        sentimentHtml += '<p style="font-size:var(--text-base);margin-bottom:var(--space-4)">' + brand.socialSentiment.summary + '</p>';
        
        if (brand.socialSentiment.positive_themes && brand.socialSentiment.positive_themes.length > 0) {
          sentimentHtml += '<div style="margin-bottom:var(--space-3)"><strong style="color:var(--green)"><i class="fa-solid fa-thumbs-up"></i> Positive Themes:</strong><ul class="bullet-list" style="margin-top:var(--space-2)">';
          brand.socialSentiment.positive_themes.forEach(function(theme) {
            sentimentHtml += '<li>' + theme + '</li>';
          });
          sentimentHtml += '</ul></div>';
        }

        if (brand.socialSentiment.common_concerns && brand.socialSentiment.common_concerns.length > 0) {
          sentimentHtml += '<div><strong style="color:var(--orange)"><i class="fa-solid fa-triangle-exclamation"></i> Common Concerns:</strong><ul class="bullet-list" style="margin-top:var(--space-2)">';
          brand.socialSentiment.common_concerns.forEach(function(concern) {
            sentimentHtml += '<li>' + concern + '</li>';
          });
          sentimentHtml += '</ul></div>';
        }

        sentimentHtml += '</div>';
      } else {
        sentimentHtml = '<p class="text-muted">No social sentiment data available</p>';
      }
      document.getElementById('social-sentiment').innerHTML = sentimentHtml;

      // === CUSTOMER REVIEWS (placeholder for now) ===
      document.getElementById('customer-reviews').innerHTML = `
        <div class="review-placeholder">
          <p class="text-muted">User reviews are currently managed offline and synced from Google Sheets.</p>
          <button class="btn btn-secondary" onclick="alert('Review submission requires the live backend.')">
            <i class="fa-solid fa-comment"></i> Leave a Review
          </button>
        </div>
      `;

      // === KEY FEATURES ===
      if (brand.keyFeatures && brand.keyFeatures.length > 0) {
        var featuresHtml = '<ul class="bullet-list">';
        brand.keyFeatures.forEach(function(feat) {
          featuresHtml += '<li><i class="fa-solid fa-check" style="color:var(--green)"></i> ' + feat + '</li>';
        });
        featuresHtml += '</ul>';
        document.getElementById('key-features').innerHTML = featuresHtml;
      } else {
        document.getElementById('key-features').innerHTML = '<p class="text-muted text-sm">No features listed</p>';
      }

      // === PRICING ===
      if (brand.pricing && brand.pricing.length > 0) {
        var pricingHtml = '';
        brand.pricing.forEach(function(tier) {
          pricingHtml += '<div style="margin-bottom:var(--space-3)">';
          pricingHtml += '<div style="font-weight:600;margin-bottom:var(--space-1)">' + (tier.name || 'Pricing') + '</div>';
          pricingHtml += '<div style="font-size:var(--text-sm);color:var(--text-secondary)">' + (tier.cost || 'Contact for pricing') + '</div>';
          if (tier.features) pricingHtml += '<div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-1)">' + tier.features + '</div>';
          pricingHtml += '</div>';
        });
        document.getElementById('pricing').innerHTML = pricingHtml;
      } else {
        document.getElementById('pricing').innerHTML = '<p class="text-muted text-sm">Pricing not available</p>';
      }

      // === STRENGTHS ===
      if (brand.keyStrengths && brand.keyStrengths.length > 0) {
        var strengthsHtml = '<ul class="bullet-list">';
        brand.keyStrengths.forEach(function(str) {
          strengthsHtml += '<li style="color:var(--green)"><i class="fa-solid fa-circle-check"></i> ' + str + '</li>';
        });
        strengthsHtml += '</ul>';
        document.getElementById('key-strengths').innerHTML = strengthsHtml;
      } else {
        document.getElementById('key-strengths').innerHTML = '<p class="text-muted text-sm">No strengths listed</p>';
      }

      // === CONCERNS ===
      if (brand.keyConcerns && brand.keyConcerns.length > 0) {
        var concernsHtml = '<ul class="bullet-list">';
        brand.keyConcerns.forEach(function(con) {
          concernsHtml += '<li style="color:var(--orange)"><i class="fa-solid fa-triangle-exclamation"></i> ' + con + '</li>';
        });
        concernsHtml += '</ul>';
        document.getElementById('key-concerns').innerHTML = concernsHtml;
      } else {
        document.getElementById('key-concerns').innerHTML = '<p class="text-muted text-sm">No concerns listed</p>';
      }
    })();
  </script>
</body>
</html>
