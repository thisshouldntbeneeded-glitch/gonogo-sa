<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Independent brand rating and reviews on GoNoGo South Africa. See the full 100-point scoring breakdown, customer reviews, strengths, concerns, and verdict.">
  <meta name="keywords" content="brand rating South Africa, brand review, GoNoGo score, company reviews, South Africa brand comparison">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
  <link rel="canonical" href="https://www.gonogo.co.za/brand">
  <meta property="og:title" content="Brand Rating & Reviews — GoNoGo South Africa">
  <meta property="og:description" content="Independent brand rating and reviews on GoNoGo South Africa. 100-point scoring breakdown, customer reviews, and verdict.">
  <meta property="og:image" content="https://www.gonogo.co.za/logos/og-share.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://www.gonogo.co.za/brand">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="GoNoGo South Africa">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Brand Rating & Reviews — GoNoGo South Africa">
  <meta name="twitter:description" content="Independent brand rating and reviews on GoNoGo South Africa. 100-point scoring breakdown, customer reviews, and verdict.">
  <meta name="twitter:image" content="https://www.gonogo.co.za/logos/og-share.jpg">
  <title>Brand Rating & Reviews — GoNoGo South Africa</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    (function() {
      var t = localStorage.getItem('gonogo_theme');
      if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light-mode');
      }
    })();
  </script>
</head>
<body>
  <div id="nav"></div>
  <div id="page-content">
    <div style="text-align:center;padding:var(--space-10);color:var(--text-muted)">Loading brand...</div>
  </div>
  <div id="footer"></div>

  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="components.js"></script>
  <script src="api.js"></script>

  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav('');
    Components.initTheme();
    Components.initPublicAuth();
    document.getElementById('footer').innerHTML = Components.renderFooter();

    var brandId = Components.getParam('id');

    (async function() {
      if (!brandId) {
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container" style="text-align:center">' +
            '<h1 class="section-title">Brand Not Found</h1>' +
            '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The brand you are looking for does not exist.</p>' +
            '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
          '</div></section>';
        return;
      }

      var brand = await GoNoGoAPI.getBrandById(brandId);

      if (!brand) {
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container" style="text-align:center">' +
            '<h1 class="section-title">Brand Not Found</h1>' +
            '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The brand you are looking for does not exist.</p>' +
            '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
          '</div></section>';
        return;
      }

      // === SEO: Dynamic meta tags optimised for brand name searches ===
      var verdictLabel = brand.verdict === 'TOP PERFORMER' ? 'Top Performer' : (brand.verdict === 'NOGO' ? 'No\u2011Go' : 'Go');
      var seoTitle = brand.name + ' Reviews & Rating (' + brand.overallScore + '/100) \u2014 GoNoGo South Africa';
      var brandUrl = 'https://www.gonogo.co.za/brand.html?id=' + encodeURIComponent(brand.id || brandId);
      var metaDesc = brand.name + ' scored ' + brand.overallScore + '/100 (' + verdictLabel + ') in ' + brand.categoryName + ' on GoNoGo. ' + (brand.overview ? brand.overview.substring(0, 120) : 'See the full 100-point breakdown, strengths, concerns, pricing, and user reviews.');

      document.title = seoTitle;

      function setMeta(attr, attrVal, content) {
        var el = document.querySelector('meta[' + attr + '="' + attrVal + '"]');
        if (!el) { el = document.createElement('meta'); el.setAttribute(attr, attrVal); document.head.appendChild(el); }
        el.content = content;
      }
      setMeta('name', 'description', metaDesc.substring(0, 160));
      setMeta('name', 'keywords', brand.name + ', ' + brand.name + ' reviews, ' + brand.name + ' rating, ' + brand.name + ' South Africa, ' + brand.categoryName + ' ratings, GoNoGo ' + brand.name);
      setMeta('property', 'og:title', seoTitle);
      setMeta('property', 'og:description', metaDesc.substring(0, 160));
      setMeta('property', 'og:type', 'article');
      setMeta('property', 'og:url', brandUrl);
      setMeta('name', 'twitter:title', seoTitle);
      setMeta('name', 'twitter:description', metaDesc.substring(0, 160));
      if (brand.logo) {
        setMeta('property', 'og:image', brand.logo);
        setMeta('name', 'twitter:image', brand.logo);
      }

      var canonicalEl = document.querySelector('link[rel="canonical"]');
      if (canonicalEl) canonicalEl.href = brandUrl;

      // === SEO: Organization + AggregateRating JSON-LD ===
      var jsonLD = {
        '@context': 'https://schema.org',
        '@type': 'Organization',
        'name': brand.name,
        'url': brand.website || brandUrl,
        'aggregateRating': {
          '@type': 'AggregateRating',
          'ratingValue': (brand.overallScore / 20).toFixed(1),
          'bestRating': 5,
          'worstRating': 1,
          'ratingCount': 1,
          'reviewCount': 1
        },
        'review': {
          '@type': 'Review',
          'author': {
            '@type': 'Organization',
            'name': 'GoNoGo Ratings and Reviews',
            'url': 'https://www.gonogo.co.za'
          },
          'reviewRating': {
            '@type': 'Rating',
            'ratingValue': (brand.overallScore / 20).toFixed(1),
            'bestRating': 5,
            'worstRating': 1
          },
          'reviewBody': brand.ratingSummary || metaDesc
        }
      };
      if (brand.logo) jsonLD.logo = brand.logo;
      if (brand.overview) jsonLD.description = brand.overview;

      var ldScript = document.createElement('script');
      ldScript.type = 'application/ld+json';
      ldScript.textContent = JSON.stringify(jsonLD);
      document.head.appendChild(ldScript);

      // === SEO: BreadcrumbList JSON-LD ===
      var breadcrumbLD = {
        '@context': 'https://schema.org',
        '@type': 'BreadcrumbList',
        'itemListElement': [
          { '@type': 'ListItem', 'position': 1, 'name': 'Home', 'item': 'https://www.gonogo.co.za/' },
          { '@type': 'ListItem', 'position': 2, 'name': brand.categoryName, 'item': 'https://www.gonogo.co.za/category.html?cat=' + brand.categorySlug },
          { '@type': 'ListItem', 'position': 3, 'name': brand.name, 'item': brandUrl }
        ]
      };
      var bcScript = document.createElement('script');
      bcScript.type = 'application/ld+json';
      bcScript.textContent = JSON.stringify(breadcrumbLD);
      document.head.appendChild(bcScript);

      var logoHTML = Components.renderLogo(brand, 'brand-logo brand-logo-hero');

      var categoryCardsHTML = Object.entries(brand.categoryScores).map(function(entry) {
        var name = entry[0], data = entry[1];
        var pct = Math.round((data.score / data.max) * 100);
        var color = getScoreColor(pct);
        return '<div class="category-card" data-category="' + name + '">' +
          '<div class="category-card-header">' +
            '<span class="category-card-name">' + name + '</span>' +
            '<span class="category-card-score" style="color:' + color + '">' + data.score + '/' + data.max + '</span>' +
          '</div>' +
          Components.renderScoreBar(data.score, data.max) +
          '<p class="category-card-desc">' + data.description + '</p>' +
          '<div class="granular-detail" style="display:none"></div>' +
        '</div>';
      }).join('');

      var strengthsHTML = brand.strengths.map(function(s) {
        return '<li><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> ' + s + '</li>';
      }).join('');

      var concernsHTML = brand.concerns.map(function(c) {
        return '<li><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> ' + c + '</li>';
      }).join('');

      var pricingHTML = (function() {
        if (!brand.pricing.length) return '<p style="color:var(--text-muted);font-size:var(--text-sm)">No pricing information available.</p>';
        var cards = [];
        brand.pricing.forEach(function(p) {
          var features = typeof p.features === 'string' && p.features
            ? p.features.split(',').map(function(f){ return f.trim(); }).filter(Boolean)
            : (Array.isArray(p.features) ? p.features : []);
          var rawCost = (p.cost||'').replace(/^Pricing:\s*/i,'').trim();
          var baseName = (p.name && p.name !== 'Pricing') ? p.name : '';
          var segments = rawCost.indexOf(' | ') !== -1 ? rawCost.split(' | ') : [rawCost];
          segments.forEach(function(seg, idx) {
            seg = seg.trim();
            if (!seg) return;
            var isText = seg.length > 25;
            var cardName = (baseName && idx === 0) ? baseName : ('Option ' + (cards.length + 1));
            var featHtml = (idx === 0 && features.length > 0)
              ? '<ul class="pricing-card-features">' + features.map(function(f){ return '<li>'+f+'</li>'; }).join('') + '</ul>'
              : '';
            cards.push('<div class="pricing-card">' +
              '<div class="pricing-card-name">' + cardName + '</div>' +
              '<div class="pricing-card-price' + (isText ? ' is-text' : '') + '">' + seg + '</div>' +
              featHtml + '</div>');
          });
        });
        return cards.join('');
      })();

      var gpStars = renderStars(brand.appRatings.googlePlayScore);
      var iosStars = renderStars(brand.appRatings.iosScore);

      var sentiment = brand.socialSentiment || {};
      var posThemes = (sentiment.positive_themes || []).map(function(t) {
        return '<li><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> ' + t + '</li>';
      }).join('');
      var negThemes = (sentiment.common_concerns || []).map(function(t) {
        return '<li><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> ' + t + '</li>';
      }).join('');

      document.getElementById('page-content').innerHTML =
        '<section class="brand-hero"><div class="container">' +
          '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-3)">' +
            '<a href="category.html?cat=' + brand.categorySlug + '" style="color:var(--text-muted);font-size:var(--text-sm)">' +
              '<i class="fa-solid fa-arrow-left"></i> ' + brand.categoryName +
            '</a>' +
          '</div>' +
          '<div class="brand-hero-inner">' +
            '<div class="brand-hero-identity">' +
              '<div class="brand-hero-logo">' + logoHTML + '</div>' +
              '<div class="brand-hero-score">' + Components.renderScoreCircle(brand.overallScore, 'hero') + '</div>' +
            '</div>' +
            '<div class="brand-hero-info">' +
              '<h1 class="brand-hero-name">' + brand.name + '</h1>' +
              '<div class="brand-hero-badges">' +
                Components.renderVerdictBadge(brand.verdict) +
                Components.renderScoreBadge(brand.overallScore) +
                '<span class="badge" style="background:var(--surface-3);color:var(--text-secondary);border:1px solid var(--border-primary)">' +
                  '<i class="fa-solid ' + brand.categoryIcon + '"></i> ' + brand.categoryName +
                '</span>' +
              '</div>' +
              (brand.lastUpdated ? '<p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-2)"><i class="fa-solid fa-clock-rotate-left" style="opacity:0.6"></i> Last updated ' + Components.formatDate(brand.lastUpdated) + '</p>' : '') +
              '<div style="display:flex;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap">' +
                '<a href="compare.html?brands=' + brand.id + '" class="btn btn-secondary btn-sm"><i class="fa-solid fa-code-compare"></i> Compare</a>' +
                (brand.website ? '<a href="' + brand.website + '" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-up-right-from-square"></i> Website</a>' : '') +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div></section>' +

        '<section class="section-sm"><div class="container">' +
          '<div class="tabs" id="tabs">' +
            '<button class="tab active" data-tab="overview" onclick="switchTab(\'overview\')">Overview</button>' +
            '<button class="tab" data-tab="pricing" onclick="switchTab(\'pricing\')">Pricing</button>' +
            '<button class="tab" data-tab="ratings" onclick="switchTab(\'ratings\')">Ratings</button>' +
          '</div>' +

          '<div class="tab-content" id="tab-overview">' +
            (brand.overview || brand.ratingSummary
              ? '<div class="card" style="margin-bottom:var(--space-6);padding:var(--space-5)">' +
                  (brand.overview
                    ? '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-3)">Brand Overview</h3>' +
                      '<p style="font-size:var(--text-sm);color:var(--text-secondary);line-height:1.7">' + brand.overview + '</p>'
                    : '') +
                  (brand.ratingSummary
                    ? '<h3 style="font-size:var(--text-lg);font-weight:700;margin:var(--space-4) 0 var(--space-3)"><i class="fa-solid fa-clipboard-check" style="color:var(--green)"></i> Rating Summary</h3>' +
                      '<p style="font-size:var(--text-sm);color:var(--text-secondary);line-height:1.7">' + brand.ratingSummary + '</p>'
                    : '') +
                '</div>'
              : '') +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-8)">' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Score Breakdown</h3>' +
                '<div style="height:280px;position:relative"><canvas id="brand-radar"></canvas></div>' +
              '</div>' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Key Features</h3>' +
                '<div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">' +
                  brand.keyFeatures.map(function(f) {
                    return '<span style="background:var(--surface-3);border:1px solid var(--border-primary);border-radius:var(--radius-full);padding:var(--space-1) var(--space-3);font-size:var(--text-xs);color:var(--text-secondary)">' + f + '</span>';
                  }).join('') +
                '</div>' +
                '<p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-4)">Last updated: ' + Components.formatDate(brand.lastUpdated) + '</p>' +
              '</div>' +
            '</div>' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Category Scores</h3>' +
            '<div class="category-grid" style="margin-bottom:var(--space-8)">' + categoryCardsHTML + '</div>' +
            '<div class="sc-grid">' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)"><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> Strengths</h3>' +
                '<ul class="sc-list">' + strengthsHTML + '</ul>' +
              '</div>' +
              '<div>' +
                '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)"><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> Concerns</h3>' +
                '<ul class="sc-list">' + concernsHTML + '</ul>' +
              '</div>' +
            '</div>' +
            '<div style="margin-top:var(--space-8);border-top:1px solid var(--border-primary);padding-top:var(--space-8)">' +
              '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)"><i class="fa-solid fa-comments" style="color:var(--green)"></i> Reviews &amp; Comments</h3>' +
              '<div id="review-summary" style="margin-bottom:var(--space-4)"></div>' +
              '<div id="review-filters" style="display:none;margin-bottom:var(--space-4);display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center">' +
                '<button class="btn btn-sm btn-ghost review-filter-btn active" data-filter="all" onclick="filterReviews(\'all\')">All</button>' +
                '<button class="btn btn-sm btn-ghost review-filter-btn" data-filter="GO" onclick="filterReviews(\'GO\')"><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> Go</button>' +
                '<button class="btn btn-sm btn-ghost review-filter-btn" data-filter="NOGO" onclick="filterReviews(\'NOGO\')"><i class="fa-solid fa-circle-xmark" style="color:var(--red,#e74c3c)"></i> No Go</button>' +
                '<span class="text-xs text-muted" id="review-filter-count" style="margin-left:auto"></span>' +
              '</div>' +
              '<div id="review-list" style="margin-bottom:var(--space-4)"></div>' +
              '<div id="review-pagination" style="text-align:center;margin-bottom:var(--space-6)"></div>' +
              '<div class="card" style="max-width:600px">' +
                '<h4 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Rate ' + brand.name + '</h4>' +
                '<p class="text-sm text-secondary" style="margin-bottom:var(--space-4)">Would you recommend this brand? Cast your vote and tell us why.</p>' +
                '<div class="form-group" id="review-name-group">' +
                  '<label class="form-label">Your Name</label>' +
                  '<input type="text" id="review-name" placeholder="Enter your name">' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label">Branch / Location <span class="text-xs text-muted">(optional)</span></label>' +
                  '<input type="text" id="review-branch" placeholder="e.g. Sandton, Cape Town CBD">' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label">Your Verdict</label>' +
                  '<div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-2)" id="verdict-buttons">' +
                    '<button type="button" class="btn btn-sm verdict-btn" id="vbtn-GO" onclick="selectVerdict(\'GO\')" style="flex:1;border:2px solid var(--border-primary);background:transparent;color:var(--text-secondary);padding:var(--space-3)">' +
                      '<i class="fa-solid fa-circle-check"></i><br><strong>Go</strong><br><span class="text-xs">I recommend</span>' +
                    '</button>' +
                    '<button type="button" class="btn btn-sm verdict-btn" id="vbtn-NOGO" onclick="selectVerdict(\'NOGO\')" style="flex:1;border:2px solid var(--border-primary);background:transparent;color:var(--text-secondary);padding:var(--space-3)">' +
                      '<i class="fa-solid fa-circle-xmark"></i><br><strong>No Go</strong><br><span class="text-xs">I don\'t recommend</span>' +
                    '</button>' +
                  '</div>' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label">Why? <span class="text-xs text-muted">(optional but helpful)</span></label>' +
                  '<textarea id="review-text" placeholder="Share your experience with ' + brand.name + '..." rows="3"></textarea>' +
                '</div>' +
                '<p class="text-sm text-muted" style="margin-bottom:var(--space-3);line-height:1.6;">' +
                  'By submitting a review, you confirm that your name and comment may be published publicly on this website. ' +
                  'Please do not include sensitive, confidential, defamatory, or third-party personal information. ' +
                  'Reviews may be moderated, refused, or removed in line with our <a href="terms.html" style="color:var(--green)">Terms &amp; Conditions</a> and <a href="privacy.html" style="color:var(--green)">Privacy Policy</a>.' +
                '</p>' +
                '<button class="btn btn-primary" onclick="submitReview()" id="submit-review-btn" disabled style="opacity:0.5">' +
                  '<i class="fa-solid fa-paper-plane"></i> Submit Review' +
                '</button>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="tab-content" id="tab-pricing" style="display:none">' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Pricing Plans</h3>' +
            '<div class="pricing-grid">' + pricingHTML + '</div>' +
          '</div>' +

          '<div class="tab-content" id="tab-ratings" style="display:none">' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">App Ratings</h3>' +
            '<div class="ratings-grid" style="margin-bottom:var(--space-8)">' +
              '<div class="rating-card">' +
                '<div class="rating-card-platform"><i class="fa-brands fa-google-play"></i> Google Play</div>' +
                '<div class="rating-card-score">' + brand.appRatings.googlePlay + '</div>' +
                '<div class="star-rating">' + gpStars + '</div>' +
              '</div>' +
              '<div class="rating-card">' +
                '<div class="rating-card-platform"><i class="fa-brands fa-apple"></i> iOS App Store</div>' +
                '<div class="rating-card-score">' + brand.appRatings.ios + '</div>' +
                '<div class="star-rating">' + iosStars + '</div>' +
              '</div>' +
            '</div>' +
            '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Social Sentiment</h3>' +
            (sentiment.summary ? '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">' + sentiment.summary + '</p>' : '') +
            '<div class="sc-grid">' +
              '<div>' +
                '<h4 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);color:var(--green-text)"><i class="fa-solid fa-thumbs-up"></i> Positive Themes</h4>' +
                '<ul class="sc-list">' + (posThemes || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
              '<div>' +
                '<h4 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);color:var(--orange-text)"><i class="fa-solid fa-thumbs-down"></i> Common Concerns</h4>' +
                '<ul class="sc-list">' + (negThemes || '<li style="color:var(--text-muted)">No data available</li>') + '</ul>' +
              '</div>' +
            '</div>' +
          '</div>' +

        '</div></section>';

      Components.createRadarChart('brand-radar', brand, { showTicks: true, labelSize: 11, pointRadius: 4 });

      window.switchTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(function(el) { el.style.display = 'none'; });
        document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
      };

      var allReviews = [];
      var reviewFilter = 'all';
      var reviewPage = 1;
      var reviewsPerPage = 10;
      var selectedVerdict = null;

      window.selectVerdict = function(v) {
        selectedVerdict = v;
        document.querySelectorAll('.verdict-btn').forEach(function(b) {
          b.style.border = '2px solid var(--border-primary)';
          b.style.background = 'transparent';
          b.style.color = 'var(--text-secondary)';
        });
        var btn = document.getElementById('vbtn-' + v);
        if (v === 'GO') {
          btn.style.border = '2px solid var(--green)';
          btn.style.background = 'var(--green-bg)';
          btn.style.color = 'var(--green-text)';
        } else {
          btn.style.border = '2px solid var(--red, #e74c3c)';
          btn.style.background = 'var(--red-bg, rgba(231,76,60,0.1))';
          btn.style.color = 'var(--red-text, #e74c3c)';
        }
        document.getElementById('submit-review-btn').disabled = false;
        document.getElementById('submit-review-btn').style.opacity = '1';
      };

      window.filterReviews = function(filter) {
        reviewFilter = filter;
        reviewPage = 1;
        document.querySelectorAll('.review-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('[data-filter="' + filter + '"]').classList.add('active');
        renderReviews();
      };

      window.loadMoreReviews = function() {
        reviewPage++;
        renderReviews();
      };

      async function loadReviews() {
        allReviews = await GoNoGoAPI.getBrandReviews(brand.name);
        var replies = await GoNoGoAPI.getReviewReplies(brand.id);

        var replyByReviewId = {};
        (replies || []).forEach(function(rep) {
          var key = String(rep.review_id).trim();
          if (!replyByReviewId[key]) replyByReviewId[key] = [];
          replyByReviewId[key].push(rep);
        });

        allReviews.forEach(function(r) {
          var key = String(r.id).trim();
          r.brandReplies = replyByReviewId[key] || [];
        });

        renderReviewSummary();
        renderReviews();

        if (allReviews.length > 0) {
          var count = allReviews.length;
          jsonLD.aggregateRating.ratingCount = count;
          jsonLD.aggregateRating.reviewCount = count;
          ldScript.textContent = JSON.stringify(jsonLD);
        }
      }

      function renderReviewSummary() {
        var el = document.getElementById('review-summary');
        if (!allReviews || allReviews.length === 0) {
          el.innerHTML = '';
          document.getElementById('review-filters').style.display = 'none';
          return;
        }
        var goCount = allReviews.filter(function(r) { return r.verdict === 'GO'; }).length;
        var nogoCount = allReviews.filter(function(r) { return r.verdict === 'NOGO'; }).length;
        var total = goCount + nogoCount;
        var goPct = total > 0 ? Math.round((goCount / total) * 100) : 0;
        var nogoPct = total > 0 ? 100 - goPct : 0;

        el.innerHTML =
          '<div style="display:flex;gap:var(--space-4);align-items:center;margin-bottom:var(--space-3)">' +
            '<h4 style="font-size:var(--text-sm);font-weight:600;color:var(--text-secondary)">' + allReviews.length + ' User Review' + (allReviews.length !== 1 ? 's' : '') + '</h4>' +
          '</div>' +
          (total > 0 ? '<div style="display:flex;gap:var(--space-4);margin-bottom:var(--space-3)">' +
            '<div style="flex:1;text-align:center;padding:var(--space-3);background:var(--green-bg);border-radius:var(--radius-md);border:1px solid var(--green-dim)">' +
              '<div style="font-size:var(--text-xl);font-weight:800;color:var(--green-text)">' + goPct + '%</div>' +
              '<div style="font-size:var(--text-xs);color:var(--green-text)"><i class="fa-solid fa-circle-check"></i> Go (' + goCount + ')</div>' +
            '</div>' +
            '<div style="flex:1;text-align:center;padding:var(--space-3);background:var(--red-bg,rgba(231,76,60,0.1));border-radius:var(--radius-md);border:1px solid var(--red-dim,rgba(231,76,60,0.2))">' +
              '<div style="font-size:var(--text-xl);font-weight:800;color:var(--red-text,#e74c3c)">' + nogoPct + '%</div>' +
              '<div style="font-size:var(--text-xs);color:var(--red-text,#e74c3c)"><i class="fa-solid fa-circle-xmark"></i> No Go (' + nogoCount + ')</div>' +
            '</div>' +
          '</div>' : '');

        document.getElementById('review-filters').style.display = allReviews.length > 1 ? 'flex' : 'none';
      }

      function renderReviews() {
        var list = document.getElementById('review-list');
        if (!allReviews || allReviews.length === 0) {
          list.innerHTML =
            '<div style="text-align:center;padding:var(--space-10) 0">' +
              '<i class="fa-solid fa-comments" style="font-size:var(--text-3xl);color:var(--text-faint);margin-bottom:var(--space-4);display:block"></i>' +
              '<h3 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2)">No Reviews Yet</h3>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary)">Be the first to rate ' + brand.name + '.</p>' +
            '</div>';
          document.getElementById('review-pagination').innerHTML = '';
          return;
        }

        var filtered = reviewFilter === 'all' ? allReviews : allReviews.filter(function(r) { return r.verdict === reviewFilter; });
        document.getElementById('review-filter-count').textContent = filtered.length + ' review' + (filtered.length !== 1 ? 's' : '');

        var visible = filtered.slice(0, reviewPage * reviewsPerPage);
        var remaining = filtered.length - visible.length;

        list.innerHTML = visible.map(function(r) {
          var verdictHtml = '';
          if (r.verdict === 'GO') {
            verdictHtml = '<span style="color:var(--green-text);font-size:var(--text-xs);font-weight:600"><i class="fa-solid fa-circle-check"></i> Go</span>';
          } else if (r.verdict === 'NOGO') {
            verdictHtml = '<span style="color:var(--red-text,#e74c3c);font-size:var(--text-xs);font-weight:600"><i class="fa-solid fa-circle-xmark"></i> No Go</span>';
          }

          var repliesHtml = (r.brandReplies && r.brandReplies.length)
            ? r.brandReplies.map(function(reply) {
                return '<div class="brand-reply" style="margin-top:var(--space-3);padding:var(--space-3);background:var(--surface-3);border-left:3px solid var(--green);border-radius:var(--radius-sm)">' +
                  '<div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-1)">' +
                    '<span style="font-size:var(--text-xs);font-weight:700;color:var(--green-text)">' +
                      '<i class="fa-solid fa-building"></i> ' + (reply.replied_by || 'Brand') +
                    '</span>' +
                    (reply.created_at
                      ? '<span style="margin-left:auto;font-size:var(--text-xs);color:var(--text-muted)">' +
                          new Date(reply.created_at).toLocaleDateString("en-ZA", { day: "numeric", month: "short", year: "numeric" }) +
                        '</span>'
                      : '') +
                  '</div>' +
                  '<div style="font-size:var(--text-sm);color:var(--text-secondary);line-height:1.6;">' +
                    (reply.reply_text || '') +
                  '</div>' +
                '</div>';
              }).join('')
            : '';

          return '<div class="comment-card">' +
            '<div class="comment-header">' +
              '<div style="display:flex;align-items:center;gap:var(--space-2)">' +
                '<span class="comment-author">' + (r.reviewer_name || r.reviewername || 'Anonymous') + '</span>' +
                (r.branch ? '<span class="text-xs text-muted" style="opacity:0.7"><i class="fa-solid fa-location-dot" style="font-size:10px"></i> ' + (r.branch) + '</span>' : '') +
                verdictHtml +
              '</div>' +
              '<span class="comment-date">' + (r.date || '') + '</span>' +
            '</div>' +
            ((r.review_text || r.reviewtext) ? '<div class="comment-text">' + (r.review_text || r.reviewtext) + '</div>' : '') +
            repliesHtml +
          '</div>';
        }).join('');

        document.getElementById('review-pagination').innerHTML = remaining > 0
          ? '<button class="btn btn-secondary btn-sm" onclick="loadMoreReviews()">Show more (' + remaining + ' remaining)</button>'
          : '';
      }

      // Update review form when auth state changes
      window._updateReviewFormAuth = function(user) {
        var group = document.getElementById('review-name-group');
        if (!group) return;
        if (user) {
          var displayName = (user.user_metadata && user.user_metadata.display_name) || user.email.split('@')[0];
          group.innerHTML =
            '<div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) 0;margin-bottom:var(--space-1)">' +
              '<i class="fa-solid fa-user-check" style="color:var(--green)"></i>' +
              '<span class="text-sm">Reviewing as <strong>' + Components.escapeHTML(displayName) + '</strong></span>' +
            '</div>' +
            '<input type="hidden" id="review-name" value="' + Components.escapeHTML(displayName) + '">';
        } else {
          group.innerHTML =
            '<label class="form-label">Your Name</label>' +
            '<input type="text" id="review-name" placeholder="Enter your name">';
        }
      };

      window.submitReview = async function() {
        var name = document.getElementById('review-name').value.trim();
        var text = document.getElementById('review-text').value.trim();
        if (!name || !selectedVerdict) {
          var msg = Components._currentUser ? 'Please select Go or No Go' : 'Please enter your name and select Go or No Go';
          Components.showToast(msg, 'error');
          return;
        }
        try {
          var branchVal = document.getElementById('review-branch').value.trim();
          var reviewData = {
            category: brand.categorySlug,
            brand_name: brand.name,
            reviewer_name: name,
            review_text: text,
            verdict: selectedVerdict
          };
          if (branchVal) reviewData.branch = branchVal;
          // Attach user_id if signed in
          if (Components._currentUser) {
            reviewData.user_id = Components._currentUser.id;
          }
          await GoNoGoAPI.submitReview(reviewData);
          if (!Components._currentUser) {
            document.getElementById('review-name').value = '';
          }
          document.getElementById('review-text').value = '';
          document.getElementById('review-branch').value = '';
          selectedVerdict = null;
          document.querySelectorAll('.verdict-btn').forEach(function(b) {
            b.style.border = '2px solid var(--border-primary)';
            b.style.background = 'transparent';
            b.style.color = 'var(--text-secondary)';
          });
          document.getElementById('submit-review-btn').disabled = true;
          document.getElementById('submit-review-btn').style.opacity = '0.5';
          Components.showToast('Review submitted — thank you!');
          await loadReviews();
        } catch (e) {
          var msg = e.message || 'Error submitting review. Please try again.';
          if (msg.indexOf('live platform') !== -1 || msg.indexOf('require') !== -1) {
            Components.showToast(msg, 'error');
          } else {
            Components.showToast('Error submitting review. Please try again.', 'error');
          }
          console.error('Review submission error:', e);
        }
      };

      // Auth may have resolved before the form was rendered — sync now
      if (Components._currentUser) {
        window._updateReviewFormAuth(Components._currentUser);
      }

      await loadReviews();

      // Load granular per-criterion scores (progressive enhancement)
      loadGranularScores(brand.id);
    })();

    function loadGranularScores(brandSlug) {
      function normCat(s) { return s.replace(/&/g, '').replace(/\s+/g, ' ').trim().toLowerCase(); }
      GoNoGoAPI.getBrandGranularScores(brandSlug).then(function(grouped) {
        if (!grouped) return;
        // Build normalised lookup so "Accessibility & Security" matches "Accessibility Security"
        var normMap = {};
        Object.keys(grouped).forEach(function(k) { normMap[normCat(k)] = grouped[k]; });
        document.querySelectorAll('.category-card[data-category]').forEach(function(card) {
          var cat = card.getAttribute('data-category');
          var data = normMap[normCat(cat)];
          if (!data || !data.criteria.length) return;

          // Make card expandable
          var header = card.querySelector('.category-card-header');
          header.style.cursor = 'pointer';
          var chevron = document.createElement('span');
          chevron.className = 'granular-chevron';
          chevron.innerHTML = '<i class="fa-solid fa-chevron-down"></i>';
          header.appendChild(chevron);

          // Build detail HTML
          var detailEl = card.querySelector('.granular-detail');
          var html = '<div class="granular-criteria">';
          data.criteria.forEach(function(c) {
            var pct = c.max > 0 ? Math.round((c.score / c.max) * 100) : 0;
            var barColor = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red,#e74c3c)';
            html += '<div class="granular-row">' +
              '<div class="granular-row-header">' +
                '<span class="granular-sub">' + c.subcategory + '</span>' +
                '<span class="granular-pts" style="color:' + barColor + '">' + c.score + '/' + c.max + '</span>' +
              '</div>' +
              '<div class="granular-bar-track"><div class="granular-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
              (c.evidence ? '<p class="granular-evidence">' + c.evidence + '</p>' : '') +
            '</div>';
          });
          html += '</div>';
          detailEl.innerHTML = html;

          // Toggle handler
          header.addEventListener('click', function() {
            var open = detailEl.style.display !== 'none';
            detailEl.style.display = open ? 'none' : 'block';
            chevron.classList.toggle('open', !open);
          });
        });
      });
    }

    function renderStars(score) {
      var val = parseFloat(score) || 0;
      var full = Math.floor(val);
      var half = val - full >= 0.3;
      var html = '';
      for (var i = 1; i <= 5; i++) {
        if (i <= full) html += '<i class="fa-solid fa-star active"></i>';
        else if (i === full + 1 && half) html += '<i class="fa-solid fa-star-half-stroke active"></i>';
        else html += '<i class="fa-regular fa-star"></i>';
      }
      return html;
    }
  </script>

  <style>
    @media (max-width: 768px) {
      #tab-overview > div:first-child {
        grid-template-columns: 1fr !important;
      }
    }

    /* ── Pricing tab ── */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: var(--space-4);
    }
    .pricing-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      transition: box-shadow 0.18s;
    }
    .pricing-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .pricing-card-name {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }
    .pricing-card-price {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .pricing-card-price.is-text {
      font-size: var(--text-sm);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .pricing-card-features {
      margin: 0;
      padding: var(--space-3) 0 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
      border-top: 1px solid var(--border);
      flex-grow: 1;
    }
    .pricing-card-features li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .pricing-card-features li::before {
      content: '\2713';
      color: var(--green);
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</body>
</html>
