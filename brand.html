<html lang="en-ZA">

<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Detail — GoNoGo South Africa</title>
  <meta name="description" content="Detailed brand analysis and scoring breakdown">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="nav"></div>

  <!-- Brand Header -->
  <section class="brand-header" id="brand-header">
    <div style="text-align:center;padding:var(--space-8);color:var(--text-muted)">Loading brand...</div>
  </section>

  <!-- Score Breakdown -->
  <section class="section">
    <div class="container">
      <h2 class="section-title">Score Breakdown</h2>
      <div id="score-breakdown">
        <div style="text-align:center;padding:var(--space-8);color:var(--text-muted)">Loading scores...</div>
      </div>
    </div>
  </section>

  <!-- Key Features -->
  <section class="section" style="background:var(--surface-1)">
    <div class="container">
      <h2 class="section-title">Key Features</h2>
      <div id="key-features"></div>
    </div>
  </section>

  <!-- Strengths & Concerns -->
  <section class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--space-6)">
        <div>
          <h3 class="section-title" style="font-size:var(--text-xl)">Key Strengths</h3>
          <div id="key-strengths"></div>
        </div>
        <div>
          <h3 class="section-title" style="font-size:var(--text-xl)">Key Concerns</h3>
          <div id="key-concerns"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Pricing -->
  <section class="section" style="background:var(--surface-1)">
    <div class="container">
      <h2 class="section-title">Pricing</h2>
      <div id="pricing"></div>
    </div>
  </section>

  <div id="footer"></div>

  <!-- CRITICAL: Data files MUST load first -->
  <script src="data/data_partA1a.js"></script>
  <script src="data/data_partA1b.js"></script>
  <script src="data/data_partA1.js"></script>
  <script src="data/data_partA2.js"></script>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB1.js"></script>
  <script src="data/data_partB2a.js"></script>
  <script src="data/data_partB2b.js"></script>
  <script src="data/data_partB2.js"></script>
  <script src="data/data_partB3.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC1a.js"></script>
  <script src="data/data_partC1b.js"></script>
  <script src="data/data_partC1.js"></script>
  <script src="data/data_partC2.js"></script>
  <script src="data/data_partC3a.js"></script>
  <script src="data/data_partC3b.js"></script>
  <script src="data/data_partC3.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD1.js"></script>
  <script src="data/data_partD2.js"></script>
  <script src="data/data_partD3.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  
  <!-- Chart.js for radar charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Components (static helpers) MUST come after data, before API -->
  <script src="components.js"></script>
  
  <!-- API client MUST come last -->
  <script src="api.js"></script>
  
  <script>
    document.getElementById('nav').innerHTML = Components.renderPublicNav('');
    document.getElementById('footer').innerHTML = Components.renderFooter();

    (async function() {
      // Get brand ID from URL
      var brandId = Components.getParam('id');
      if (!brandId) {
        document.getElementById('brand-header').innerHTML = '<div class="container"><p style="text-align:center;color:var(--text-muted)">No brand selected</p></div>';
        return;
      }

      // Load brand
      var brand = await GoNoGoAPI.getBrandById(brandId);
      if (!brand) {
        document.getElementById('brand-header').innerHTML = '<div class="container"><p style="text-align:center;color:var(--text-muted)">Brand not found</p></div>';
        return;
      }

      // Render header
      document.getElementById('brand-header').innerHTML = `
        <div class="container">
          <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-6)">
            ${Components.renderLogo(brand, 'brand-logo brand-logo-lg')}
            <div style="flex:1">
              <h1 class="brand-name">${brand.name}</h1>
              <div style="display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap">
                ${Components.renderVerdictBadge(brand.verdict)}
                ${Components.renderScoreBadge(brand.overallScore)}
                <span class="text-muted">in ${brand.categoryName}</span>
              </div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:var(--space-6)">
            <div style="text-align:center">
              ${Components.renderScoreCircle(brand.overallScore, 'lg')}
              <div style="margin-top:var(--space-3);color:var(--text-muted);font-size:var(--text-sm)">Overall Score</div>
            </div>
            <div style="min-height:300px;position:relative">
              <canvas id="brand-radar"></canvas>
            </div>
          </div>
        </div>
      `;

      // Render radar chart
      Components.createRadarChart('brand-radar', brand, { showTicks: true, labelSize: 11 });

      // Render score breakdown
      var scoreHtml = '<div style="display:grid;gap:var(--space-4)">';
      Object.keys(brand.categoryScores).forEach(function(cat) {
        var cs = brand.categoryScores[cat];
        var pct = Math.round((cs.score / cs.max) * 100);
        scoreHtml += `
          <div class="score-item">
            <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-2)">
              <span class="score-category">${cat}</span>
              <span class="score-value">${cs.score}/${cs.max}</span>
            </div>
            ${Components.renderScoreBar(cs.score, cs.max)}
          </div>
        `;
      });
      scoreHtml += '</div>';
      document.getElementById('score-breakdown').innerHTML = scoreHtml;

      // Render key features
      if (brand.keyFeatures && brand.keyFeatures.length > 0) {
        var featuresHtml = '<div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">';
        brand.keyFeatures.forEach(function(feat) {
          featuresHtml += `<span class="badge badge-secondary"><i class="fa-solid fa-check"></i> ${feat}</span>`;
        });
        featuresHtml += '</div>';
        document.getElementById('key-features').innerHTML = featuresHtml;
      } else {
        document.getElementById('key-features').innerHTML = '<p class="text-muted">No features listed</p>';
      }

      // Render strengths
      if (brand.keyStrengths && brand.keyStrengths.length > 0) {
        var strengthsHtml = '<ul class="bullet-list">';
        brand.keyStrengths.forEach(function(str) {
          strengthsHtml += `<li><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> ${str}</li>`;
        });
        strengthsHtml += '</ul>';
        document.getElementById('key-strengths').innerHTML = strengthsHtml;
      } else {
        document.getElementById('key-strengths').innerHTML = '<p class="text-muted">No strengths listed</p>';
      }

      // Render concerns
      if (brand.keyConcerns && brand.keyConcerns.length > 0) {
        var concernsHtml = '<ul class="bullet-list">';
        brand.keyConcerns.forEach(function(con) {
          concernsHtml += `<li><i class="fa-solid fa-triangle-exclamation" style="color:var(--orange)"></i> ${con}</li>`;
        });
        concernsHtml += '</ul>';
        document.getElementById('key-concerns').innerHTML = concernsHtml;
      } else {
        document.getElementById('key-concerns').innerHTML = '<p class="text-muted">No concerns listed</p>';
      }

      // Render pricing
      if (brand.pricing && brand.pricing.length > 0) {
        var pricingHtml = '<div style="display:grid;gap:var(--space-4)">';
        brand.pricing.forEach(function(tier) {
          pricingHtml += `
            <div class="pricing-card">
              <div class="pricing-name">${tier.name || 'Standard'}</div>
              <div class="pricing-cost">${tier.cost || 'Contact for pricing'}</div>
              ${tier.features ? '<div class="pricing-features">' + tier.features + '</div>' : ''}
            </div>
          `;
        });
        pricingHtml += '</div>';
        document.getElementById('pricing').innerHTML = pricingHtml;
      } else {
        document.getElementById('pricing').innerHTML = '<p class="text-muted">Pricing information not available</p>';
      }
    })();
  </script>
</body>
</html>
