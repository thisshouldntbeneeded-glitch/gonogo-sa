<!DOCTYPE html>
<html lang="en-ZA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password — GoNoGo South Africa</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>(function(){var t=localStorage.getItem('gonogo_theme');if(t==='light'||(!t&&window.matchMedia('(prefers-color-scheme: light)').matches))document.documentElement.classList.add('light-mode');})()</script>
<style>
  .reset-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
  }
  .reset-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-8);
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .reset-box .logo { display: flex; justify-content: center; margin-bottom: var(--space-4); }
  .reset-box h3 { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2); text-align: center; }
  .reset-box .subtitle { color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-5); text-align: center; }
  .reset-error {
    display: none;
    padding: var(--space-3);
    background: rgba(220,53,69,0.1);
    border: 1px solid rgba(220,53,69,0.3);
    border-radius: var(--radius-md);
    color: #dc3545;
    font-size: var(--text-sm);
    margin-bottom: var(--space-3);
  }
  .reset-success {
    display: none;
    padding: var(--space-3);
    background: rgba(17,165,81,0.1);
    border: 1px solid var(--primary);
    border-radius: var(--radius-md);
    color: var(--primary);
    font-size: var(--text-sm);
    margin-bottom: var(--space-3);
  }
  .password-strength { font-size: var(--text-xs); margin-top: var(--space-1); min-height: 1.2em; }
  .str-weak { color: #dc3545; }
  .str-fair { color: #ffc107; }
  .str-good { color: #17a551; }
</style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="reset-wrapper">
    <div class="reset-box" id="reset-box">
      <div class="logo">
        <img src="logos/gonogo-square.jpg" alt="GoNoGo" style="height:36px;width:auto;">
      </div>
      <h3>Set New Password</h3>
      <p class="subtitle" id="reset-subtitle">Verifying your reset link...</p>
      <div class="reset-error" id="reset-error"></div>
      <div class="reset-success" id="reset-success"></div>
      <div id="reset-form" style="display:none">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" id="new-password" placeholder="Minimum 8 characters" oninput="checkStrength()" onkeydown="if(event.key==='Enter')document.getElementById('confirm-password').focus()">
          <div class="password-strength" id="pw-strength"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')submitNewPassword()">
        </div>
        <button class="btn btn-primary w-full" id="submit-btn" onclick="submitNewPassword()">
          <i class="fa-solid fa-key"></i> Reset Password
        </button>
      </div>
      <div id="reset-done" style="display:none;text-align:center">
        <p style="margin-bottom:var(--space-4)"><i class="fa-solid fa-circle-check" style="font-size:2rem;color:var(--primary)"></i></p>
        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">Your password has been reset successfully.</p>
        <a href="/brand-dashboard" class="btn btn-primary"><i class="fa-solid fa-arrow-right"></i> Go to Brand Portal</a>
      </div>
    </div>
  </div>

  <script src="data/helpers.js"></script>
  <script src="api.js"></script>
  <script>
    var resetToken = null;

    function checkStrength() {
      var pw = document.getElementById('new-password').value;
      var el = document.getElementById('pw-strength');
      if (!pw) { el.textContent = ''; return; }
      var score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      if (score <= 2) { el.innerHTML = '<span class="str-weak">Weak</span>'; }
      else if (score <= 3) { el.innerHTML = '<span class="str-fair">Fair</span>'; }
      else { el.innerHTML = '<span class="str-good">Strong</span>'; }
    }

    async function submitNewPassword() {
      var pw = document.getElementById('new-password').value;
      var confirm = document.getElementById('confirm-password').value;
      var error = document.getElementById('reset-error');
      var btn = document.getElementById('submit-btn');

      error.style.display = 'none';

      if (pw.length < 8) {
        error.textContent = 'Password must be at least 8 characters.';
        error.style.display = 'block';
        return;
      }
      if (pw !== confirm) {
        error.textContent = 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';

      try {
        var result = await GoNoGoAPI.resetPassword(resetToken, pw);
        if (result && result.ok) {
          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('reset-subtitle').style.display = 'none';
          document.getElementById('reset-done').style.display = 'block';
        } else {
          error.textContent = (result && result.error) || 'Reset failed. The link may have expired.';
          error.style.display = 'block';
        }
      } catch (e) {
        error.textContent = 'Reset failed. Please request a new link.';
        error.style.display = 'block';
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-key"></i> Reset Password';
    }

    (async function init() {
      var params = new URLSearchParams(window.location.search);
      resetToken = params.get('token');
      var error = document.getElementById('reset-error');
      var subtitle = document.getElementById('reset-subtitle');

      if (!resetToken) {
        error.textContent = 'No reset token found. Please use the link from your email.';
        error.style.display = 'block';
        subtitle.style.display = 'none';
        return;
      }

      try {
        var result = await GoNoGoAPI.verifyResetToken(resetToken);
        if (result && result.valid) {
          subtitle.textContent = 'Create a new password for ' + (result.email || 'your account');
          document.getElementById('reset-form').style.display = 'block';
          setTimeout(function() { document.getElementById('new-password').focus(); }, 100);
        } else {
          var reason = (result && result.reason) || 'Invalid or expired link';
          error.textContent = reason + '. Please request a new reset link.';
          error.style.display = 'block';
          subtitle.style.display = 'none';
        }
      } catch (e) {
        error.textContent = 'Could not verify your reset link. Please try again.';
        error.style.display = 'block';
        subtitle.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
