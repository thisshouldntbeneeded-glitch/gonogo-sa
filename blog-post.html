<!DOCTYPE html>
<html lang="en-ZA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<title>Blog — GoNoGo South Africa</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>(function(){try{var t=localStorage.getItem('gonogo_theme');if(t==='light'||(!t&&window.matchMedia('(prefers-color-scheme: light)').matches))document.documentElement.classList.add('light-mode');}catch(e){}})()</script>
</head>
<body>
<div id="nav"></div>

<article id="blog-article" style="display:none">
  <section style="padding:var(--space-10) 0 var(--space-4)">
    <div class="container" style="max-width:780px">
      <a href="blog.html" class="text-sm" style="color:var(--green);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:var(--space-4)"><i class="fa-solid fa-arrow-left"></i> Back to Blog</a>
      <div id="post-meta" class="text-sm text-muted" style="margin-bottom:var(--space-3)"></div>
      <h1 id="post-title" style="font-size:var(--text-2xl);font-weight:800;line-height:1.3;margin-bottom:var(--space-4)"></h1>
    </div>
  </section>
  <div id="post-cover" style="display:none">
    <div class="container" style="max-width:780px">
      <img id="post-cover-img" alt="" style="width:100%;border-radius:var(--radius-lg);margin-bottom:var(--space-6)">
    </div>
  </div>
  <section style="padding:0 0 var(--space-10)">
    <div class="container" style="max-width:780px">
      <div id="post-content" class="blog-content"></div>
    </div>
  </section>
</article>

<div id="blog-loading" style="text-align:center;padding:var(--space-10) 0">
  <p class="text-sm text-muted">Loading post...</p>
</div>
<div id="blog-not-found" style="display:none;text-align:center;padding:var(--space-10) 0">
  <i class="fa-solid fa-file-circle-xmark" style="font-size:48px;color:var(--green);opacity:0.4;margin-bottom:var(--space-4);display:block"></i>
  <p class="text-secondary">Post not found.</p>
  <a href="blog.html" class="text-sm" style="color:var(--green)">Back to Blog</a>
</div>

<div id="footer"></div>

<script src="data/helpers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="components.js"></script>
<script src="api.js"></script>
<script>
  document.getElementById('nav').innerHTML = Components.renderPublicNav('blog');
  Components.initTheme();
  Components.initPublicAuth();
  document.getElementById('footer').innerHTML = Components.renderFooter();

  (async function() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    if (!slug) { showNotFound(); return; }

    try {
      var posts = await GoNoGoAPI.supabaseRequest(
        'blog_posts?slug=eq.' + encodeURIComponent(slug) +
        '&status=eq.published&region=eq.' + GoNoGoAPI.SITE_REGION +
        '&select=title,slug,excerpt,content,cover_image_url,author,published_at&limit=1'
      );
      if (!posts || posts.length === 0) { showNotFound(); return; }
      var post = posts[0];

      document.title = post.title + ' — GoNoGo South Africa';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (!metaDesc) { metaDesc = document.createElement('meta'); metaDesc.name='description'; document.head.appendChild(metaDesc); }
      metaDesc.content = post.excerpt || post.title;

      document.getElementById('post-title').textContent = post.title;
      var date = post.published_at ? new Date(post.published_at).toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' }) : '';
      document.getElementById('post-meta').textContent = (post.author || 'GoNoGo Team') + (date ? ' · ' + date : '');

      if (post.cover_image_url) {
        document.getElementById('post-cover').style.display = '';
        document.getElementById('post-cover-img').src = post.cover_image_url;
      }

      document.getElementById('post-content').innerHTML = post.content;
      document.getElementById('blog-loading').style.display = 'none';
      document.getElementById('blog-article').style.display = '';
    } catch(e) {
      console.error('Blog post error:', e);
      showNotFound();
    }
  })();

  function showNotFound() {
    document.getElementById('blog-loading').style.display = 'none';
    document.getElementById('blog-not-found').style.display = '';
  }
</script>

<style>
  .blog-content { font-size: var(--text-sm); color: var(--text-secondary); line-height: 1.8; }
  .blog-content h2 { font-size: var(--text-lg); font-weight: 700; color: var(--text-primary); margin: var(--space-6) 0 var(--space-3); }
  .blog-content h3 { font-size: var(--text-base); font-weight: 700; color: var(--text-primary); margin: var(--space-5) 0 var(--space-2); }
  .blog-content p { margin-bottom: var(--space-4); }
  .blog-content ul, .blog-content ol { padding-left: var(--space-6); margin-bottom: var(--space-4); }
  .blog-content li { margin-bottom: var(--space-1); }
  .blog-content a { color: var(--green); text-decoration: underline; }
  .blog-content img { max-width: 100%; border-radius: var(--radius-md); margin: var(--space-4) 0; }
  .blog-content blockquote { border-left: 3px solid var(--green); padding-left: var(--space-4); margin: var(--space-4) 0; color: var(--text-muted); font-style: italic; }
  .blog-content strong { color: var(--text-primary); }
</style>
</body>
</html>
