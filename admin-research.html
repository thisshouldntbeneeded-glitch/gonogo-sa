<html lang="en-ZA">

<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Research — GoNoGo Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .research-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .research-card {
      background: var(--surface-2);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
    }

    .research-card h3 {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .brand-select-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-4);
      max-height: 400px;
      overflow-y: auto;
      padding: var(--space-3);
      background: var(--surface-1);
      border-radius: var(--radius-md);
    }

    .brand-checkbox {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s;
    }

    .brand-checkbox:hover {
      background: var(--surface-3);
    }

    .brand-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .research-log {
      background: var(--surface-1);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: var(--text-sm);
    }

    .log-entry {
      padding: var(--space-2);
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      gap: var(--space-3);
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: var(--text-muted);
      min-width: 80px;
    }

    .log-success {
      color: var(--green);
    }

    .log-error {
      color: var(--red);
    }

    .log-info {
      color: var(--blue);
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-4);
    }

    .comparison-table th,
    .comparison-table td {
      padding: var(--space-3);
      text-align: left;
      border: 1px solid var(--border-primary);
    }

    .comparison-table th {
      background: var(--surface-3);
      font-weight: 600;
    }

    .value-changed {
      background: rgba(255, 193, 7, 0.1);
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--surface-3);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-top: var(--space-2);
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
    }

    .research-status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--surface-3);
      border-radius: var(--radius-md);
      margin-top: var(--space-4);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid var(--surface-3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .research-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-title"><i class="fa-solid fa-magnifying-glass-chart"></i> Brand Research</h1>
      <p class="admin-subtitle">Search and update brand data automatically</p>
    </div>

    <div id="admin-content">
      <!-- Quick Actions -->
      <div class="research-card" style="margin-bottom: var(--space-6);">
        <h3><i class="fa-solid fa-bolt"></i> Quick Actions</h3>
        <div style="display: flex; gap: var(--space-3); flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="researchSingleBrand()">
            <i class="fa-solid fa-search"></i> Research Single Brand
          </button>
          <button class="btn btn-secondary" onclick="showBulkResearch()">
            <i class="fa-solid fa-layer-group"></i> Bulk Research
          </button>
          <button class="btn btn-ghost" onclick="scheduleAutoUpdate()">
            <i class="fa-solid fa-clock"></i> Schedule Auto-Update
          </button>
          <button class="btn btn-ghost" onclick="exportData()">
            <i class="fa-solid fa-download"></i> Export Updated Data
          </button>
        </div>
      </div>

      <div class="research-grid">
        <!-- Single Brand Research -->
        <div class="research-card" id="single-research-card">
          <h3><i class="fa-solid fa-search"></i> Single Brand Research</h3>
          <div class="form-group">
            <label class="form-label">Select Brand</label>
            <select id="brand-select" class="form-select">
              <option value="">Choose a brand...</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Data to Update</label>
            <div style="display: flex; flex-direction: column; gap: var(--space-2);">
              <label style="display: flex; align-items: center; gap: var(--space-2);">
                <input type="checkbox" checked value="ratings"> App Ratings (Google Play & iOS)
              </label>
              <label style="display: flex; align-items: center; gap: var(--space-2);">
                <input type="checkbox" checked value="reviews"> Social Sentiment & Reviews
              </label>
              <label style="display: flex; align-items: center; gap: var(--space-2);">
                <input type="checkbox" checked value="pricing"> Pricing Information
              </label>
              <label style="display: flex; align-items: center; gap: var(--space-2);">
                <input type="checkbox" value="features"> Features & Updates
              </label>
            </div>
          </div>
          <button class="btn btn-primary btn-block" onclick="startSingleResearch()">
            <i class="fa-solid fa-play"></i> Start Research
          </button>
        </div>

        <!-- Bulk Research -->
        <div class="research-card" id="bulk-research-card" style="display: none;">
          <h3><i class="fa-solid fa-layer-group"></i> Bulk Research</h3>
          <div class="form-group">
            <label class="form-label">Select Category</label>
            <select id="category-select" class="form-select" onchange="filterBrandsByCategory()">
              <option value="all">All Categories</option>
            </select>
          </div>
          <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-3);">
            <button class="btn btn-sm btn-ghost" onclick="selectAllBrands()">Select All</button>
            <button class="btn btn-sm btn-ghost" onclick="deselectAllBrands()">Deselect All</button>
          </div>
          <div class="brand-select-grid" id="brand-checkboxes"></div>
          <button class="btn btn-primary btn-block" onclick="startBulkResearch()">
            <i class="fa-solid fa-play"></i> Start Bulk Research
          </button>
        </div>

        <!-- Research Progress -->
        <div class="research-card" id="progress-card" style="display: none;">
          <h3><i class="fa-solid fa-chart-line"></i> Research Progress</h3>
          <div id="progress-status"></div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
          </div>
          <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
            <span id="progress-text">0 of 0 brands researched</span>
          </div>
        </div>

        <!-- Comparison Preview -->
        <div class="research-card" id="comparison-card" style="display: none;">
          <h3><i class="fa-solid fa-code-compare"></i> Changes Preview</h3>
          <div id="comparison-content"></div>
          <div style="display: flex; gap: var(--space-3); margin-top: var(--space-4);">
            <button class="btn btn-primary" onclick="applyChanges()">
              <i class="fa-solid fa-check"></i> Apply Changes
            </button>
            <button class="btn btn-secondary" onclick="discardChanges()">
              <i class="fa-solid fa-times"></i> Discard
            </button>
          </div>
        </div>
      </div>

      <!-- Research Log -->
      <div class="research-card">
        <h3><i class="fa-solid fa-terminal"></i> Research Log</h3>
        <div class="research-log" id="research-log">
          <div class="log-entry">
            <span class="log-time">12:00:00</span>
            <span class="log-info">System ready. Select a brand to begin research.</span>
          </div>
        </div>
        <div style="display: flex; gap: var(--space-2); margin-top: var(--space-3);">
          <button class="btn btn-sm btn-ghost" onclick="clearLog()">
            <i class="fa-solid fa-broom"></i> Clear Log
          </button>
          <button class="btn btn-sm btn-ghost" onclick="exportLog()">
            <i class="fa-solid fa-download"></i> Export Log
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="components.js"></script>
  <script src="api-v2.js"></script>
  <script>
    document.getElementById('sidebar-container').innerHTML = Components.renderAdminSidebar('dashboard');

    if (!Components.checkAdminAuth()) {
      initAdminPage();
    }

    let researchResults = [];
    let originalData = {};

    // Initialize
    (function() {
      populateBrandSelect();
      populateCategorySelect();
      addLog('info', 'Admin research panel initialized');
    })();

    function populateBrandSelect() {
      const select = document.getElementById('brand-select');
      BRAND_DATA.forEach(cat => {
        cat.brands.forEach(brand => {
          const option = document.createElement('option');
          option.value = brand.id;
          option.textContent = `${brand.name} (${cat.category})`;
          select.appendChild(option);
        });
      });
    }

    function populateCategorySelect() {
      const select = document.getElementById('category-select');
      BRAND_DATA.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.slug;
        option.textContent = cat.category;
        select.appendChild(option);
      });
    }

    function filterBrandsByCategory() {
      const category = document.getElementById('category-select').value;
      const container = document.getElementById('brand-checkboxes');
      container.innerHTML = '';

      BRAND_DATA.forEach(cat => {
        if (category === 'all' || cat.slug === category) {
          cat.brands.forEach(brand => {
            const label = document.createElement('label');
            label.className = 'brand-checkbox';
            label.innerHTML = `
              <input type="checkbox" value="${brand.id}" data-brand="${brand.name}">
              <span style="font-size: var(--text-sm);">${brand.name}</span>
            `;
            container.appendChild(label);
          });
        }
      });
    }

    function selectAllBrands() {
      document.querySelectorAll('#brand-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = true);
    }

    function deselectAllBrands() {
      document.querySelectorAll('#brand-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    function researchSingleBrand() {
      document.getElementById('single-research-card').style.display = 'block';
      document.getElementById('bulk-research-card').style.display = 'none';
    }

    function showBulkResearch() {
      document.getElementById('single-research-card').style.display = 'none';
      document.getElementById('bulk-research-card').style.display = 'block';
      filterBrandsByCategory();
    }

    async function startSingleResearch() {
      const brandId = document.getElementById('brand-select').value;
      if (!brandId) {
        Components.showToast('Please select a brand', 'error');
        return;
      }

      const brand = getBrandById(brandId);
      if (!brand) {
        Components.showToast('Brand not found', 'error');
        return;
      }

      addLog('info', `Starting research for ${brand.name}...`);
      showProgress([brandId]);

      try {
        const result = await researchBrand(brand);
        researchResults = [result];
        addLog('success', `Research completed for ${brand.name}`);
        showComparison(result);
      } catch (error) {
        addLog('error', `Research failed: ${error.message}`);
        Components.showToast('Research failed. See log for details.', 'error');
      }

      hideProgress();
    }

    async function startBulkResearch() {
      const selected = Array.from(document.querySelectorAll('#brand-checkboxes input:checked'))
        .map(cb => cb.value);

      if (selected.length === 0) {
        Components.showToast('Please select at least one brand', 'error');
        return;
      }

      addLog('info', `Starting bulk research for ${selected.length} brands...`);
      showProgress(selected);

      researchResults = [];
      let completed = 0;

      for (const brandId of selected) {
        const brand = getBrandById(brandId);
        try {
          addLog('info', `Researching ${brand.name}...`);
          const result = await researchBrand(brand);
          researchResults.push(result);
          completed++;
          updateProgress(completed, selected.length);
          addLog('success', `✓ ${brand.name} completed`);
        } catch (error) {
          addLog('error', `✗ ${brand.name} failed: ${error.message}`);
          completed++;
          updateProgress(completed, selected.length);
        }

        // Delay to avoid rate limiting
        await new Promise(resolve => setTimeout(resolve, 2000));
      }

      addLog('success', `Bulk research completed: ${researchResults.length}/${selected.length} successful`);
      hideProgress();

      if (researchResults.length > 0) {
        showBulkComparison();
      }
    }

    async function researchBrand(brand) {
      // Simulate API research (in production, this would call Perplexity API or web scraping)
      return new Promise((resolve) => {
        setTimeout(() => {
          const updates = {
            brandId: brand.id,
            brandName: brand.name,
            old: {
              googlePlay: brand.appRatings.googlePlay,
              ios: brand.appRatings.ios,
              pricing: brand.pricing,
              sentiment: brand.socialSentiment?.summary || ''
            },
            new: {
              googlePlay: generateMockRating(),
              ios: generateMockRating(),
              pricing: brand.pricing, // Would update from web
              sentiment: 'Updated sentiment analysis from recent reviews...'
            },
            changed: []
          };

          // Detect changes
          if (updates.old.googlePlay !== updates.new.googlePlay) updates.changed.push('Google Play rating');
          if (updates.old.ios !== updates.new.ios) updates.changed.push('iOS rating');
          if (updates.old.sentiment !== updates.new.sentiment) updates.changed.push('Sentiment');

          resolve(updates);
        }, 1000);
      });
    }

    function generateMockRating() {
      const rating = (Math.random() * 1.5 + 3.5).toFixed(1);
      return `${rating}/5`;
    }

    function showProgress(brandIds) {
      document.getElementById('progress-card').style.display = 'block';
      updateProgress(0, brandIds.length);
    }

    function updateProgress(current, total) {
      const percent = (current / total) * 100;
      document.getElementById('progress-fill').style.width = percent + '%';
      document.getElementById('progress-text').textContent = `${current} of ${total} brands researched`;
    }

    function hideProgress() {
      setTimeout(() => {
        document.getElementById('progress-card').style.display = 'none';
      }, 2000);
    }

    function showComparison(result) {
      document.getElementById('comparison-card').style.display = 'block';
      const content = document.getElementById('comparison-content');

      let html = `<h4 style="margin-bottom: var(--space-3);">${result.brandName}</h4>`;

      if (result.changed.length === 0) {
        html += '<p style="color: var(--text-muted);">No changes detected</p>';
      } else {
        html += '<table class="comparison-table">';
        html += '<tr><th>Field</th><th>Current</th><th>New</th></tr>';

        if (result.changed.includes('Google Play rating')) {
          html += `<tr>
            <td>Google Play</td>
            <td>${result.old.googlePlay}</td>
            <td class="value-changed">${result.new.googlePlay}</td>
          </tr>`;
        }

        if (result.changed.includes('iOS rating')) {
          html += `<tr>
            <td>iOS Rating</td>
            <td>${result.old.ios}</td>
            <td class="value-changed">${result.new.ios}</td>
          </tr>`;
        }

        if (result.changed.includes('Sentiment')) {
          html += `<tr>
            <td>Sentiment</td>
            <td>${result.old.sentiment.substring(0, 50)}...</td>
            <td class="value-changed">${result.new.sentiment.substring(0, 50)}...</td>
          </tr>`;
        }

        html += '</table>';
      }

      content.innerHTML = html;
    }

    function showBulkComparison() {
      const changedBrands = researchResults.filter(r => r.changed.length > 0);

      if (changedBrands.length === 0) {
        Components.showToast('No changes detected in any brands', 'info');
        return;
      }

      document.getElementById('comparison-card').style.display = 'block';
      const content = document.getElementById('comparison-content');

      let html = `<p style="margin-bottom: var(--space-3);">${changedBrands.length} brands have changes:</p>`;
      html += '<ul style="list-style: none; padding: 0;">';

      changedBrands.forEach(result => {
        html += `<li style="padding: var(--space-2); background: var(--surface-3); margin-bottom: var(--space-2); border-radius: var(--radius-sm);">
          <strong>${result.brandName}</strong>: ${result.changed.join(', ')}
        </li>`;
      });

      html += '</ul>';
      content.innerHTML = html;
    }

    function applyChanges() {
      if (researchResults.length === 0) {
        Components.showToast('No changes to apply', 'error');
        return;
      }

      addLog('info', 'Applying changes to brand data...');

      // In production, this would update the database
      researchResults.forEach(result => {
        if (result.changed.length > 0) {
          addLog('success', `Updated ${result.brandName}`);
        }
      });

      Components.showToast(`Successfully updated ${researchResults.length} brands`, 'success');
      document.getElementById('comparison-card').style.display = 'none';
      researchResults = [];
    }

    function discardChanges() {
      researchResults = [];
      document.getElementById('comparison-card').style.display = 'none';
      addLog('info', 'Changes discarded');
    }

    function scheduleAutoUpdate() {
      Components.showToast('Auto-update scheduling coming soon!', 'info');
      addLog('info', 'Auto-update feature requires backend API setup');
    }

    function exportData() {
      const dataStr = JSON.stringify(BRAND_DATA, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gonogo-data-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      addLog('success', 'Data exported successfully');
    }

    function addLog(type, message) {
      const log = document.getElementById('research-log');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-${type}">${message}</span>
      `;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function clearLog() {
      document.getElementById('research-log').innerHTML = '';
      addLog('info', 'Log cleared');
    }

    function exportLog() {
      const log = document.getElementById('research-log').innerText;
      const blob = new Blob([log], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `research-log-${new Date().toISOString()}.txt`;
      a.click();
    }

    function getBrandById(id) {
      for (const cat of BRAND_DATA) {
        const brand = cat.brands.find(b => b.id === id);
        if (brand) return brand;
      }
      return null;
    }
  </script>
</body>
</html>
