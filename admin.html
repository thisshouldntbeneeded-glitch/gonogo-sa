<html lang="en-ZA">

<meta name="generator" content="Perplexity Computer">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoNoGo SA — Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    <main class="admin-main" id="admin-content" style="display:none;">
      <div class="admin-header">
        <div>
          <h1 class="admin-title">Dashboard</h1>
          <p class="text-sm text-secondary">Overview of your GoNoGo South Africa platform</p>
        </div>
        <a href="admin-brands.html" class="btn btn-primary btn-sm">
          <i class="fa-solid fa-plus"></i> Add Brand
        </a>
      </div>

      <div class="kpi-grid" style="margin-bottom:var(--space-8);" id="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Loading...</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-8);">
        <div class="card">
          <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">Score Distribution</h3>
          <div style="height:250px;"><canvas id="score-chart"></canvas></div>
        </div>
        <div class="card">
          <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">Brands by Industry</h3>
          <div style="height:250px;"><canvas id="industry-chart"></canvas></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:var(--space-8);">
        <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">Verdict Breakdown</h3>
        <div id="verdict-breakdown" style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);"></div>
      </div>

      <div class="card">
        <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">Recent Activity</h3>
        <div class="activity-feed" id="activity-feed"></div>
      </div>

      <div style="padding:var(--space-6) 0;text-align:center;">
        <p class="text-xs text-muted">
          &copy; 2026 GoNoGo South Africa
        </p>
      </div>
    </main>
  </div>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components.js"></script>
  <script src="api.js?v=20260424c"></script>

  <script>
    document.getElementById('sidebar-container').innerHTML = Components.renderAdminSidebar('dashboard');

    if (Components.checkAdminAuth()) {
      initAdminPage();
    }

    async function initAdminPage() {
      document.getElementById('admin-content').style.display = '';

      var allBrands = await GoNoGoAPI.getAllBrands();
      var stats = await GoNoGoAPI.getStats();
      var allReviews = await GoNoGoAPI.getAllReviews();
      var categories = await GoNoGoAPI.getCategories();

      var avgScore = stats.averageScore || 0;
      var categoriesCount = stats.totalCategories || 0;

      // KPIs
      document.getElementById('kpi-grid').innerHTML =
        '<div class="kpi-card">' +
          '<div class="kpi-label">Total Brands</div>' +
          '<div class="kpi-value">' + allBrands.length + '</div>' +
          '<div class="kpi-delta text-green">Across ' + categoriesCount + ' industries</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Average Score</div>' +
          '<div class="kpi-value">' + Math.round(avgScore) + '<span class="text-sm text-muted">/100</span></div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">Industries</div>' +
          '<div class="kpi-value">' + categoriesCount + '</div>' +
          '<div class="kpi-delta text-muted">SA categories covered</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-label">User Reviews</div>' +
          '<div class="kpi-value">' + allReviews.length + '</div>' +
          '<div class="kpi-delta" style="color:' + (allReviews.length > 0 ? 'var(--green-text)' : 'var(--text-muted)') + ';">' + (allReviews.length > 0 ? allReviews.length + ' submitted' : 'None yet') + '</div>' +
        '</div>';

      // Score Distribution Chart
      var scoreBuckets = { '90-100': 0, '80-89': 0, '70-79': 0, '60-69': 0, '50-59': 0, '<50': 0 };
      allBrands.forEach(function(b) {
        if (b.overallScore >= 90) scoreBuckets['90-100']++;
        else if (b.overallScore >= 80) scoreBuckets['80-89']++;
        else if (b.overallScore >= 70) scoreBuckets['70-79']++;
        else if (b.overallScore >= 60) scoreBuckets['60-69']++;
        else if (b.overallScore >= 50) scoreBuckets['50-59']++;
        else scoreBuckets['<50']++;
      });

      new Chart(document.getElementById('score-chart'), {
        type: 'bar',
        data: {
          labels: Object.keys(scoreBuckets),
          datasets: [{
            data: Object.values(scoreBuckets),
            backgroundColor: ['#d4a017', '#d4a017', '#11a551', '#11a551', '#e74c3c', '#e74c3c'],
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#666', font: { family: 'Inter', size: 11 } } },
            y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#666', font: { family: 'Inter', size: 11 }, stepSize: 2 } }
          }
        }
      });

      // Industry Breakdown
      var industryCount = {};
      allBrands.forEach(function(b) {
        industryCount[b.categoryName] = (industryCount[b.categoryName] || 0) + 1;
      });

      var chartColors = ['#11a551', '#3b82f6', '#ff9800', '#e74c3c', '#8b5cf6', '#06b6d4', '#ec4899', '#f59e0b', '#14b8a6', '#6366f1', '#f97316', '#84cc16', '#ef4444'];
      new Chart(document.getElementById('industry-chart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(industryCount),
          datasets: [{
            data: Object.values(industryCount),
            backgroundColor: chartColors.slice(0, Object.keys(industryCount).length),
            borderWidth: 0,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: {
              position: 'right',
              labels: { color: '#a0a0a0', font: { family: 'Inter', size: 10 }, usePointStyle: true, pointStyle: 'circle', padding: 8 }
            }
          }
        }
      });

      // Verdict Breakdown
      document.getElementById('verdict-breakdown').innerHTML =
        '<div style="text-align:center;padding:var(--space-5);background:rgba(212,160,23,0.12);border-radius:var(--radius-lg);border:1px solid rgba(212,160,23,0.25)">' +
          '<div style="font-size:var(--text-2xl);font-weight:800;color:#d4a017">' + (stats.topPerformerCount || 0) + '</div>' +
          '<div style="font-size:var(--text-xs);font-weight:600;color:#d4a017;margin-top:var(--space-1)">TOP PERFORMER</div>' +
        '</div>' +
        '<div style="text-align:center;padding:var(--space-5);background:var(--green-bg);border-radius:var(--radius-lg);border:1px solid var(--green-dim)">' +
          '<div style="font-size:var(--text-2xl);font-weight:800;color:var(--green-text)">' + stats.goCount + '</div>' +
          '<div style="font-size:var(--text-xs);font-weight:600;color:var(--green-text);margin-top:var(--space-1)">GO</div>' +
        '</div>' +
        '<div style="text-align:center;padding:var(--space-5);background:var(--red-bg);border-radius:var(--radius-lg);border:1px solid var(--red-dim)">' +
          '<div style="font-size:var(--text-2xl);font-weight:800;color:var(--red-text)">' + stats.nogoCount + '</div>' +
          '<div style="font-size:var(--text-xs);font-weight:600;color:var(--red-text);margin-top:var(--space-1)">NOGO</div>' +
        '</div>';

      // Activity Feed
      var topBrands = await GoNoGoAPI.getTopBrands(3);
      var activities = [
        { icon: 'fa-database', bg: 'var(--green-bg)', color: 'var(--green-text)', text: '<strong>' + allBrands.length + ' SA brands</strong> loaded across ' + categoriesCount + ' industries', time: 'Platform data' }
      ];
      if (topBrands.length >= 3) {
        activities.push(
          { icon: 'fa-chart-simple', bg: 'var(--green-bg)', color: 'var(--green-text)', text: 'Top scorer: <strong>' + topBrands[0].name + '</strong> with ' + topBrands[0].overallScore + '/100', time: topBrands[0].categoryName },
          { icon: 'fa-chart-simple', bg: 'var(--green-bg)', color: 'var(--green-text)', text: 'Runner-up: <strong>' + topBrands[1].name + '</strong> with ' + topBrands[1].overallScore + '/100', time: topBrands[1].categoryName },
          { icon: 'fa-chart-simple', bg: 'var(--green-bg)', color: 'var(--green-text)', text: 'Third: <strong>' + topBrands[2].name + '</strong> with ' + topBrands[2].overallScore + '/100', time: topBrands[2].categoryName }
        );
      }

      document.getElementById('activity-feed').innerHTML = activities.map(function(a) {
        return '<div class="activity-item">' +
          '<div class="activity-icon" style="background:' + a.bg + ';color:' + a.color + ';">' +
            '<i class="fa-solid ' + a.icon + '"></i>' +
          '</div>' +
          '<div>' +
            '<div class="activity-text">' + a.text + '</div>' +
            '<div class="activity-time">' + a.time + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  </script>
  <style>
    @media (max-width: 768px) {
      .admin-header + .kpi-grid + div { grid-template-columns: 1fr !important; }
      #verdict-breakdown { grid-template-columns: 1fr !important; }
    }
  </style>
</body>
</html>
