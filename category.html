  <div id="nav"></div>
  <div id="page-content">
    <div style="text-align:center;padding:var(--space-10);color:var(--text-muted)">Loading...</div>
  </div>
  <div id="footer"></div>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components.js"></script>
  <script src="api.js"></script>

  <script>
    var slug = Components.getParam('cat');
    document.getElementById('footer').innerHTML = Components.renderFooter();
    Components.initTheme();

    (async function() {
      if (!slug) {
        // Show all categories grid
        document.getElementById('nav').innerHTML = Components.renderPublicNav('');
        Components.updateThemeIcon();
        document.title = 'All Industries — GoNoGo South Africa';
        var categories = await GoNoGoAPI.getCategoriesWithBrands();
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container">' +
            '<div class="section-header">' +
              '<h1 class="section-title">All Industries</h1>' +
              '<p class="section-subtitle">Browse ' + categories.length + ' South African industries</p>' +
            '</div>' +
            '<div class="industry-grid">' +
              categories.map(function(cat) {
                var itemLabel = cat.categoryType === 'branch' ? 'branch' : 'brand';
                var itemLabelPlural = cat.brandCount !== 1 ? (itemLabel === 'branch' ? 'es' : 's') : '';
                return '<a href="category.html?cat=' + cat.id + '" class="industry-card ' + (cat.hasBrands ? '' : 'no-data') + '">' +
                  '<i class="fa-solid ' + cat.icon + '"></i>' +
                  '<div class="name">' + cat.name + '</div>' +
                  '<div class="count">' + cat.brandCount + ' ' + itemLabel + itemLabelPlural + '</div>' +
                '</a>';
              }).join('') +
            '</div>' +
          '</div></section>';
      } else {
        // Load category data
        var allCats = await GoNoGoAPI.getCategories();
        var catInfo = null;
        for (var i = 0; i < allCats.length; i++) {
          if (allCats[i].id === slug) { catInfo = allCats[i]; break; }
        }

        if (!catInfo) {
          document.getElementById('nav').innerHTML = Components.renderPublicNav('');
          Components.updateThemeIcon();
          document.getElementById('page-content').innerHTML =
            '<section class="section"><div class="container" style="text-align:center">' +
              '<h1 class="section-title">Category Not Found</h1>' +
              '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The category "' + slug + '" does not exist.</p>' +
              '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
            '</div></section>';
          return;
        }

        document.getElementById('nav').innerHTML = Components.renderPublicNav(slug);
        Components.updateThemeIcon();
        document.title = catInfo.name + ' — GoNoGo South Africa';

        var isBranchCategory = catInfo.categoryType === 'branch';
        var itemLabel = isBranchCategory ? 'branch' : 'brand';

        // SEO meta
        var catDesc = 'Compare ' + catInfo.brandCount + ' ' + catInfo.name.toLowerCase() + ' ' + itemLabel + (catInfo.brandCount !== 1 ? (isBranchCategory ? 'es' : 's') : '') + ' in South Africa. Independent ratings on a 100-point scoring framework.';
        var metaTag = document.querySelector('meta[name="description"]');
        if (!metaTag) { metaTag = document.createElement('meta'); metaTag.name = 'description'; document.head.appendChild(metaTag); }
        metaTag.content = catDesc;

        if (isBranchCategory) {
          // ===== BRANCH CATEGORY =====
          var branches = await GoNoGoAPI.getBranchesByCategory(slug);
          var currentSort = 'score-desc';

          window.sortBrands = function(key) {
            currentSort = key;
            if (key === 'score-desc') branches.sort(function(a, b) { return b.total_score - a.total_score; });
            else if (key === 'score-asc') branches.sort(function(a, b) { return a.total_score - b.total_score; });
            else if (key === 'name-asc') branches.sort(function(a, b) { return a.branch_name.localeCompare(b.branch_name); });
            else if (key === 'name-desc') branches.sort(function(a, b) { return b.branch_name.localeCompare(a.branch_name); });
            renderBranches();
          };

          function renderBranchCard(b, i) {
            var stagger = i < 6 ? ' stagger-' + (i + 1) : '';
            var scoreColor = getScoreColor(b.total_score);
            var verdictClass = b.verdict === 'GO' ? 'go' : b.verdict === 'NOGO' ? 'nogo' : 'caution';
            return '<a href="branch.html?id=' + b.branch_id + '" class="brand-card animate-in' + stagger + '" style="text-decoration:none">' +
              '<div class="brand-card-top">' +
                '<div style="width:48px;height:48px;border-radius:var(--radius-lg);background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:var(--text-lg);flex-shrink:0">' +
                  '<i class="fa-solid fa-building-columns" style="color:var(--green)"></i>' +
                '</div>' +
                '<div class="brand-card-info">' +
                  '<div class="brand-card-name">' + b.branch_name + '</div>' +
                  '<div class="brand-card-meta">' +
                    '<span class="verdict-badge verdict-' + verdictClass + '">' + b.verdict + '</span>' +
                    '<span class="score-badge" style="color:' + scoreColor + '">' + b.total_score + '/100</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="brand-card-stats" style="font-size:var(--text-xs);color:var(--text-secondary)">' +
                '<span><i class="fa-solid fa-map-marker-alt"></i> ' + b.province + '</span>' +
                '<span><i class="fa-solid fa-user-tie"></i> ' + (b.manager || 'N/A') + '</span>' +
              '</div>' +
            '</a>';
          }

          function renderBranches() {
            var grid = document.getElementById('brand-grid');
            grid.innerHTML = branches.map(function(b, i) { return renderBranchCard(b, i); }).join('');
            document.querySelectorAll('.sort-btn').forEach(function(btn) {
              btn.classList.toggle('active', btn.dataset.sort === currentSort);
            });
          }

          // Branch scoring framework
          var branchFramework = [
            { name: 'Compliance', max: 15 },
            { name: 'Customer Satisfaction', max: 25 },
            { name: 'Service Offering', max: 30 },
            { name: 'Innovation', max: 10 },
            { name: 'Customer Support', max: 10 },
            { name: 'Accessibility & Security', max: 10 }
          ];
          var frameworkHTML = branchFramework.map(function(sc) {
            var pct = Math.round((sc.max / 100) * 100);
            return '<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0">' +
              '<span style="font-size:var(--text-sm);font-weight:600;min-width:180px;color:var(--text-secondary)">' + sc.name + '</span>' +
              '<div class="score-bar" style="flex:1"><div class="score-bar-fill" style="width:' + pct + '%;background:var(--green)"></div></div>' +
              '<span style="font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;min-width:32px;text-align:right;color:var(--text-primary)">' + sc.max + '</span>' +
            '</div>';
          }).join('');

          document.getElementById('page-content').innerHTML =
            '<section class="section-sm" style="border-bottom:1px solid var(--border-primary)"><div class="container">' +
              '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-2)">' +
                '<a href="index.html" style="color:var(--text-muted);font-size:var(--text-sm)"><i class="fa-solid fa-arrow-left"></i> Home</a>' +
              '</div>' +
              '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)">' +
                '<div style="width:56px;height:56px;border-radius:var(--radius-lg);background:var(--green-bg);border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:var(--text-xl)">' +
                  '<i class="fa-solid ' + catInfo.icon + '" style="color:var(--green)"></i>' +
                '</div>' +
                '<div>' +
                  '<h1 style="font-size:var(--text-2xl);font-weight:800;letter-spacing:-0.02em">' + catInfo.name + '</h1>' +
                  '<p style="font-size:var(--text-sm);color:var(--text-secondary)">' + branches.length + ' branch' + (branches.length !== 1 ? 'es' : '') + ' reviewed</p>' +
                '</div>' +
              '</div>' +
            '</div></section>' +
            '<section class="section-sm" style="background:var(--surface-1);border-bottom:1px solid var(--border-primary)"><div class="container">' +
              '<h2 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Scoring Framework</h2>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">Each ' + catInfo.name.toLowerCase() + ' branch is scored out of 100 across these weighted categories:</p>' +
              '<div style="max-width:600px">' + frameworkHTML + '</div>' +
            '</div></section>' +
            '<section class="section"><div class="container">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-6)">' +
                '<h2 style="font-size:var(--text-lg);font-weight:700">All Branches</h2>' +
                '<div class="filter-pills">' +
                  '<button class="filter-pill sort-btn active" data-sort="score-desc" onclick="sortBrands(\'score-desc\')"><i class="fa-solid fa-arrow-down-wide-short"></i> Score ↓</button>' +
                  '<button class="filter-pill sort-btn" data-sort="score-asc" onclick="sortBrands(\'score-asc\')"><i class="fa-solid fa-arrow-up-wide-short"></i> Score ↑</button>' +
                  '<button class="filter-pill sort-btn" data-sort="name-asc" onclick="sortBrands(\'name-asc\')"><i class="fa-solid fa-arrow-down-a-z"></i> Name A–Z</button>' +
                  '<button class="filter-pill sort-btn" data-sort="name-desc" onclick="sortBrands(\'name-desc\')"><i class="fa-solid fa-arrow-up-z-a"></i> Name Z–A</button>' +
                '</div>' +
              '</div>' +
              '<div class="brand-grid" id="brand-grid"></div>' +
            '</div></section>';

          renderBranches();

        } else {
          // ===== REGULAR BRAND CATEGORY =====
          var brands = await GoNoGoAPI.getBrandsByCategory(slug);
          var currentSort = 'score-desc';

          window.sortBrands = function(key) {
            currentSort = key;
            if (key === 'score-desc') brands.sort(function(a, b) { return b.overallScore - a.overallScore; });
            else if (key === 'score-asc') brands.sort(function(a, b) { return a.overallScore - b.overallScore; });
            else if (key === 'name-asc') brands.sort(function(a, b) { return a.name.localeCompare(b.name); });
            else if (key === 'name-desc') brands.sort(function(a, b) { return b.name.localeCompare(a.name); });
            renderBrands();
          };

          function renderBrands() {
            var grid = document.getElementById('brand-grid');
            grid.innerHTML = brands.map(function(brand, i) { return Components.renderBrandCard(brand, i); }).join('');
            brands.forEach(function(brand) {
              Components.createRadarChart('radar-' + brand.id, brand, { showTicks: false, labelSize: 9, pointRadius: 2 });
            });
            document.querySelectorAll('.sort-btn').forEach(function(btn) {
              btn.classList.toggle('active', btn.dataset.sort === currentSort);
            });
          }

          // Build scoring framework display
          var frameworkHTML = (catInfo.scoringCategories || []).map(function(sc) {
            var pct = Math.round((sc.max / 100) * 100);
            return '<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0">' +
              '<span style="font-size:var(--text-sm);font-weight:600;min-width:180px;color:var(--text-secondary)">' + sc.name + '</span>' +
              '<div class="score-bar" style="flex:1"><div class="score-bar-fill" style="width:' + pct + '%;background:var(--green)"></div></div>' +
              '<span style="font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;min-width:32px;text-align:right;color:var(--text-primary)">' + sc.max + '</span>' +
            '</div>';
          }).join('');

          document.getElementById('page-content').innerHTML =
            '<section class="section-sm" style="border-bottom:1px solid var(--border-primary)"><div class="container">' +
              '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-2)">' +
                '<a href="index.html" style="color:var(--text-muted);font-size:var(--text-sm)"><i class="fa-solid fa-arrow-left"></i> Home</a>' +
              '</div>' +
              '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)">' +
                '<div style="width:56px;height:56px;border-radius:var(--radius-lg);background:var(--green-bg);border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:var(--text-xl)">' +
                  '<i class="fa-solid ' + catInfo.icon + '" style="color:var(--green)"></i>' +
                '</div>' +
                '<div>' +
                  '<h1 style="font-size:var(--text-2xl);font-weight:800;letter-spacing:-0.02em">' + catInfo.name + '</h1>' +
                  '<p style="font-size:var(--text-sm);color:var(--text-secondary)">' + brands.length + ' brand' + (brands.length !== 1 ? 's' : '') + ' reviewed</p>' +
                '</div>' +
              '</div>' +
            '</div></section>' +
            '<section class="section-sm" style="background:var(--surface-1);border-bottom:1px solid var(--border-primary)"><div class="container">' +
              '<h2 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Scoring Framework</h2>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">Each ' + catInfo.name.toLowerCase() + ' brand is scored out of 100 across these weighted categories:</p>' +
              '<div style="max-width:600px">' + frameworkHTML + '</div>' +
            '</div></section>' +
            '<section class="section"><div class="container">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-6)">' +
                '<h2 style="font-size:var(--text-lg);font-weight:700">All Brands</h2>' +
                '<div class="filter-pills">' +
                  '<button class="filter-pill sort-btn active" data-sort="score-desc" onclick="sortBrands(\'score-desc\')"><i class="fa-solid fa-arrow-down-wide-short"></i> Score ↓</button>' +
                  '<button class="filter-pill sort-btn" data-sort="score-asc" onclick="sortBrands(\'score-asc\')"><i class="fa-solid fa-arrow-up-wide-short"></i> Score ↑</button>' +
                  '<button class="filter-pill sort-btn" data-sort="name-asc" onclick="sortBrands(\'name-asc\')"><i class="fa-solid fa-arrow-down-a-z"></i> Name A–Z</button>' +
                  '<button class="filter-pill sort-btn" data-sort="name-desc" onclick="sortBrands(\'name-desc\')"><i class="fa-solid fa-arrow-up-z-a"></i> Name Z–A</button>' +
                '</div>' +
              '</div>' +
              '<div class="brand-grid" id="brand-grid"></div>' +
            '</div></section>';

          renderBrands();
        }
      }
    })();
  </script>
</body>
