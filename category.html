<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <!-- Created with Perplexity Computer -->
  <meta name="generator" content="Perplexity Computer">
  <meta name="author" content="Perplexity Computer">
  <meta property="og:see_also" content="https://www.perplexity.ai/computer">
  <link rel="author" href="https://www.perplexity.ai/computer">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category — GoNoGo South Africa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="nav"></div>
  <div id="page-content">
    <div style="text-align:center;padding:var(--space-10);color:var(--text-muted)">Loading...</div>
  </div>
  <div id="footer"></div>

  <!-- Data + helpers -->
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Components -->
  <script src="components.js"></script>

  <!-- Supabase + API wrapper -->
  <script src="https://esm.sh/@supabase/supabase-js@2.48.0"></script>
  <script src="api-v2.js"></script>


  <script>
  var slug = Components.getParam('cat');

  document.getElementById('footer').innerHTML = Components.renderFooter();

  async function initCategory() {
    try {
      // No slug: show all industries
      if (!slug) {
        document.getElementById('nav').innerHTML = Components.renderPublicNav('');

        // Get categories via API helper instead of BRANDDATA
        var categories = await GoNoGoAPI.getCategoriesWithBrands();
        // Fallback if helper missing
        if (!categories || !categories.length) {
          categories = await GoNoGoAPI.getCategories();
          categories = categories.map(function(c) {
            return {
              id: c.slug || c.id,
              name: c.category || c.name,
              icon: c.icon || 'fa-tags',
              brandCount: c.brandCount || 0,
              hasBrands: (c.brandCount || 0) > 0
            };
          });
        }

        document.title = 'All Industries — GoNoGo South Africa';

        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container">' +
            '<div class="section-header">' +
              '<h1 class="section-title">All Industries</h1>' +
              '<p class="section-subtitle">Browse ' + categories.length + ' South African industries</p>' +
            '</div>' +
            '<div class="industry-grid">' +
              categories.map(function(cat) {
                return '<a href="category.html?cat=' + (cat.slug || cat.id) + '" class="industry-card ' +
                  ((cat.hasBrands || cat.brandCount > 0) ? '' : 'no-data') + '">' +
                    '<i class="fa-solid ' + (cat.icon || "fa-tags") + '"></i>' +
                    '<div class="name">' + (cat.category || cat.name) + '</div>' +
                    '<div class="count">' + (cat.brandCount || 0) + ' brand' +
                      ((cat.brandCount || 0) !== 1 ? 's' : '') + '</div>' +
                '</a>';
              }).join('') +
            '</div>' +
          '</div></section>';
        return;
      }

      // Category view
      document.getElementById('nav').innerHTML = Components.renderPublicNav(slug);

      // Get category meta + scoring framework via helpers / API
      var allCats = await GoNoGoAPI.getCategories();
      var catInfo = null;
      for (var i = 0; i < allCats.length; i++) {
        var c = allCats[i];
        var id = c.slug || c.id;
        if (id === slug) {
          catInfo = {
            id: id,
            name: c.category || c.name,
            icon: c.icon || 'fa-tags',
            scoringCategories: c.scoringCategories || c.scoringcategories || []
          };
          break;
        }
      }

      if (!catInfo) {
        document.title = 'Category Not Found — GoNoGo South Africa';
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container" style="text-align:center">' +
            '<h1 class="section-title">Category Not Found</h1>' +
            '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The category slug does not exist.</p>' +
            '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
          '</div></section>';
        return;
      }

      // Brands via API wrapper
      var brands = await GoNoGoAPI.getBrandsByCategory(slug);
      brands = brands.map(function(b) {
        b.categoryName = catInfo.name;
        return b;
      });

      document.title = catInfo.name + ' — GoNoGo South Africa';

      var currentSort = 'score-desc';
      window.sortBrands = function(key) {
        currentSort = key;
        if (key === 'score-desc') {
          brands.sort(function(a, b) { return b.overallScore - a.overallScore; });
        } else if (key === 'score-asc') {
          brands.sort(function(a, b) { return a.overallScore - b.overallScore; });
        } else if (key === 'name-asc') {
          brands.sort(function(a, b) { return a.name.localeCompare(b.name); });
        } else if (key === 'name-desc') {
          brands.sort(function(a, b) { return b.name.localeCompare(a.name); });
        }
        renderBrands();
      };

      function renderBrands() {
        var grid = document.getElementById('brand-grid');
        grid.innerHTML = brands.map(function(brand) {
          return Components.renderBrandCard(brand);
        }).join('');

        brands.forEach(function(brand) {
          Components.createRadarChart('radar-' + brand.id, brand, {
            showTicks: false,
            labelSize: 9,
            pointRadius: 2
          });
        });

        document.querySelectorAll('.sort-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.sort === currentSort);
        });
      }

      // Scoring framework display
      var frameworkHTML = (catInfo.scoringCategories || []).map(function(sc) {
        var pct = sc.max ? Math.round((sc.max / 100) * 100) : 0;
        return (
          '<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0">' +
            '<span style="font-size:var(--text-sm);font-weight:600;min-width:180px;color:var(--text-secondary)">' + sc.name + '</span>' +
            '<div class="score-bar" style="flex:1">' +
              '<div class="score-bar-fill" style="width:' + pct + '%;background:var(--green)"></div>' +
            '</div>' +
            '<span style="font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;min-width:32px;text-align:right;color:var(--text-primary)">' + sc.max + '</span>' +
          '</div>'
        );
      }).join('');

      document.getElementById('page-content').innerHTML =
        '<section class="section-sm" style="border-bottom:1px solid var(--border-primary)"><div class="container">' +
          '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-2)">' +
            '<a href="index.html" style="color:var(--text-muted);font-size:var(--text-sm)"><i class="fa-solid fa-arrow-left"></i> Home</a>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)">' +
            '<div style="width:56px;height:56px;border-radius:var(--radius-lg);background:var(--green-bg);border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:var(--text-xl)">' +
              '<i class="fa-solid ' + catInfo.icon + '" style="color:var(--green)"></i>' +
            '</div>' +
            '<div>' +
              '<h1 style="font-size:var(--text-2xl);font-weight:800;letter-spacing:-0.02em">' + catInfo.name + '</h1>' +
              '<p style="font-size:var(--text-sm);color:var(--text-secondary)">' + brands.length + ' brand' + (brands.length !== 1 ? 's' : '') + ' reviewed</p>' +
            '</div>' +
          '</div>' +
        '</div></section>' +

        '<section class="section-sm" style="background:var(--surface-1);border-bottom:1px solid var(--border-primary)"><div class="container">' +
          '<h2 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Scoring Framework</h2>' +
          '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">' +
            'Each ' + catInfo.name.toLowerCase() + ' brand is scored out of 100 across these weighted categories.' +
          '</p>' +
          '<div style="max-width:600px">' + frameworkHTML + '</div>' +
        '</div></section>' +

        '<section class="section"><div class="container">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-6)">' +
            '<h2 style="font-size:var(--text-lg);font-weight:700">All Brands</h2>' +
            '<div class="filter-pills">' +
              '<button class="filter-pill sort-btn active" data-sort="score-desc" onclick="sortBrands(\'score-desc\')"><i class="fa-solid fa-arrow-down-wide-short"></i> Score</button>' +
              '<button class="filter-pill sort-btn" data-sort="score-asc" onclick="sortBrands(\'score-asc\')"><i class="fa-solid fa-arrow-up-wide-short"></i> Score</button>' +
              '<button class="filter-pill sort-btn" data-sort="name-asc" onclick="sortBrands(\'name-asc\')"><i class="fa-solid fa-arrow-down-a-z"></i> Name A–Z</button>' +
              '<button class="filter-pill sort-btn" data-sort="name-desc" onclick="sortBrands(\'name-desc\')"><i class="fa-solid fa-arrow-up-z-a"></i> Name Z–A</button>' +
            '</div>' +
          '</div>' +
          '<div class="brand-grid" id="brand-grid"></div>' +
        '</div></section>';

      // initial render
      brands.sort(function(a, b) { return b.overallScore - a.overallScore; });
      renderBrands();
    } catch (e) {
      console.error('Error initialising category', e);
      document.getElementById('page-content').innerHTML =
        '<section class="section"><div class="container" style="text-align:center">' +
          '<h1 class="section-title">Error Loading Data</h1>' +
          '<p class="section-subtitle">We could not load brand data at this time.</p>' +
        '</div></section>';
    }
  }

  initCategory();
</script>

</body>
</html>
