<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Survey</title>

    <!-- Base CSS token layer -->
    <link rel="stylesheet" href="style.css" />

    <style>
      :root {
        /* Brand tokens – primary = your green, accent is a soft tint */
        --s-primary: #11a551;
        --s-accent: #dff3e6;

        --s-ink: #0f172a;
        --s-ink-soft: #475569;
        --s-muted: #64748b;

        --s-bg: #dff3e6;
        --s-card: #ffffff;

        --s-border: #e2e8f0;
        --s-border-strong: #cbd5e1;

        --s-danger: #dc2626;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--s-bg);
        color: var(--s-ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        box-sizing: border-box;
      }

      /* Confetti must never block clicks */
      canvas {
        pointer-events: none !important;
      }

      /* Shared shell */
      .s-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 48px;
      }

      .s-shell {
        width: 100%;
        max-width: 640px;
      }

      /* Header with brand logo + mode toggle */
      .s-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        min-height: 110px;
      }

      .s-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .s-brand img {
        max-height: 110px;
        max-width: 380px;
        width: auto;
        object-fit: contain;
      }

      .s-brand-name {
        font-weight: 700;
        font-size: 15px;
        color: var(--s-ink);
      }

      .s-mode-toggle {
        display: inline-flex;
        gap: 4px;
        background: var(--s-card);
        border: 1px solid var(--s-border);
        padding: 4px;
        border-radius: 999px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .s-mode-btn {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 6px 14px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 13px;
        color: var(--s-ink-soft);
        cursor: pointer;
      }

      .s-mode-btn.active {
        background: var(--s-primary);
        color: #fff;
      }

      /* Progress */
      .s-progress {
        height: 6px;
        background: var(--s-border);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 18px;
      }

      .s-progress span {
        display: block;
        height: 100%;
        background: var(--s-primary);
        transition: width 0.25s ease;
      }

      .s-progress-text {
        font-size: 12px;
        color: var(--s-muted);
        margin-bottom: 14px;
        font-weight: 600;
      }

      /* Card */
      .s-card {
        background: var(--s-card);
        border: 1px solid var(--s-border);
        border-radius: 18px;
        padding: 28px 24px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
      }

      .s-prompt {
        font-size: 20px;
        line-height: 1.45;
        font-weight: 600;
        color: var(--s-ink);
        margin: 0 0 14px;
        white-space: pre-line;
      }

      .s-prompt.s-prompt-long {
        font-size: 17px;
        font-weight: 500;
        line-height: 1.55;
      }

      .s-prompt .req {
        color: var(--s-danger);
        margin-left: 4px;
      }

      .s-help {
        font-size: 14px;
        color: var(--s-muted);
        margin: 0 0 20px;
        line-height: 1.45;
      }

      .s-intro-title {
        font-size: 26px;
        font-weight: 800;
        margin: 0 0 8px;
        letter-spacing: -0.01em;
      }

      .s-intro-text {
        font-size: 15px;
        color: var(--s-ink-soft);
        margin: 0 0 20px;
        line-height: 1.5;
      }

      /* Big button inputs – shared by both modes in classic light theme */
      .s-choice-grid {
        display: grid;
        gap: 10px;
      }

      .s-choice-grid.cols-2 {
        grid-template-columns: 1fr 1fr;
      }

      .s-choice-grid.cols-5 {
        grid-template-columns: repeat(5, 1fr);
      }

      .s-choice-grid.cols-11 {
        grid-template-columns: repeat(11, 1fr);
      }

      @media (max-width: 520px) {
        .s-choice-grid.cols-11 {
          grid-template-columns: repeat(6, 1fr);
        }
      }

      .s-choice {
        appearance: none;
        border: 1.5px solid var(--s-border-strong);
        background: var(--s-card);
        color: var(--s-ink);
        padding: 18px 14px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        transition: all 0.12s ease;
        font-family: inherit;
        line-height: 1.2;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .s-choice:hover {
        border-color: var(--s-primary);
        background: rgba(17, 165, 81, 0.04);
      }

      .s-choice.active {
        background: var(--s-primary);
        border-color: var(--s-primary);
        color: #fff;
      }

      .s-choice.left-align {
        text-align: left;
        justify-content: flex-start;
        padding: 16px 18px;
        font-size: 15px;
      }

      .s-choice.big-emoji {
        font-size: 30px;
        padding: 14px 0;
      }

      .s-choice.star {
        font-size: 24px;
        padding: 16px 0;
      }

      .s-choice.star.active {
        background: #f59e0b;
        border-color: #f59e0b;
      }

      .s-choice.nps-red.active {
        background: var(--s-danger);
        border-color: var(--s-danger);
      }

      .s-choice.nps-amber.active {
        background: #d97706;
        border-color: #d97706;
      }

      .s-nps-labels {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--s-muted);
        margin-top: 6px;
        font-weight: 600;
      }

      /* Text inputs */
      .s-text-input {
        width: 100%;
        padding: 16px 14px;
        border: 1.5px solid var(--s-border-strong);
        border-radius: 14px;
        font-size: 16px;
        font-family: inherit;
        background: var(--s-card);
        color: var(--s-ink);
      }

      .s-text-input:focus {
        outline: none;
        border-color: var(--s-primary);
        box-shadow: 0 0 0 3px rgba(17, 165, 81, 0.15);
      }

      textarea.s-text-input {
        min-height: 120px;
        resize: vertical;
      }

      /* Nav buttons */
      .s-nav {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .s-btn {
        flex: 1;
        appearance: none;
        border: 0;
        padding: 16px 20px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.12s, background 0.12s;
        min-height: 52px;
      }

      .s-btn-prev {
        background: var(--s-border);
        color: var(--s-ink-soft);
      }

      .s-btn-prev:hover {
        background: var(--s-border-strong);
      }

      .s-btn-prev:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .s-btn-next {
        background: var(--s-primary);
        color: #fff;
      }

      .s-btn-next:hover {
        background: #0e8e45;
      }

      .s-btn-next:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .s-error {
        color: var(--s-danger);
        font-size: 13px;
        margin-top: 10px;
        min-height: 18px;
        font-weight: 600;
      }

      .s-affirm {
        color: var(--s-primary);
        font-size: 13px;
        margin-top: 10px;
        min-height: 18px;
        font-weight: 600;
      }

      .s-foot {
        text-align: center;
        font-size: 11px;
        color: var(--s-muted);
        margin-top: 20px;
        letter-spacing: 0.04em;
      }

      .s-foot a {
        color: var(--s-primary);
        text-decoration: none;
        font-weight: 600;
      }

      .s-thank {
        text-align: center;
        padding: 48px 24px;
      }

      .s-thank h2 {
        color: var(--s-primary);
        font-size: 26px;
        margin: 0 0 8px;
      }

      .s-thank p {
        color: var(--s-ink-soft);
        margin: 0;
      }

      /* Party mode overrides – still “shiny”, but brand-led */
      body.party-mode {
        background: linear-gradient(180deg, #0b1020 0, #111827 100%);
      }

      body.party-mode .s-wrap {
        background: radial-gradient(
              circle at top left,
              rgba(17, 165, 81, 0.18),
              transparent 28%
            ),
          radial-gradient(
              circle at top right,
              rgba(168, 85, 247, 0.18),
              transparent 30%
            );
        min-height: 100vh;
      }

      body.party-mode .s-brand-name {
        color: #fff;
      }

      body.party-mode .s-mode-toggle {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.18);
      }

      body.party-mode .s-mode-btn {
        color: rgba(255, 255, 255, 0.78);
      }

      body.party-mode .s-mode-btn.active {
        background: #fff;
        color: #111;
      }

      body.party-mode .s-progress {
        background: rgba(255, 255, 255, 0.15);
      }

      body.party-mode .s-progress span {
        background: linear-gradient(90deg, #22c55e, #a855f7, #f59e0b);
      }

      body.party-mode .s-progress-text {
        color: rgba(255, 255, 255, 0.78);
      }

      body.party-mode .s-card {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        border-radius: 28px;
      }

      body.party-mode .s-prompt,
      body.party-mode .s-intro-title {
        color: #fff;
        font-size: 24px;
      }

      body.party-mode .s-prompt.s-prompt-long {
        font-size: 19px;
      }

      body.party-mode .s-help,
      body.party-mode .s-intro-text {
        color: rgba(255, 255, 255, 0.82);
      }

      body.party-mode .s-choice {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.14);
        color: #fff;
      }

      body.party-mode .s-choice:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.3);
      }

      body.party-mode .s-choice.active {
        background: rgba(34, 197, 94, 0.28);
        border-color: rgba(34, 197, 94, 0.6);
        color: #fff;
      }

      body.party-mode .s-choice.star.active {
        background: rgba(245, 158, 11, 0.28);
        border-color: rgba(245, 158, 11, 0.6);
        color: #ffd54f;
      }

      body.party-mode .s-choice.nps-red.active {
        background: rgba(239, 68, 68, 0.3);
        border-color: rgba(239, 68, 68, 0.6);
      }

      body.party-mode .s-choice.nps-amber.active {
        background: rgba(217, 119, 6, 0.3);
        border-color: rgba(217, 119, 6, 0.6);
      }

      body.party-mode .s-text-input {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      body.party-mode .s-text-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      body.party-mode .s-btn-prev {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      body.party-mode .s-btn-prev:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      body.party-mode .s-btn-next {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }

      body.party-mode .s-nps-labels {
        color: rgba(255, 255, 255, 0.7);
      }

      body.party-mode .s-streak {
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 12px;
        font-weight: 700;
        color: #fff;
      }

      body.party-mode .s-affirm {
        color: #a7f3d0;
      }

      body.party-mode .s-foot {
        color: rgba(255, 255, 255, 0.6);
      }

      /* Party “hero” elements */
      .s-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(17, 165, 81, 0.08);
        color: var(--s-primary);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .s-party-wrap {
        display: grid;
        gap: 16px;
      }

      .s-party-hero {
        display: grid;
        gap: 14px;
      }

      .s-party-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .s-stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .s-stat-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .s-party-stage {
        position: relative;
        min-height: 420px;
        perspective: 1200px;
      }

      .s-swipe-card {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        padding: 26px 22px 18px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.08)
        );
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
      }

      .s-swipe-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            circle at top left,
            rgba(34, 197, 94, 0.18),
            transparent 34%
          ),
          radial-gradient(
            circle at top right,
            rgba(168, 85, 247, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at bottom,
            rgba(245, 158, 11, 0.12),
            transparent 30%
          );
        pointer-events: none;
      }

      .s-swipe-deck {
        position: relative;
        min-height: 360px;
      }

      .s-swipe-shadow {
        position: absolute;
        inset: 16px 14px -6px 14px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transform: scale(0.97) translateY(10px);
      }

      .s-swipe-inner {
        position: relative;
        z-index: 2;
        touch-action: pan-y;
        user-select: none;
        transition: transform 0.18s ease, opacity 0.18s ease;
        cursor: grab;
      }

      .s-swipe-inner.dragging {
        transition: none;
        cursor: grabbing;
      }

      .s-party-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 28px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .s-party-prompt {
        font-size: 28px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #fff;
        margin: 0;
      }

      .s-party-help {
        font-size: 15px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.82);
        margin: 0;
      }

      .s-swipe-hint {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .s-swipe-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .s-party-choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 18px;
      }

      .s-party-choice {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 14px 14px;
        border-radius: 18px;
        font-size: 14px;
        font-weight: 800;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .s-party-choice.is-pos {
        box-shadow: inset 0 0 0 1px rgba(74, 222, 128, 0.16);
      }

      .s-party-choice.is-neg {
        box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.16);
      }

      .s-party-choice.active {
        transform: scale(0.98);
        background: rgba(34, 197, 94, 0.22);
        border-color: rgba(74, 222, 128, 0.42);
      }

      .s-party-energy {
        height: 10px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
      }

      .s-party-energy span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #a855f7, #f59e0b);
        border-radius: 999px;
        transition: width 0.28s ease;
      }

      .s-party-copy {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .s-party-copy small {
        color: rgba(255, 255, 255, 0.75);
        font-size: 12px;
        font-weight: 700;
      }

      .s-cheer {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .s-party-sparkles {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .s-party-sparkles.hidden {
        display: none;
      }

      .s-party-grid-compact {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 18px;
      }

      .s-party-grid-compact.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .s-party-grid-compact.cols-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .s-party-grid-compact.cols-11 {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .s-party-grid-compact .s-party-choice {
        min-height: 56px;
        padding: 12px 10px;
        font-size: 13px;
      }

      .s-party-grid-compact .s-party-choice.big {
        min-height: 64px;
        font-size: 18px;
      }

      .s-party-grid-compact .s-party-choice.score {
        font-variant-numeric: tabular-nums;
      }

      .s-party-answer-wrap {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .s-party-tipline {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 700;
      }

      .s-party-multi-note {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        margin-top: 2px;
      }

      @media (max-width: 640px) {
        .s-party-grid-compact.cols-5 {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .s-party-grid-compact.cols-11 {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      .s-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 11px;
        font-weight: 800;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .s-party-final {
        display: grid;
        gap: 14px;
        text-align: center;
      }

      .s-party-final h2 {
        margin: 0;
        color: #fff;
        font-size: 30px;
        letter-spacing: -0.02em;
      }

      .s-party-final p {
        margin: 0;
        color: rgba(255, 255, 255, 0.8);
        font-size: 15px;
        line-height: 1.55;
      }

      /* Mascot “pop” */
      .s-party-mascot {
        position: fixed;
        left: 50%;
        bottom: 72px;
        transform: translateX(-50%) translateY(32px) scale(0.82);
        width: min(420px, 92vw);
        padding: 18px 20px;
        border-radius: 26px;
        background: linear-gradient(
          180deg,
          rgba(18, 24, 38, 0.96),
          rgba(18, 24, 38, 0.9)
        );
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 34px 72px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 60;
        opacity: 0;
        pointer-events: none;
      }

      .s-party-mascot.show {
        animation: s-mascot-pop 2.7s ease forwards;
      }

      .s-party-mascot-blob {
        width: 92px;
        height: 92px;
        border-radius: 28px;
        display: grid;
        place-items: center;
        background: radial-gradient(
            circle at 30% 30%,
            #ffffff,
            #d4af37 38%,
            var(--s-primary) 68%,
            #050505 100%
          );
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16),
          0 16px 34px rgba(0, 0, 0, 0.24);
      }

      .s-party-mascot-blob span {
        font-size: 48px;
        filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.22));
      }

      .s-party-mascot-copy strong {
        display: block;
        color: #fff;
        font-size: 20px;
        line-height: 1.12;
      }

      .s-party-mascot-copy p {
        margin: 6px 0 0;
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        line-height: 1.45;
      }

      @keyframes s-mascot-pop {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(34px) scale(0.8);
        }
        10% {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1.04);
        }
        20% {
          opacity: 1;
          transform: translateX(-50%) translateY(-8px) scale(1);
        }
        78% {
          opacity: 1;
          transform: translateX(-50%) translateY(-4px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-22px) scale(0.96);
        }
      }

      @media (max-width: 640px) {
        .s-shell {
          max-width: 100%;
        }

        .s-swipe-card {
          padding: 24px 18px 18px;
        }

        .s-swipe-inner {
          gap: 16px;
        }

        .s-swipe-hint {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          font-size: 10px;
        }

        .s-party-grid-compact.cols-11 {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .s-party-mascot {
          bottom: 64px;
          padding: 16px;
          width: min(360px, 92vw);
        }

        .s-party-mascot-blob {
          width: 76px;
          height: 76px;
        }

        .s-party-mascot-blob span {
          font-size: 40px;
        }

        .s-party-mascot-copy strong {
          font-size: 18px;
        }
      }

      :focus-visible {
        outline: 2px solid var(--s-primary);
        outline-offset: 2px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>

  <body>
    <div class="s-wrap" id="root">
      <div class="s-shell">
        <div class="s-card">
          <p>Loading…</p>
        </div>
      </div>
    </div>

    <script src="api.js?v=20260424b"></script>
    <script>
      const token = new URLSearchParams(location.search).get("t");

      const state = {
        survey: null,
        questions: [],
        values: {},
        mode: "classic",
        currentIdx: -1,
        intro: -1,
        streak: 0,
        partyMascotShown: false,
        started: false,
      };

      function esc(s) {
        return String(s ?? "").replace(/[&<>"']/g, function (c) {
          return (
            {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            }[c] || c
          );
        });
      }

      function isPartyQuickQuestion(q) {
        return (
          ["yesno", "singleselect", "multiselect", "rating15", "starrating", "csatsmiley", "nps010", "consent"].indexOf(
            q.qtype
          ) !== -1
        );
      }

      function partyIconForQuestion(q) {
        const map = {
          yesno: "👍",
          singleselect: "✅",
          multiselect: "🧩",
          rating15: "⭐",
          starrating: "⭐",
          csatsmiley: "😊",
          nps010: "📈",
          consent: "🔒",
        };
        return map[q.qtype] || "✨";
      }

      function haptic(ms) {
        try {
          if (navigator.vibrate) navigator.vibrate(ms);
        } catch (e) {}
      }

      function partyCheer() {
        const cheers = [
          "Nice one!",
          "You are flying!",
          "Looking good!",
          "That was smooth.",
          "Love the energy.",
          "Quick and easy!",
        ];
        return cheers[state.streak % cheers.length];
      }

      function partyEnergy(total) {
        if (!total) return 8;
        return Math.max(
          8,
          Math.min(100, Math.round(((state.currentIdx + 1) / total) * 100))
        );
      }

      function shouldShowPartyMascot() {
        return (
          state.mode === "party" &&
          !state.partyMascotShown &&
          state.currentIdx >= 2
        );
      }

      function showPartyMascot() {
        state.partyMascotShown = true;
        const node = document.getElementById("party-mascot");
        if (!node) return;
        node.classList.remove("show");
        void node.offsetWidth;
        node.classList.add("show");
        haptic(26);
        setTimeout(() => node.classList.remove("show"), 2700);
      }

      function canUsePartyMode() {
        return state.questions.every((q) => isPartyQuickQuestion(q));
      }

      async function load() {
        if (!token) {
          showError("Missing survey token.");
          return;
        }
        try {
          const res = await GoNoGoAPI.cx.publicGetSurvey(token);
          if (!res || !res.ok) {
            showError(res && res.error ? res.error : "Survey not available.");
            return;
          }
          state.survey = res.survey;
          state.questions = res.questions || [];

          applyBrandTheme();
          state.mode =
            res.survey.partymodedefault && canUsePartyMode()
              ? "party"
              : "classic";
          applyModeClass();
          render();
        } catch (e) {
          showError(e.message || "Failed to load survey.");
        }
      }

      function normalizeHexColor(v) {
        const s = String(v || "").trim();
        if (!s) return null;
        if (s.charAt(0) !== "#") {
          return /^[0-9a-fA-F]{3,6}$/.test(s) ? "#" + s : null;
        }
        return /^[0-9a-fA-F]{3,6}$/.test(s.slice(1)) ? s : null;
      }

      function applyBrandTheme() {
        const root = document.documentElement;
        const s = state.survey || null;
        if (!root || !s) return;

        const fallbackPrimary = "#11a551";
        const fallbackSecondary = "#dff3e6";

        const primary =
          normalizeHexColor(
            s.brandprimarycolor ||
              s.primarycolour ||
              s.primarycolor ||
              s.primaryColor
          ) || fallbackPrimary;
        const accent =
          normalizeHexColor(
            s.brandaccentcolor ||
              s.accentcolour ||
              s.accentcolor ||
              s.accentColor
          ) || fallbackSecondary;

        root.style.setProperty("--s-primary", primary);
        root.style.setProperty("--s-accent", accent);
        root.style.setProperty("--s-bg", accent);

        let style = document.getElementById("dynamic-brand-theme");
        if (!style) {
          style = document.createElement("style");
          style.id = "dynamic-brand-theme";
          document.head.appendChild(style);
        }

        style.textContent = `
          html, body {
            background: var(--s-bg);
          }
          .s-wrap {
            background: transparent;
          }

          .s-btn-next {
            background: var(--s-primary) !important;
            background-image: none !important;
            border: 0 !important;
            box-shadow: none !important;
            opacity: 1 !important;
            filter: none !important;
          }
          .s-btn-next:hover,
          .s-btn-next:focus,
          .s-btn-next:active {
            background: var(--s-primary) !important;
            background-image: none !important;
            filter: none !important;
            opacity: 1 !important;
          }

          .s-progress span,
          .s-choice.active,
          .s-thank h2 {
            background: var(--s-primary) !important;
            border-color: var(--s-primary) !important;
            color: #fff !important;
          }

          .s-choice:hover {
            border-color: var(--s-primary) !important;
            background: var(--s-card) !important;
          }

          .s-text-input:focus {
            border-color: var(--s-primary) !important;
            box-shadow: 0 0 0 3px rgba(17, 165, 81, 0.15) !important;
          }

          .s-mode-btn.active {
            background: var(--s-primary) !important;
            color: #fff !important;
          }
          .s-mode-btn:not(.active) {
            color: var(--s-primary) !important;
          }
          .s-mode-toggle {
            border-color: var(--s-primary) !important;
          }

          .s-foot a {
            background: none !important;
            color: var(--s-primary) !important;
            font-weight: 600;
            text-decoration: none;
          }

          body.party-mode {
            background: #050505 !important;
          }
          body.party-mode::before {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            height: 124px;
            background: #fff;
            z-index: 0;
            pointer-events: none;
          }
          body.party-mode::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
              radial-gradient(circle at 18% 24%, rgba(255,255,255,0.22) 0 1px, transparent 2px),
              radial-gradient(circle at 72% 18%, rgba(255,255,255,0.14) 0 1.5px, transparent 2.5px),
              radial-gradient(circle at 34% 62%, rgba(255,255,255,0.16) 0 1px, transparent 2px),
              radial-gradient(circle at 82% 54%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
              radial-gradient(circle at 56% 78%, rgba(255,255,255,0.18) 0 1px, transparent 2px),
              radial-gradient(circle at 50% 26%, rgba(255,255,255,0.10) 0 220px, transparent 320px);
            background-size:
              180px 180px,
              220px 220px,
              200px 200px,
              240px 240px,
              260px 260px,
              100% 100%;
            mix-blend-mode: screen;
            opacity: .95;
            pointer-events: none;
            z-index: 0;
          }
          body.party-mode .s-wrap {
            position: relative;
            z-index: 1;
            background: linear-gradient(
              180deg,
              rgba(255,255,255,.98) 0,
              rgba(255,255,255,.98) 104px,
              transparent 160px
            ) !important;
            min-height: 100vh;
          }
          body.party-mode .s-brand-name {
            color: #0f172a !important;
          }
          body.party-mode .s-mode-toggle {
            background: rgba(255,255,255,.95) !important;
            border-color: var(--s-primary) !important;
            backdrop-filter: none !important;
          }
          body.party-mode .s-mode-btn {
            color: rgba(15,23,42,.72) !important;
          }
          body.party-mode .s-mode-btn.active {
            background: var(--s-primary) !important;
            color: #fff !important;
          }
          body.party-mode .s-progress {
            background: rgba(255,255,255,.18) !important;
          }
          body.party-mode .s-progress span {
            background: var(--s-primary) !important;
            background-image: none !important;
          }
          body.party-mode .s-progress-text {
            color: rgba(255,255,255,.88) !important;
          }
          body.party-mode .s-btn-next {
            background: var(--s-primary) !important;
            background-image: none !important;
            filter: none !important;
            opacity: 1 !important;
          }
          body.party-mode .s-card {
            background: rgba(255,255,255,.10) !important;
            border-color: rgba(255,255,255,.18) !important;
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 80px rgba(0,0,0,.35) !important;
          }
          body.party-mode .s-choice.active {
            background: var(--s-primary) !important;
            border-color: var(--s-primary) !important;
            color: #fff !important;
          }
          body.party-mode .s-party-choice.active {
            background: var(--s-primary) !important;
            border-color: var(--s-primary) !important;
            color: #fff !important;
          }
          body.party-mode .s-party-energy span {
            background: linear-gradient(90deg,#ffffff 0,var(--s-primary) 35%,#d4af37 100%) !important;
          }
          body.party-mode .s-kicker {
            background: rgba(255,255,255,.12) !important;
            color: var(--s-primary) !important;
          }
          body.party-mode .s-swipe-card::before {
            background:
              radial-gradient(circle at 20% 18%, rgba(255,255,255,.12), transparent 22px),
              radial-gradient(circle at 80% 24%, rgba(212,175,55,.16), transparent 24px),
              radial-gradient(circle at 50% 100%, rgba(255,255,255,.06), transparent 26px) !important;
          }
          body.party-mode .s-party-mascot-blob {
            background: radial-gradient(
              circle at 30% 30%,
              #ffffff,
              #d4af37 38%,
              var(--s-primary) 68%,
              #050505 100%
            ) !important;
          }
        `;
      }

      function applyModeClass() {
        document.body.classList.toggle("party-mode", state.mode === "party");
      }

      function showError(msg) {
        document.getElementById(
          "root"
        ).innerHTML = `<div class="s-shell"><div class="s-card"><h2 style="margin:0 0 8px;">Unavailable</h2><p style="color:var(--s-ink-soft);margin:0;">${esc(
          msg
        )}</p></div></div>`;
      }

      function render() {
        applyModeClass();
        const total = state.questions.length;
        if (state.currentIdx === -1) {
          renderIntro();
          return;
        }
        if (state.currentIdx >= total) {
          return;
        }
        if (
          state.mode === "party" &&
          isPartyQuickQuestion(state.questions[state.currentIdx])
        ) {
          renderPartyQuestion();
        } else {
          renderQuestion();
        }
      }

      function renderBrandHeader() {
        const s = state.survey || {};
        const logo = s.brandlogourl
          ? `<img src="${esc(s.brandlogourl)}" alt="Brand logo" />`
          : "";
        const brandLine = `
          <div class="s-brand">
            ${logo}
            <span class="s-brand-name">${esc(
              s.branddisplayname || s.brandslug || "GoNoGo"
            )}</span>
          </div>`;
        const streak =
          state.mode === "party" && state.streak > 0
            ? `<span class="s-streak">${state.streak}🔥</span>`
            : "";
        const toggle = `
          <div class="s-mode-toggle">
            <button type="button" class="s-mode-btn ${
              state.mode === "classic" ? "active" : ""
            }" data-mode="classic">Classic</button>
            <button type="button" class="s-mode-btn ${
              state.mode === "party" ? "active" : ""
            }" data-mode="party">Party</button>
          </div>`;
        return `
          <div class="s-top">
            ${brandLine}
            <div style="display:flex;gap:10px;align-items:center;">
              ${streak}
              ${toggle}
            </div>
          </div>`;
      }

      function renderIntro() {
        const s = state.survey || {};
        let html = `<div class="s-shell">`;
        html += renderBrandHeader();
        html += `<div class="s-card">`;
        if (s.introtitle) {
          html += `<h1 class="s-intro-title">${esc(s.introtitle)}</h1>`;
        }
        if (s.introtext) {
          html += `<p class="s-intro-text">${esc(s.introtext)}</p>`;
        }
        if (!s.introtitle && !s.introtext) {
          html += `<h1 class="s-intro-title">Share your feedback</h1><p class="s-intro-text">A few quick questions – your answers go straight to the brand.</p>`;
        }
        if (state.mode === "party") {
          html += `<div class="s-kicker">Swipe-first party mode</div><p class="s-intro-text">Fast taps, swipe cards, streaks, haptics, and a more playful experience.</p>`;
        }
        html += `<button type="button" class="s-btn s-btn-next" id="start-btn" style="width:100%;">${
          state.mode === "party" ? "Let’s go" : "Start"
        }</button>`;
        if (s.privacynoticetext) {
          html += `<div class="s-privacy" style="font-size:12px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin:12px 0 0;line-height:1.5;">${esc(
            s.privacynoticetext
          )}</div>`;
        }
        html += `</div>`;
        html += `<div class="s-foot">Powered by <a href="https://gonogo.co.za/business" target="_blank" rel="noopener noreferrer">GoNoGo</a></div>`;
        html += `</div>`;
        document.getElementById("root").innerHTML = html;
        document.getElementById("start-btn").onclick = () => {
          state.currentIdx = 0;
          state.started = true;
          render();
        };
        bindModeToggle();
      }

      function renderQuestion() {
        const q = state.questions[state.currentIdx];
        const total = state.questions.length;
        const pct = Math.round(((state.currentIdx + 1) / total) * 100);
        const s = state.survey || {};
        const showProgress = s.showprogressbar !== false;

        let html = `<div class="s-shell">`;
        html += renderBrandHeader();
        if (showProgress) {
          html += `<div class="s-progress-text">Question ${
            state.currentIdx + 1
          } of ${total}</div>`;
          html += `<div class="s-progress"><span style="width:${pct}%"></span></div>`;
        }
        html += `<div class="s-card">`;
        const longPrompt = (q.prompt || "").length > 140;
        html += `<h2 class="s-prompt ${
          longPrompt ? "s-prompt-long" : ""
        }">${esc(q.prompt || "Untitled question")}${
          q.required ? '<span class="req">*</span>' : ""
        }</h2>`;
        if (q.helptext) {
          html += `<p class="s-help">${esc(q.helptext)}</p>`;
        }
        html += `<div id="q-answer">${renderInput(q, state.currentIdx)}</div>`;
        html += `<div class="s-error" id="q-error"></div>`;
        html += `<div class="s-affirm" id="q-affirm"></div>`;
        html += `<div class="s-nav"><button type="button" class="s-btn s-btn-prev" id="btn-prev"${
          state.currentIdx === 0 ? " disabled" : ""
        }>Back</button><button type="button" class="s-btn s-btn-next" id="btn-next">${
          state.currentIdx === total - 1 ? "Submit" : "Next"
        }</button></div>`;
        html += `</div>`;
        html += `<div class="s-foot">Powered by <a href="https://gonogo.co.za/business" target="_blank" rel="noopener noreferrer">GoNoGo</a></div>`;
        html += `</div>`;
        document.getElementById("root").innerHTML = html;
        wireQuestion(q, state.currentIdx);
        bindModeToggle();
        document.getElementById("btn-prev").onclick = () => {
          if (state.currentIdx === 0) return;
          syncTextInput(q, state.currentIdx);
          state.currentIdx--;
          render();
        };
        document.getElementById("btn-next").onclick = async () => {
          syncTextInput(q, state.currentIdx);
          if (!validateCurrent(q)) return;
          if (state.currentIdx === total - 1) {
            await submit();
            return;
          }
          celebrateStep(true);
          state.currentIdx++;
          render();
        };
      }

      function renderPartyQuestion() {
        const q = state.questions[state.currentIdx];
        const total = state.questions.length;
        const pct = Math.round(((state.currentIdx + 1) / total) * 100);

        let html = `<div class="s-shell">`;
        html += renderBrandHeader();
        html += `<div class="s-party-wrap">`;
        html += `<div class="s-party-meta"><div class="s-kicker">${partyIconForQuestion(
          q
        )} Quick swipe question</div><div class="s-stats"><span class="s-stat-pill">Question ${
          state.currentIdx + 1
        } / ${total}</span>${
          state.streak
            ? `<span class="s-stat-pill">Streak ${state.streak}</span>`
            : ""
        }<span class="s-stat-pill">Keep the streak going</span></div></div>`;
        html += `<div class="s-party-copy"><small>Party energy</small><small>${partyEnergy(
          total
        )}%</small></div>`;
        html += `<div class="s-party-energy"><span style="width:${partyEnergy(
          total
        )}%"></span></div>`;
        html += `<div class="s-party-stage"><div class="s-swipe-card"><div class="s-swipe-deck"><div class="s-swipe-inner" id="party-swipe-card">`;
        const partyLong = (q.prompt || "").length > 95;
        html += `<div class="s-party-hero"><div class="s-party-icon">${partyIconForQuestion(
          q
        )}</div><h2 class="s-party-prompt${
          partyLong ? " is-long" : ""
        }">${esc(q.prompt || "")}</h2>${
          q.helptext
            ? `<p class="s-party-help">${esc(q.helptext)}</p>`
            : `<p class="s-party-help">Go with your instinct. Quick answers keep the vibe alive.</p>`
        }</div>`;
        html += `<div id="q-answer">${renderPartyInput(q, state.currentIdx)}</div>`;
        html += `<div class="s-swipe-hint"><span class="s-swipe-pill">Lower</span><span class="s-swipe-pill">Higher</span><span class="s-swipe-pill">Next</span><span class="s-swipe-pill">Back</span></div>`;
        html += `</div></div></div></div>`;
        html += `<div class="s-cheer" id="q-affirm">${
          state.streak ? partyCheer() : "Ready? Fast answers make this fun."
        }</div>`;
        html += `<div class="s-error" id="q-error"></div>`;
        html += `<div class="s-nav"><button type="button" class="s-btn s-btn-prev" id="btn-prev"${
          state.currentIdx === 0 ? " disabled" : ""
        }>Back</button><button type="button" class="s-btn s-btn-next" id="btn-next">${
          state.currentIdx === total - 1 ? "Finish the run" : "Next vibe"
        }</button></div>`;
        html += `<div id="party-mascot" class="s-party-mascot" aria-hidden="true"><div class="s-party-mascot-blob"><span>🎉</span></div><div class="s-party-mascot-copy"><strong>Party creature unlocked</strong><p>You are flying. Keep the party going a little longer.</p></div></div>`;
        html += `<div class="s-foot">Powered by <a href="https://gonogo.co.za/business" target="_blank" rel="noopener noreferrer">GoNoGo</a></div>`;
        html += `</div></div>`;
        document.getElementById("root").innerHTML = html;
        wirePartyQuestion(q, state.currentIdx);
        bindModeToggle();
        if (shouldShowPartyMascot()) {
          setTimeout(showPartyMascot, 180);
        }
        document.getElementById("btn-prev").onclick = () => {
          if (state.currentIdx === 0) return;
          state.currentIdx--;
          render();
        };
        document.getElementById("btn-next").onclick = async () => {
          if (!validateCurrent(q)) return;
          if (state.currentIdx === total - 1) {
            await submit();
            return;
          }
          celebrateStep(true);
          state.currentIdx++;
          render();
        };
      }

      function renderPartyInput(q, idx) {
        const val = state.values[q.id];
        if (q.qtype === "yesno") {
          return `<div class="s-party-answer-wrap"><div class="s-party-choices"><button type="button" class="s-party-choice is-neg" data-party-val="No">No</button><button type="button" class="s-party-choice is-pos" data-party-val="Yes">Yes</button></div></div>`;
        }
        if (q.qtype === "singleselect" || q.qtype === "consent") {
          const opts =
            q.qtype === "consent"
              ? ["I agree"]
              : (q.options || []).slice(0, 4);
          return `<div class="s-party-answer-wrap"><div class="s-party-grid-compact ${
            opts.length === 3 ? "cols-3" : "cols-5"
          }">${opts
            .map((o, i) => {
              const cls =
                i === 0
                  ? "is-neg"
                  : i === opts.length - 1
                  ? "is-pos"
                  : "";
              return `<button type="button" class="s-party-choice ${cls}" data-party-val="${esc(
                o
              )}">${esc(o)}</button>`;
            })
            .join("")}</div>${
            (q.options || []).length > 4
              ? `<div class="s-party-sparkles"><span class="s-party-tipline">More options? Tap in Classic mode for the full list.</span></div>`
              : ""
          }</div>`;
        }
        if (q.qtype === "multiselect") {
          const sel = Array.isArray(val) ? val : [];
          return `<div class="s-party-answer-wrap"><div class="s-party-multi-note">Tap all that apply, then hit Next vibe.</div><div class="s-choice-grid">${(q.options || [])
            .map((o) => {
              const on = sel.indexOf(o) !== -1;
              return `<button type="button" class="s-choice left-align${
                on ? " active" : ""
              }" data-val="${esc(o)}">${esc(o)}</button>`;
            })
            .join("")}</div></div>`;
        }
        if (
          q.qtype === "rating15" ||
          q.qtype === "starrating" ||
          q.qtype === "csatsmiley"
        ) {
          const faces =
            q.qtype === "csatsmiley"
              ? ["😡", "😕", "😐", "🙂", "🤩"]
              : [1, 2, 3, 4, 5];
          return `<div class="s-party-answer-wrap"><div class="s-party-grid-compact cols-5">${faces
            .map((label, i) => {
              const n = i + 1;
              const cls =
                n === 5 ? "is-pos" : n === 2 ? "is-neg" : "";
              return `<button type="button" class="s-party-choice big ${cls}" data-party-val="${n}">${label}</button>`;
            })
            .join("")}</div></div>`;
        }
        if (q.qtype === "nps010") {
          return `<div class="s-party-answer-wrap"><div class="s-party-tipline">Swipe for a fast low/high score, or tap an exact score below.</div><div class="s-party-grid-compact cols-11">${Array.from(
            { length: 11 },
            (_, i) =>
              `<button type="button" class="s-party-choice score" data-party-val="${i}">${i}</button>`
          ).join("")}</div></div>`;
        }
        return `<div class="s-party-answer-wrap">${renderInput(q, idx)}</div>`;
      }

      function wirePartyQuestion(q, idx) {
        const card = document.getElementById("party-swipe-card");
        let startX = 0,
          startY = 0,
          currentX = 0,
          currentY = 0,
          dragging = false;

        function setTransform(x, y) {
          if (!card) return;
          card.style.transform = `translate(${x}px, ${y}px) rotate(${
            x / 20
          }deg)`;
          card.style.opacity = String(
            Math.max(0.72, 1 - Math.max(Math.abs(x), Math.abs(y)) / 320)
          );
        }

        function advance() {
          if (state.currentIdx >= state.questions.length - 1) {
            submit();
          } else {
            state.currentIdx++;
            render();
          }
        }

        function retreat() {
          if (state.currentIdx === 0) return;
          state.currentIdx--;
          render();
        }

        function commitQuick(value, positive) {
          if (value == null) return;
          if (typeof value === "number") {
            state.values[q.id] = { valuenumber: value };
          } else {
            state.values[q.id] = { valuetext: value };
          }
          haptic(positive ? 22 : 14);
          celebrateStep(!!positive);
          if (card) {
            card.style.transition = "transform 0.18s ease, opacity 0.18s ease";
            setTransform(positive ? 220 : -220, 0);
            setTimeout(advance, 170);
          } else {
            advance();
          }
        }

        function handleDirectionalSwipe(direction) {
          if (direction === "up") {
            haptic(12);
            return advance();
          }
          if (direction === "down") {
            haptic(10);
            return retreat();
          }
          let value = null;
          if (q.qtype === "yesno") {
            value = direction === "right" ? "Yes" : "No";
          } else if (
            q.qtype === "rating15" ||
            q.qtype === "starrating" ||
            q.qtype === "csatsmiley"
          ) {
            value = direction === "right" ? 5 : 2;
          } else if (q.qtype === "nps010") {
            value = direction === "right" ? 10 : 6;
          } else if (q.qtype === "singleselect" || q.qtype === "consent") {
            const opts =
              q.qtype === "consent" ? ["I agree"] : q.options || [];
            if (!opts.length) return;
            value =
              direction === "right"
                ? opts[Math.min(1, opts.length - 1)]
                : opts[0];
          }
          commitQuick(value, direction === "right");
        }

        if (card) {
          card.addEventListener("pointerdown", (e) => {
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            currentX = 0;
            currentY = 0;
            card.classList.add("dragging");
          });

          window.addEventListener("pointermove", (e) => {
            if (!dragging) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            setTransform(currentX, currentY);
          });

          window.addEventListener("pointerup", () => {
            if (!dragging) return;
            dragging = false;
            card.classList.remove("dragging");
            const absX = Math.abs(currentX);
            const absY = Math.abs(currentY);
            if (absY > absX && currentY < -90) {
              return handleDirectionalSwipe("up");
            }
            if (absY > absX && currentY > 90) {
              return handleDirectionalSwipe("down");
            }
            if (currentX > 90) {
              return handleDirectionalSwipe("right");
            }
            if (currentX < -90) {
              return handleDirectionalSwipe("left");
            }
            card.style.transition =
              "transform 0.18s ease, opacity 0.18s ease";
            setTransform(0, 0);
            setTimeout(() => {
              if (!card) return;
              card.style.transition = "";
              card.style.opacity = "";
            }, 180);
          });
        }

        document
          .querySelectorAll("[data-party-val]")
          .forEach((btn) =>
            btn.addEventListener("click", () => {
              const raw = btn.getAttribute("data-party-val");
              const n = parseInt(raw, 10);
              if (!isNaN(n) && String(n) === raw) {
                state.values[q.id] = { valuenumber: n };
              } else {
                state.values[q.id] = { valuetext: raw };
              }
              haptic(18);
              celebrateStep(true);
              advance();
            })
          );

        document
          .querySelectorAll("#q-answer .s-choice")
          .forEach((btn) =>
            btn.addEventListener("click", () => {
              const raw = btn.getAttribute("data-val");
              if (q.qtype === "multiselect") {
                const curr = Array.isArray(state.values[q.id])
                  ? state.values[q.id].slice()
                  : [];
                const i = curr.indexOf(raw);
                if (i === -1) curr.push(raw);
                else curr.splice(i, 1);
                state.values[q.id] = curr;
                haptic(10);
                rerenderPartyAnswer(q, idx);
              } else {
                const n = parseInt(raw, 10);
                if (!isNaN(n) && String(n) === raw) {
                  state.values[q.id] = { valuenumber: n };
                } else {
                  state.values[q.id] = { valuetext: raw };
                }
                haptic(16);
                celebrateStep(true);
                advance();
              }
            })
          );
      }

      function bindModeToggle() {
        document
          .querySelectorAll("[data-mode]")
          .forEach((btn) =>
            btn.addEventListener("click", () => {
              const nextMode = btn.getAttribute("data-mode");
              if (state.mode === nextMode) return;
              if (nextMode === "party" && !canUsePartyMode()) {
                const err = document.getElementById("q-error");
                if (err) {
                  err.textContent =
                    "Party mode is only available for quick-tap questions.";
                }
                return;
              }
              state.mode = nextMode;
              state.partyMascotShown = false;
              render();
            })
          );
      }

      /* Input rendering and wiring */
      function renderInput(q, idx) {
        const t = q.qtype;
        const val = state.values[q.id];
        if (t === "yesno") {
          return btnGrid(
            ["Yes", "No"],
            val && val.valuetext,
            "cols-2",
            (o) => (o === "Yes" ? "Yes" : "No")
          );
        }
        if (t === "singleselect" || t === "consent") {
          const opts = t === "consent" ? ["I agree"] : q.options || [];
          return btnGrid(
            opts,
            val && val.valuetext,
            "",
            null,
            "left-align"
          );
        }
        if (t === "multiselect") {
          const opts = q.options || [];
          const sel = Array.isArray(val) ? val : [];
          return `<div class="s-choice-grid">${opts
            .map((o) => {
              const on = sel.indexOf(o) !== -1;
              return `<button type="button" class="s-choice left-align${
                on ? " active" : ""
              }" data-val="${esc(o)}">${esc(o)}</button>`;
            })
            .join("")}</div>`;
        }
        if (t === "rating15") {
          return scaleGrid(1, 5, "cols-5", val && val.valuenumber, (i) => i);
        }
                if (t === "starrating") {
          const sv = (val && val.valuenumber) || 0;
          return `<div class="s-choice-grid cols-5">${[1, 2, 3, 4, 5]
            .map((i) => {
              const on = sv === i;
              return `<button type="button" class="s-choice star${
                on ? " active" : ""
              }" data-val="${i}" aria-label="${i} stars">★</button>`;
            })
            .join("")}</div>`;
        }
        if (t === "csatsmiley") {
          const faces = ["😡", "😕", "😐", "🙂", "🤩"];
          const cv = val && val.valuenumber;
          return `<div class="s-choice-grid cols-5">${faces
            .map((f, i) => {
              const n = i + 1;
              const on = cv === n;
              return `<button type="button" class="s-choice big-emoji${
                on ? " active" : ""
              }" data-val="${n}" aria-label="Rating ${n} ${f}">${f}</button>`;
            })
            .join("")}</div>`;
        }
        if (t === "nps010") {
          const cv = val && val.valuenumber;
          let html = `<div class="s-choice-grid cols-11">`;
          for (let i = 0; i <= 10; i++) {
            const cls = i <= 6 ? "nps-red" : i <= 8 ? "nps-amber" : "";
            html += `<button type="button" class="s-choice ${cls} ${
              cv === i ? "active" : ""
            }" data-val="${i}">${i}</button>`;
          }
          html += `</div><div class="s-nps-labels"><span>Not at all likely</span><span>Extremely likely</span></div>`;
          return html;
        }
        if (t === "dropdown") {
          const dv = val && val.valuetext ? val.valuetext : "";
          const opts = (q.options || [])
            .map(
              (o) =>
                `<option value="${esc(o)}"${
                  dv === o ? " selected" : ""
                }>${esc(o)}</option>`
            )
            .join("");
          return `<select class="s-text-input" id="input-${idx}">
            <option value="">Select</option>${opts}</select>`;
        }
        if (t === "date") {
          return `<input class="s-text-input" type="date" id="input-${idx}" value="${esc(
            (val && val.valuetext) || ""
          )}" />`;
        }
        if (t === "number") {
          const minA =
            q.options && q.options[0] != null ? esc(q.options[0]) : "";
          const maxA =
            q.options && q.options[1] != null ? esc(q.options[1]) : "";
          const nv =
            val && val.valuenumber !== undefined ? val.valuenumber : "";
          return `<input class="s-text-input" type="number" id="input-${idx}" min="${minA}" max="${maxA}" placeholder="Enter a number" value="${esc(
            String(nv)
          )}" />`;
        }
        if (t === "longtext") {
          return `<textarea class="s-text-input" id="input-${idx}" placeholder="Tell us more">${esc(
            (val && val.valuetext) || ""
          )}</textarea>`;
        }
        const type =
          t === "email" ? "email" : t === "phone" ? "tel" : "text";
        const placeholder =
          t === "name"
            ? "Your name"
            : t === "email"
            ? "you@example.com"
            : t === "phone"
            ? "+27…"
            : "Type your answer";
        return `<input class="s-text-input" type="${type}" id="input-${idx}" placeholder="${placeholder}" value="${esc(
          (val && val.valuetext) || ""
        )}" />`;
      }

      function btnGrid(opts, currentValue, extraClass, labelFn, btnExtra) {
        return `<div class="s-choice-grid ${
          extraClass || ""
        }">${opts
          .map((o) => {
            const on = currentValue === o;
            const lbl = labelFn ? labelFn(o) : o;
            return `<button type="button" class="s-choice ${
              btnExtra || ""
            }${on ? " active" : ""}" data-val="${esc(o)}">${esc(lbl)}</button>`;
          })
          .join("")}</div>`;
      }

      function scaleGrid(from, to, cols, currentValue, labelFn) {
        let html = `<div class="s-choice-grid ${cols}">`;
        for (let i = from; i <= to; i++) {
          const on = currentValue === i;
          html += `<button type="button" class="s-choice${
            on ? " active" : ""
          }" data-val="${i}">${labelFn ? labelFn(i) : i}</button>`;
        }
        html += `</div>`;
        return html;
      }

      function wireQuestion(q, idx) {
        document
          .querySelectorAll("#q-answer .s-choice")
          .forEach((btn) =>
            btn.addEventListener("click", () => {
              const raw = btn.getAttribute("data-val");
              const numVal = parseInt(raw, 10);
              if (q.qtype === "multiselect") {
                const curr = Array.isArray(state.values[q.id])
                  ? state.values[q.id].slice()
                  : [];
                const i = curr.indexOf(raw);
                if (i === -1) curr.push(raw);
                else curr.splice(i, 1);
                state.values[q.id] = curr;
              } else if (
                q.qtype === "rating15" ||
                q.qtype === "nps010" ||
                q.qtype === "starrating" ||
                q.qtype === "csatsmiley"
              ) {
                state.values[q.id] = { valuenumber: numVal };
              } else {
                state.values[q.id] = { valuetext: raw };
              }
              rerenderAnswer(q, idx);
            })
          );

        const el = document.getElementById(`input-${idx}`);
        if (el) {
          const sync = () => syncTextInput(q, idx);
          el.addEventListener("input", sync);
          el.addEventListener("change", sync);
        }
      }

      function rerenderAnswer(q, idx) {
        const wrap = document.getElementById("q-answer");
        if (!wrap) return;
        wrap.innerHTML = renderInput(q, idx);
        wireQuestion(q, idx);
      }

      function rerenderPartyAnswer(q, idx) {
        const wrap = document.getElementById("q-answer");
        if (!wrap) return;
        wrap.innerHTML = renderPartyInput(q, idx);
        wirePartyQuestion(q, idx);
      }

      function syncTextInput(q, idx) {
        const el = document.getElementById(`input-${idx}`);
        if (!el) return;
        const v = el.value.trim();
        if (!v) {
          delete state.values[q.id];
          return;
        }
        if (q.qtype === "number") {
          const n = parseFloat(v);
          if (!isNaN(n)) {
            state.values[q.id] = { valuenumber: n };
          } else {
            delete state.values[q.id];
          }
        } else {
          state.values[q.id] = { valuetext: v };
        }
      }

      function validateCurrent(q) {
        const errEl = document.getElementById("q-error");
        if (errEl) errEl.textContent = "";
        const v = state.values[q.id];
        if (q.required) {
          let empty = false;
          if (Array.isArray(v)) {
            empty = v.length === 0;
          } else if (v && typeof v === "object") {
            empty =
              !v.valuetext &&
              !(v.valuenumber !== undefined) &&
              !v.valuejson;
          } else {
            empty = v == null;
          }
          if (empty) {
            if (errEl) errEl.textContent = "This question is required.";
            return false;
          }
        }
        if (!v) return true;

        if (q.qtype === "email" && v.valuetext) {
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v.valuetext)) {
            if (errEl)
              errEl.textContent = "Please enter a valid email address.";
            return false;
          }
        }
        if (q.qtype === "phone" && v.valuetext) {
          if (!/[0-9]{6,}/.test(v.valuetext)) {
            if (errEl)
              errEl.textContent = "Please enter a valid phone number.";
            return false;
          }
        }
        if (q.qtype === "number" && v.valuenumber !== undefined) {
          const minV =
            q.options && q.options[0] != null
              ? parseFloat(q.options[0])
              : null;
          const maxV =
            q.options && q.options[1] != null
              ? parseFloat(q.options[1])
              : null;
          if (
            (minV != null && !isNaN(minV) && v.valuenumber < minV) ||
            (maxV != null && !isNaN(maxV) && v.valuenumber > maxV)
          ) {
            let msg = "Please enter a number";
            if (minV != null && maxV != null) {
              msg += ` between ${minV} and ${maxV}.`;
            } else if (minV != null) {
              msg += ` ≥ ${minV}.`;
            } else if (maxV != null) {
              msg += ` ≤ ${maxV}.`;
            }
            if (errEl) errEl.textContent = msg;
            return false;
          }
        }
        return true;
      }

      function celebrateStep(successBias) {
        state.streak += 1;
        if (navigator.vibrate) navigator.vibrate(15);
        const affirm = document.getElementById("q-affirm");
        if (affirm) affirm.textContent = partyCheer();
        if (state.mode === "party" && window.confetti) {
          window.confetti({
            particleCount: 24,
            spread: 55,
            origin: { y: 0.7 },
            disableForReducedMotion: true,
          });
        }
      }

      async function submit() {
        const nextBtn = document.getElementById("btn-next");
        if (nextBtn) {
          nextBtn.disabled = true;
          nextBtn.textContent = "Submitting…";
        }
        const answers = [];
        const contact = {};
        for (let i = 0; i < state.questions.length; i++) {
          const q = state.questions[i];
          const v = state.values[q.id];
          if (!v) continue;
          const entry = { questionid: q.id };
          if (Array.isArray(v)) {
            entry.valuejson = v;
          } else {
            if (v.valuetext !== undefined) entry.valuetext = v.valuetext;
            if (v.valuenumber !== undefined)
              entry.valuenumber = v.valuenumber;
            if (v.valuejson !== undefined) entry.valuejson = v.valuejson;
          }
          answers.push(entry);
          if (state.survey && state.survey.allowcontactcapture && v.valuetext) {
            if (q.qtype === "email") contact.email = v.valuetext;
            else if (q.qtype === "phone") contact.phone = v.valuetext;
            else if (q.qtype === "name") contact.name = v.valuetext;
          }
        }
        try {
          const meta = {
            modeused: state.mode,
            devicetype: /Mobi|Android|iPhone/i.test(navigator.userAgent)
              ? "mobile"
              : "desktop",
          };
          const res = await GoNoGoAPI.cx.publicSubmit(
            token,
            answers,
            contact,
            meta
          );
          if (!res || !res.ok) {
            throw new Error(res && res.error ? res.error : "Submit failed");
          }
          renderThankYou();
        } catch (e) {
          if (nextBtn) {
            nextBtn.disabled = false;
            nextBtn.textContent = "Submit";
          }
          const errEl = document.getElementById("q-error");
          if (errEl)
            errEl.textContent =
              (e && e.message) || "Submit failed. Try again.";
        }
      }

      function renderThankYou() {
        const s = state.survey || {};
        let html = `<div class="s-shell">`;
        html += renderBrandHeader();
        html += `<div class="s-card s-thank"><h2>${esc(
          s.thankyoutitle || "Thank you."
        )}</h2><p>${esc(
          s.thankyoutext || "Your feedback has been shared with the brand."
        )}</p></div>`;
        html += `<div class="s-foot">Powered by <a href="https://gonogo.co.za/business" target="_blank" rel="noopener noreferrer">GoNoGo</a></div>`;
        html += `</div>`;
        document.getElementById("root").innerHTML = html;
        if (state.mode === "party" && window.confetti) {
          window.confetti({
            particleCount: 120,
            spread: 80,
            origin: { y: 0.6 },
            disableForReducedMotion: true,
          });
        }
      }

      load();
    </script>
  </body>
</html>
