<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --s-primary:#11a551;
  --s-accent:#0ea5e9;
  --s-ink:#0f172a;
  --s-ink-soft:#475569;
  --s-muted:#64748b;
  --s-bg:#f8fafc;
  --s-card:#ffffff;
  --s-border:#e2e8f0;
  --s-border-strong:#cbd5e1;
  --s-danger:#dc2626
}
html,body{
  margin:0;
  padding:0;
  background:var(--s-bg);
  color:var(--s-ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  box-sizing:border-box
}
*,*::before,*::after{box-sizing:inherit}
canvas{pointer-events:none!important}
.s-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 48px
}
.s-shell{
  width:100%;
  max-width:640px
}
.s-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  min-height:40px
}
.s-brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0
}
.s-brand img{
  max-height:56px;
  max-width:220px;
  object-fit:contain
}
@media(min-width:768px){
  .s-brand img{
    max-height:64px;
    max-width:260px
  }
}
.s-brand-name{
  font-weight:700;
  font-size:15px;
  color:var(--s-ink);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis
}
.s-mode-toggle{
  display:inline-flex;
  gap:4px;
  background:var(--s-card);
  border:1px solid var(--s-border);
  padding:4px;
  border-radius:999px;
  box-shadow:0 1px 2px rgba(0,0,0,.04)
}
.s-mode-btn{
  appearance:none;
  border:0;
  background:transparent;
  padding:6px 14px;
  border-radius:999px;
  font-weight:600;
  font-size:13px;
  color:var(--s-ink-soft);
  cursor:pointer
}
.s-mode-btn.active{
  background:var(--s-ink);
  color:#fff
}
.s-mode-btn:focus-visible{
  outline:2px solid var(--s-primary);
  outline-offset:2px
}
.s-main{
  width:100%
}
.s-progress{
  height:6px;
  background:var(--s-border);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px
}
.s-progress span{
  display:block;
  height:100%;
  background:var(--s-primary);
  transition:width .25s ease
}
.s-progress-text{
  font-size:12px;
  color:var(--s-muted);
  margin-bottom:14px;
  font-weight:600
}
.s-card{
  background:var(--s-card);
  border:1px solid var(--s-border);
  border-radius:18px;
  padding:28px 24px;
  box-shadow:0 1px 3px rgba(15,23,42,.04)
}
.s-prompt{
  font-size:20px;
  line-height:1.45;
  font-weight:600;
  color:var(--s-ink);
  margin:0 0 14px;
  white-space:pre-line
}
.s-prompt-long{
  font-size:17px;
  font-weight:500;
  line-height:1.55
}
.s-prompt .req{
  color:var(--s-danger);
  margin-left:4px
}
.s-help{
  font-size:14px;
  color:var(--s-muted);
  margin:0 0 20px;
  line-height:1.45
}
.s-intro-title{
  font-size:26px;
  font-weight:800;
  margin:0 0 8px;
  letter-spacing:-.01em
}
.s-intro-text{
  font-size:15px;
  color:var(--s-ink-soft);
  margin:0 0 20px;
  line-height:1.5
}
.s-choice-grid{
  display:grid;
  gap:10px
}
.s-choice-grid.cols-2{grid-template-columns:1fr 1fr}
.s-choice-grid.cols-5{grid-template-columns:repeat(5,1fr)}
.s-choice-grid.cols-11{grid-template-columns:repeat(11,1fr)}
@media(max-width:520px){
  .s-choice-grid.cols-11{grid-template-columns:repeat(6,1fr)}
}
.s-choice{
  appearance:none;
  border:1.5px solid var(--s-border-strong);
  background:var(--s-card);
  color:var(--s-ink);
  padding:18px 14px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  text-align:center;
  transition:all .12s ease;
  font-family:inherit;
  line-height:1.2;
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center
}
.s-choice:hover{
  border-color:var(--s-primary);
  background:rgba(17,165,81,.04)
}
.s-choice.active{
  background:var(--s-primary);
  border-color:var(--s-primary);
  color:#fff
}
.s-choice.left-align{
  text-align:left;
  justify-content:flex-start;
  padding:16px 18px;
  font-size:15px
}
.s-choice.big-emoji{
  font-size:30px;
  padding:14px 0
}
.s-choice.star{
  font-size:24px;
  padding:16px 0
}
.s-choice.star.active{
  background:#f59e0b;
  border-color:#f59e0b
}
.s-choice.nps-red.active{
  background:var(--s-danger);
  border-color:var(--s-danger)
}
.s-choice.nps-amber.active{
  background:#d97706;
  border-color:#d97706
}
.s-nps-labels{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--s-muted);
  margin-top:6px;
  font-weight:600
}
.s-text-input{
  width:100%;
  padding:16px 14px;
  border:1.5px solid var(--s-border-strong);
  border-radius:14px;
  font-size:16px;
  font-family:inherit;
  background:var(--s-card);
  color:var(--s-ink)
}
.s-text-input:focus{
  outline:none;
  border-color:var(--s-primary);
  box-shadow:0 0 0 3px rgba(17,165,81,.15)
}
textarea.s-text-input{
  min-height:120px;
  resize:vertical
}
.s-text-input::placeholder{
  color:var(--s-muted)
}
.s-nav{
  display:flex;
  gap:10px;
  margin-top:24px
}
.s-btn{
  flex:1;
  appearance:none;
  border:0;
  padding:16px 20px;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  transition:opacity .12s,background .12s;
  min-height:52px
}
.s-btn-prev{
  background:var(--s-border);
  color:var(--s-ink-soft)
}
.s-btn-prev:hover{
  background:var(--s-border-strong)
}
.s-btn-prev:disabled{
  opacity:.45;
  cursor:not-allowed
}
.s-btn-next{
  background:var(--s-primary);
  color:#fff
}
.s-btn-next:hover{
  background:#0e8e45
}
.s-btn-next:disabled{
  opacity:.6;
  cursor:not-allowed
}
.s-error{
  color:var(--s-danger);
  font-size:13px;
  margin-top:10px;
  min-height:18px;
  font-weight:600
}
.s-affirm{
  color:var(--s-primary);
  font-size:13px;
  margin-top:10px;
  min-height:18px;
  font-weight:600
}
.s-foot{
  text-align:center;
  font-size:11px;
  color:var(--s-muted);
  margin-top:20px;
  letter-spacing:.04em
}
.s-foot a{
  color:var(--s-muted);
  text-decoration:none
}
.s-thank{
  text-align:center;
  padding:48px 24px
}
.s-thank h2{
  color:var(--s-primary);
  font-size:26px;
  margin:0 0 8px
}
.s-thank p{
  color:var(--s-ink-soft);
  margin:0
}

/* party mode overrides, unchanged */
body.party-mode{
  background:linear-gradient(180deg,#0b1020 0,#111827 100%);
}
body.party-mode .s-wrap{
  background:radial-gradient(circle at top left,rgba(17,165,81,.18),transparent 28%),radial-gradient(circle at top right,rgba(168,85,247,.18),transparent 30%);
  min-height:100vh;
}
body.party-mode .s-brand-name{color:#fff}
body.party-mode .s-mode-toggle{
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.18)
}
body.party-mode .s-mode-btn{color:rgba(255,255,255,.78)}
body.party-mode .s-mode-btn.active{
  background:#fff;
  color:#111
}
body.party-mode .s-progress{background:rgba(255,255,255,.15)}
body.party-mode .s-progress span{
  background:linear-gradient(90deg,#22c55e,#a855f7,#f59e0b)
}
body.party-mode .s-progress-text{color:rgba(255,255,255,.78)}
body.party-mode .s-card{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.12);
  backdrop-filter:blur(16px);
  box-shadow:0 24px 80px rgba(0,0,0,.35);
  border-radius:28px
}
body.party-mode .s-prompt,
body.party-mode .s-intro-title{
  color:#fff;
  font-size:24px
}
body.party-mode .s-prompt-long{font-size:19px}
body.party-mode .s-help,
body.party-mode .s-intro-text{
  color:rgba(255,255,255,.82)
}
body.party-mode .s-choice{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.14);
  color:#fff
}
body.party-mode .s-choice:hover{
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.3)
}
body.party-mode .s-choice.active{
  background:rgba(34,197,94,.28);
  border-color:rgba(34,197,94,.6);
  color:#fff
}
body.party-mode .s-choice.star.active{
  background:rgba(245,158,11,.28);
  border-color:rgba(245,158,11,.6);
  color:#ffd54f
}
body.party-mode .s-choice.nps-red.active{
  background:rgba(239,68,68,.3);
  border-color:rgba(239,68,68,.6)
}
body.party-mode .s-choice.nps-amber.active{
  background:rgba(217,119,6,.3);
  border-color:rgba(217,119,6,.6)
}
body.party-mode .s-text-input{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.15);
  color:#fff
}
body.party-mode .s-text-input::placeholder{
  color:rgba(255,255,255,.5)
}
body.party-mode .s-btn-prev{
  background:rgba(255,255,255,.1);
  color:#fff
}
body.party-mode .s-btn-prev:hover{
  background:rgba(255,255,255,.18)
}
body.party-mode .s-btn-next{
  background:linear-gradient(90deg,#22c55e,#a855f7,#f97316);
}
</style>
</head>
<body>
<div class="s-wrap">
  <div class="s-shell">
    <div class="s-top">
      <div class="s-brand">
        <img id="brandLogo" alt="">
        <div class="s-brand-name" id="brandName"></div>
      </div>
      <div class="s-mode-toggle" aria-label="Answering style">
        <button class="s-mode-btn active" id="modeClassic">Classic</button>
        <button class="s-mode-btn" id="modeParty">Party</button>
      </div>
    </div>
    <main class="s-main">
      <div class="s-progress" aria-hidden="true">
        <span id="progressBar" style="width:0%"></span>
      </div>
      <div class="s-progress-text" id="progressText"></div>
      <div class="s-card" id="card"></div>
      <div class="s-nav" id="nav"></div>
      <div class="s-error" id="error"></div>
      <div class="s-affirm" id="affirm"></div>
      <div class="s-foot" id="foot"></div>
    </main>
  </div>
</div>
<script src="api.js"></script>
<script>
var token=null;
var state={survey:null,questions:[],values:{},mode:'classic',currentIdx:-1,introSeen:false,streak:0,started:false};

function applyBrandTheme(){
  var s=state.survey||{},r=document.documentElement;
  if(s.brand_primary_colour){
    r.style.setProperty('--s-primary',s.brand_primary_colour);
  }
  if(s.brand_accent_colour){
    r.style.setProperty('--s-accent',s.brand_accent_colour);
  }
}

function parseToken(){
  var params=new URLSearchParams(window.location.search);
  token=params.get('t')||params.get('token')||null;
}
function qs(id){return document.getElementById(id)}
function setText(id,txt){var el=qs(id);if(el)el.textContent=txt||''}
function setHTML(id,html){var el=qs(id);if(el)el.innerHTML=html||''}
function showError(msg){setText('error',msg||'Something went wrong loading this survey.');}
function showAffirm(msg){setText('affirm',msg||'');}
function setMode(mode){
  state.mode=mode;
  var cBtn=qs('modeClassic'),pBtn=qs('modeParty');
  if(cBtn&&pBtn){
    if(mode==='party'){
      pBtn.classList.add('active');cBtn.classList.remove('active');
      document.body.classList.add('party-mode');
    }else{
      cBtn.classList.add('active');pBtn.classList.remove('active');
      document.body.classList.remove('party-mode');
    }
  }
}
function bindModeToggle(){
  var cBtn=qs('modeClassic'),pBtn=qs('modeParty');
  if(cBtn)cBtn.addEventListener('click',function(){setMode('classic');render();});
  if(pBtn)pBtn.addEventListener('click',function(){setMode('party');render();});
}
function loadFoot(){
  var foot=qs('foot');
  if(!foot)return;
  var s=state.survey||{};
  var txt=s.footer_text||'Powered by GoNoGo';
  var href=s.footer_link||'https://gonogo.co.za/';
  foot.innerHTML='<a href="'+href+'" target="_blank" rel="noopener noreferrer">'+txt+'</a>';
}
function renderIntro(){
  var c=qs('card');
  if(!c)return;
  var s=state.survey||{};
  var title=s.intro_title||'We value your feedback';
  var text=s.intro_text||'This quick survey helps us understand how your experience went.';
  var privacy=(s.privacy_text||'')+(s.privacy_link?('\n'+s.privacy_link):'');
  var html='<div class="s-intro">';
  html+='<h1 class="s-intro-title">'+escapeHtml(title)+'</h1>';
  html+='<p class="s-intro-text">'+escapeHtml(text)+'</p>';
  if(privacy){
    html+='<div class="s-help">'+escapeHtml(privacy)+'</div>';
  }
  html+='</div>';
  c.innerHTML=html;
  var nav=qs('nav');
  if(nav){
    nav.innerHTML='<button class="s-btn s-btn-next" id="btnStart">Start</button>';
    var btn=qs('btnStart');
    if(btn)btn.addEventListener('click',function(){
      state.started=true;
      state.currentIdx=0;
      render();
    });
  }
  setText('progressText','');
  qs('progressBar').style.width='0%';
}
function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/[&<>\"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function render(){
  showError('');
  showAffirm('');
  var s=state.survey;
  if(!s){showError('Survey not found.');return;}
  var logoEl=qs('brandLogo'),nameEl=qs('brandName');
  if(logoEl){
    if(s.brand_logo_url){
      logoEl.src=s.brand_logo_url;
      logoEl.style.display='block';
    }else{
      logoEl.style.display='none';
    }
  }
  if(nameEl){
    nameEl.textContent=s.brand_name||s.brand_slug||'';
  }
  loadFoot();
  bindModeToggle();
  if(!state.started||state.currentIdx<0){
    renderIntro();
    return;
  }
  var qsList=state.questions||[];
  if(!qsList.length){
    showError('This survey has no questions yet.');
    return;
  }
  if(state.currentIdx>=qsList.length){
    renderThankYou();
    return;
  }
  var idx=state.currentIdx;
  var q=qsList[idx];
  var total=qsList.length;
  var answeredCount=Object.keys(state.values).length;
  var progress=Math.max(0,Math.min(100,Math.round(((idx)/total)*100)));
  qs('progressBar').style.width=progress+'%';
  setText('progressText','Question '+(idx+1)+' of '+total);
  renderQuestion(q,idx,total);
}
function renderThankYou(){
  var s=state.survey||{};
  var title=s.thank_you_title||'Thank you';
  var text=s.thank_you_text||'Your feedback has been received.';
  var c=qs('card');
  if(!c)return;
  var html='<div class="s-thank"><h2>'+escapeHtml(title)+'</h2><p>'+escapeHtml(text)+'</p></div>';
  c.innerHTML=html;
  var nav=qs('nav');
  if(nav)nav.innerHTML='';
  qs('progressBar').style.width='100%';
  setText('progressText','Done');
}
function renderQuestion(q,idx,total){
  var c=qs('card');
  if(!c)return;
  var prompt=q.prompt||'Question';
  var help=q.help_text||'';
  var required=!!q.required;
  var value=state.values[q.id];
  var html='';
  html+='<div class="s-q">';
  html+='<p class="s-prompt'+(prompt.length>90?' s-prompt-long':'')+'">'+escapeHtml(prompt)+(required?'<span class="req">*</span>':'')+'</p>';
  if(help)html+='<p class="s-help">'+escapeHtml(help)+'</p>';
  html+='<div class="s-input">';
  if(q.type==='nps_0_10'){
    html+=renderNpsInput(q,value);
  }else if(q.type==='rating_1_5'||q.type==='csat_smiley'||q.type==='star_rating'){
    html+=renderScaleInput(q,value);
  }else if(q.type==='yes_no'){
    html+=renderYesNoInput(q,value);
  }else if(q.type==='single_select'){
    html+=renderSingleSelectInput(q,value);
  }else if(q.type==='multi_select'){
    html+=renderMultiSelectInput(q,value);
  }else if(q.type==='long_text'){
    html+=renderLongTextInput(q,value);
  }else{
    html+=renderShortTextInput(q,value);
  }
  html+='</div></div>';
  c.innerHTML=html;
  bindInputHandlers(q);
  var nav=qs('nav');
  if(nav){
    var prevDisabled=idx===0;
    var isLast=idx===total-1;
    var prevHtml='<button class="s-btn s-btn-prev" id="btnPrev"'+(prevDisabled?' disabled':'')+'>Back</button>';
    var nextLabel=isLast?'Submit':'Next';
    nav.innerHTML=prevHtml+'<button class="s-btn s-btn-next" id="btnNext">'+nextLabel+'</button>';
    var prevBtn=qs('btnPrev'),nextBtn=qs('btnNext');
    if(prevBtn&&!prevDisabled){
      prevBtn.addEventListener('click',function(){
        state.currentIdx=Math.max(0,state.currentIdx-1);
        render();
      });
    }
    if(nextBtn){
      nextBtn.addEventListener('click',function(){
        handleNext(q,isLast);
      });
    }
  }
}
function renderNpsInput(q,value){
  var sel=typeof value==='number'?value:null;
  var html='<div class="s-choice-grid cols-11">';
  for(var i=0;i<=10;i++){
    var cls='s-choice';
    if(sel===i){
      if(i<=6)cls+=' nps-red active';
      else if(i<=8)cls+=' nps-amber active';
      else cls+=' active';
    }else{
      if(i<=6)cls+=' nps-red';
      else if(i<=8)cls+=' nps-amber';
    }
    html+='<button class="'+cls+'" data-nps="'+i+'">'+i+'</button>';
  }
  html+='</div><div class="s-nps-labels"><span>Not at all likely</span><span>Extremely likely</span></div>';
  return html;
}
function renderScaleInput(q,value){
  var sel=typeof value==='number'?value:null;
  var max=5;
  var mode=q.type;
  var html='<div class="s-choice-grid cols-5">';
  for(var i=1;i<=max;i++){
    var cls='s-choice';
    if(mode==='csat_smiley')cls+=' big-emoji';
    if(mode==='star_rating')cls+=' star';
    if(sel===i)cls+=' active';
    var label=''+i;
    if(mode==='csat_smiley'){
      label=['😡','🙁','😐','🙂','😍'][i-1];
    }else if(mode==='star_rating'){
      label='★'.repeat(i);
    }
    html+='<button class="'+cls+'" data-scale="'+i+'">'+label+'</button>';
  }
  html+='</div>';
  return html;
}
function renderYesNoInput(q,value){
  var sel=value===true?'yes':value===false?'no':null;
  var html='<div class="s-choice-grid cols-2">';
  html+='<button class="s-choice'+(sel==='yes'?' active':'')+'" data-yesno="yes">Yes</button>';
  html+='<button class="s-choice'+(sel==='no'?' active':'')+'" data-yesno="no">No</button>';
  html+='</div>';
  return html;
}
function renderSingleSelectInput(q,value){
  var opts=q.options||[];
  var html='<div class="s-choice-grid cols-2">';
  opts.forEach(function(o){
    var v=o.value||o;
    var label=o.label||o;
    var active=value===v?' active':'';
    html+='<button class="s-choice left-align'+active+'" data-single="'+escapeAttr(v)+'">'+escapeHtml(label)+'</button>';
  });
  html+='</div>';
  return html;
}
function renderMultiSelectInput(q,value){
  var vals=Array.isArray(value)?value:[];
  var opts=q.options||[];
  var html='<div class="s-choice-grid cols-2">';
  opts.forEach(function(o){
    var v=o.value||o;
    var label=o.label||o;
    var active=vals.indexOf(v)!==-1?' active':'';
    html+='<button class="s-choice left-align'+active+'" data-multi="'+escapeAttr(v)+'">'+escapeHtml(label)+'</button>';
  });
  html+='</div>';
  return html;
}
function renderShortTextInput(q,value){
  var ph=q.placeholder||'Type your answer';
  return '<input class="s-text-input" type="text" id="qInput" value="'+escapeAttr(value||'')+'" placeholder="'+escapeAttr(ph)+'">';
}
function renderLongTextInput(q,value){
  var ph=q.placeholder||'Tell us more';
  return '<textarea class="s-text-input" id="qInput" placeholder="'+escapeAttr(ph)+'">'+escapeHtml(value||'')+'</textarea>';
}
function escapeAttr(str){
  if(str==null)return '';
  return String(str).replace(/["']/g,function(c){
    return c==='\"'?'&quot;':'&#39;';
  });
}
function bindInputHandlers(q){
  var card=qs('card');
  if(!card)return;
  card.querySelectorAll('[data-nps]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=parseInt(btn.getAttribute('data-nps'),10);
      state.values[q.id]=v;
      render();
    });
  });
  card.querySelectorAll('[data-scale]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=parseInt(btn.getAttribute('data-scale'),10);
      state.values[q.id]=v;
      render();
    });
  });
  card.querySelectorAll('[data-yesno]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=btn.getAttribute('data-yesno')==='yes';
      state.values[q.id]=v;
      render();
    });
  });
  card.querySelectorAll('[data-single]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=btn.getAttribute('data-single');
      state.values[q.id]=v;
      render();
    });
  });
  card.querySelectorAll('[data-multi]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=btn.getAttribute('data-multi');
      var arr=Array.isArray(state.values[q.id])?state.values[q.id].slice():[];
      var idx=arr.indexOf(v);
      if(idx===-1)arr.push(v);else arr.splice(idx,1);
      state.values[q.id]=arr;
      render();
    });
  });
  var input=qs('qInput');
  if(input){
    input.addEventListener('input',function(){
      state.values[q.id]=input.value;
    });
  }
}
function handleNext(q,isLast){
  var v=state.values[q.id];
  if(q.required){
    if(v==null||(typeof v==='string'&&v.trim()==='')||(Array.isArray(v)&&!v.length)){
      showError('Please answer this question before continuing.');
      return;
    }
  }
  showError('');
  if(isLast){
    submitSurvey();
  }else{
    state.currentIdx++;
    render();
  }
}
function submitSurvey(){
  var s=state.survey||{};
  var payload={
    token:token,
    survey_id:s.id,
    answers:state.values
  };
  var btn=qs('btnNext');
  if(btn){
    btn.disabled=true;
    btn.textContent='Submitting...';
  }
  GoNoGoAPI.cxSubmitSurvey(payload).then(function(ok){
    if(!ok)throw new Error('Submit failed');
    renderThankYou();
    showAffirm('');
  }).catch(function(e){
    showError('Could not submit your answers. Please try again.');
    if(btn){
      btn.disabled=false;
      btn.textContent='Submit';
    }
  });
}
function init(){
  parseToken();
  if(!token){
    showError('Missing survey token.');
    return;
  }
  GoNoGoAPI.cx.publicGetSurvey(token).then(function(res){
    if(!res||!res.survey){
      showError('Survey not available.');
      return;
    }
    state.survey=res.survey;
    state.questions=res.questions||[];
    state.mode=res.survey&&res.survey.party_mode_default?'party':'classic';
    applyBrandTheme();
    if(state.mode==='party')document.body.classList.add('party-mode');
    render();
  }).catch(function(e){
    showError('Could not load this survey.');
  });
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
