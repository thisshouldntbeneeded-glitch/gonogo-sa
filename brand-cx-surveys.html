<!DOCTYPE html>
<html lang="en-ZA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>GoNoGo — CX Surveys</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.cx-table{width:100%;border-collapse:collapse;background:var(--surface-2);border:1px solid var(--border-primary);border-radius:var(--radius-md);overflow:hidden}
.cx-table th,.cx-table td{padding:var(--space-3) var(--space-4);text-align:left;font-size:13px;border-bottom:1px solid var(--border-primary)}
.cx-table th{background:var(--surface-3);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary)}
.cx-table tr:last-child td{border-bottom:none}
.cx-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.cx-b-draft{background:rgba(148,163,184,.2);color:#cbd5e1}
.cx-b-active{background:rgba(34,197,94,.18);color:#4ade80}
.cx-b-published{background:rgba(34,197,94,.18);color:#4ade80}
.cx-b-paused{background:rgba(234,179,8,.18);color:#fbbf24}
.cx-b-archived{background:rgba(100,116,139,.18);color:#94a3b8}
</style>
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main" id="brand-content" style="display:none;">
    <div class="admin-header">
      <div>
        <h1 class="admin-title"><i class="fa-solid fa-clipboard-list" style="color:var(--green);margin-right:var(--space-2);"></i> CX Surveys</h1>
        <p class="text-sm text-secondary">Internal customer-feedback surveys. Responses stay private to your brand.</p>
      </div>
      <div style="display:flex;gap:var(--space-2)">
        <a href="brand-cx-survey-edit.html" class="btn btn-sm" style="background:var(--green);color:#fff;border:none"><i class="fa-solid fa-plus"></i> New survey</a>
      </div>
    </div>

    <div id="surveys-container">
      <div class="card" style="text-align:center;padding:var(--space-8)"><i class="fa-solid fa-spinner fa-spin"></i> <span class="text-sm text-muted">Loading…</span></div>
    </div>

    <div style="padding:var(--space-6) 0;text-align:center;">
      <p class="text-xs text-muted">&copy; 2026 GoNoGo &mdash; CX Suite (internal only)</p>
    </div>
  </main>
</div>

<script src="data/helpers.js"></script>
<script src="components.js"></script>
<script src="api.js"></script>
<script>
Components.initTheme();
document.getElementById('sidebar-container').innerHTML = Components.renderBrandSidebar('cx-surveys');

var esc = Components.escapeHTML.bind(Components);

if (Components.checkBrandAuth()) init();

async function init() {
  var user = Components.getBrandUser();
  if (!user) return;
  document.getElementById('brand-content').style.display = '';
  document.getElementById('sidebar-container').innerHTML = Components.renderBrandSidebar('cx-surveys');
  await loadList();
}

async function loadList() {
  var container = document.getElementById('surveys-container');
  try {
    var rows = await GoNoGoAPI.cx.listSurveys();
    if (!rows || !rows.length) {
      container.innerHTML = '<div class="card" style="text-align:center;padding:var(--space-8)">' +
        '<i class="fa-solid fa-clipboard-list" style="font-size:32px;color:var(--text-muted);margin-bottom:var(--space-3)"></i>' +
        '<p class="text-sm text-muted">No surveys yet. Create your first one to start collecting private feedback.</p>' +
        '<a href="brand-cx-survey-edit.html" class="btn btn-sm" style="background:var(--green);color:#fff;border:none;margin-top:var(--space-3)"><i class="fa-solid fa-plus"></i> New survey</a></div>';
      return;
    }
    var html = '<table class="cx-table"><thead><tr><th>Name</th><th>Status</th><th>Responses</th><th>Links</th><th>Updated</th><th></th></tr></thead><tbody>';
    rows.forEach(function(r){
      html += '<tr><td><strong>' + esc(r.name) + '</strong><div class="text-xs text-muted">/' + esc(r.slug) + '</div></td>' +
        '<td><span class="cx-badge cx-b-' + r.status + '">' + esc(r.status) + '</span></td>' +
        '<td>' + (r.response_count || 0) + '</td>' +
        '<td>' + (r.link_count || 0) + '</td>' +
        '<td class="text-xs text-muted">' + fmtDate(r.updated_at) + '</td>' +
        '<td style="text-align:right"><a href="brand-cx-survey-edit.html?id=' + encodeURIComponent(r.id) + '" class="btn btn-sm">Edit</a></td></tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="card" style="padding:var(--space-5);color:var(--red)">Could not load surveys: ' + esc(e.message || 'error') + '</div>';
  }
}

function fmtDate(s){ if(!s) return ''; var d = new Date(s); return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
</script>
</body>
</html>
