<meta name="generator" content="Perplexity Computer">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
<title>GoNoGo SA — Brand Insights</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    <main class="admin-main" id="brand-content" style="display:none;">
      <div class="admin-header">
        <div>
          <h1 class="admin-title"><i class="fa-solid fa-chart-line" style="color:var(--green);margin-right:var(--space-2);"></i> Insights</h1>
          <p class="text-sm text-secondary" id="insights-subtitle">Trends &amp; industry comparison</p>
        </div>
      </div>

      <!-- Row 1: Score history + Sentiment -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-6);">
        <div class="card">
          <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">
            <i class="fa-solid fa-clock-rotate-left" style="color:var(--blue);margin-right:var(--space-2);"></i>
            Rating Over Time
          </h3>
          <div style="height:260px;"><canvas id="score-history-chart"></canvas></div>
          <p class="text-xs text-muted" style="margin-top:var(--space-3);text-align:center;">Historical tracking begins from your first login. Future data points will appear here.</p>
        </div>
        <div class="card">
          <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">
            <i class="fa-solid fa-face-smile" style="color:var(--green);margin-right:var(--space-2);"></i>
            Review Sentiment
          </h3>
          <div style="height:260px;"><canvas id="sentiment-chart"></canvas></div>
        </div>
      </div>

      <!-- Row 2: Industry comparison -->
      <div class="card" style="margin-bottom:var(--space-6);">
        <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">
          <i class="fa-solid fa-ranking-star" style="color:var(--orange);margin-right:var(--space-2);"></i>
          Industry Comparison
        </h3>
        <div style="height:320px;"><canvas id="industry-chart"></canvas></div>
      </div>

      <!-- Row 3: Industry table + Strengths/Concerns -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-6);">
        <div class="card">
          <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);">
            <i class="fa-solid fa-table-list" style="color:var(--blue);margin-right:var(--space-2);"></i>
            Industry Rankings
          </h3>
          <div id="industry-table" style="overflow-x:auto;"></div>
        </div>
        <div>
          <div class="card" style="margin-bottom:var(--space-6);">
            <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);color:var(--green-text);">
              <i class="fa-solid fa-circle-check" style="margin-right:var(--space-2);"></i>
              Key Strengths
            </h3>
            <ul id="strengths-list" style="list-style:none;display:flex;flex-direction:column;gap:var(--space-2);"></ul>
          </div>
          <div class="card">
            <h3 class="text-sm font-semibold" style="margin-bottom:var(--space-4);color:var(--orange-text);">
              <i class="fa-solid fa-triangle-exclamation" style="margin-right:var(--space-2);"></i>
              Key Concerns
            </h3>
            <ul id="concerns-list" style="list-style:none;display:flex;flex-direction:column;gap:var(--space-2);"></ul>
          </div>
        </div>
      </div>

      <div style="padding:var(--space-6) 0;text-align:center;">
        <p class="text-xs text-muted">&copy; 2026 GoNoGo South Africa &mdash; Brand Portal</p>
      </div>
    </main>
  </div>

  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components.js"></script>
  <script src="api.js"></script>

  <script>
    Components.initTheme();
    document.getElementById('sidebar-container').innerHTML = Components.renderBrandSidebar('insights');

    if (Components.checkBrandAuth()) {
      initBrandPage();
    }

    async function initBrandPage() {
      var user = Components.getBrandUser();
      if (!user) return;

      document.getElementById('brand-content').style.display = '';
      document.getElementById('sidebar-container').innerHTML = Components.renderBrandSidebar('insights');

      var brandSlug = user.brand_slug;

      // Fetch all data
      var data = await GoNoGoAPI.getBrandData(brandSlug);
      if (!data) {
        document.getElementById('brand-content').innerHTML =
          '<div class="card" style="text-align:center;padding:var(--space-10);">' +
            '<i class="fa-solid fa-circle-exclamation" style="font-size:48px;color:var(--red);margin-bottom:var(--space-4);"></i>' +
            '<h2>Brand Not Found</h2>' +
          '</div>';
        return;
      }

      var brand = data.normalized;
      var raw = data.raw;
      document.getElementById('insights-subtitle').textContent = 'Trends & industry comparison for ' + brand.name;

      var results = await Promise.all([
        GoNoGoAPI.getBrandReviews(brand.name),
        GoNoGoAPI.getBrandsInCategory(raw.category_slug)
      ]);

      var reviews = results[0];
      var peers = results[1];

      var tc = Components._getChartThemeColors();

      // ============================
      // 1. Score History (single point)
      // ============================
      var today = new Date().toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
      new Chart(document.getElementById('score-history-chart'), {
        type: 'line',
        data: {
          labels: [today],
          datasets: [{
            label: brand.name + ' Score',
            data: [brand.overallScore],
            borderColor: '#11a551',
            backgroundColor: 'rgba(17,165,81,0.1)',
            borderWidth: 3,
            pointBackgroundColor: '#11a551',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 8,
            pointHoverRadius: 10,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              min: 0, max: 100,
              grid: { color: tc.gridColor },
              ticks: { color: tc.tickColor, font: { family: 'Inter', size: 11 }, stepSize: 20 }
            },
            x: {
              grid: { display: false },
              ticks: { color: tc.tickColor, font: { family: 'Inter', size: 11 } }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: tc.tooltipBg, titleColor: tc.tooltipTitle, bodyColor: tc.tooltipBody,
              borderColor: tc.tooltipBorder, borderWidth: 1, cornerRadius: 8, padding: 10,
              callbacks: {
                label: function(ctx) { return 'Score: ' + ctx.raw + '/100'; }
              }
            }
          }
        }
      });

      // ============================
      // 2. Sentiment Donut
      // ============================
      var goCount = reviews.filter(function(r) { var v = (r.verdict || '').toUpperCase(); return v === 'GO' || v === 'GO WITH CAUTION' || v === 'CAUTION' || v === 'TOP PERFORMER'; }).length;
      var nogoCount = reviews.filter(function(r) { return r.verdict && r.verdict.toUpperCase() === 'NOGO'; }).length;
      var noVerdict = reviews.length - goCount - nogoCount;

      var sentimentLabels = [];
      var sentimentData = [];
      var sentimentColors = [];
      if (goCount > 0) { sentimentLabels.push('Go'); sentimentData.push(goCount); sentimentColors.push('#11a551'); }
      if (nogoCount > 0) { sentimentLabels.push('NoGo'); sentimentData.push(nogoCount); sentimentColors.push('#e74c3c'); }
      if (noVerdict > 0) { sentimentLabels.push('No Verdict'); sentimentData.push(noVerdict); sentimentColors.push('#666666'); }

      if (reviews.length === 0) {
        sentimentLabels = ['No Reviews'];
        sentimentData = [1];
        sentimentColors = ['#333333'];
      }

      new Chart(document.getElementById('sentiment-chart'), {
        type: 'doughnut',
        data: {
          labels: sentimentLabels,
          datasets: [{
            data: sentimentData,
            backgroundColor: sentimentColors,
            borderWidth: 0,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '65%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: tc.legendColor, font: { family: 'Inter', size: 11 }, usePointStyle: true, pointStyle: 'circle', padding: 16 }
            },
            tooltip: {
              backgroundColor: tc.tooltipBg, titleColor: tc.tooltipTitle, bodyColor: tc.tooltipBody,
              borderColor: tc.tooltipBorder, borderWidth: 1, cornerRadius: 8, padding: 10,
              callbacks: {
                label: function(ctx) {
                  var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                  var pct = total > 0 ? Math.round((ctx.raw / total) * 100) : 0;
                  return ctx.label + ': ' + ctx.raw + ' (' + pct + '%)';
                }
              }
            }
          }
        }
      });

      // ============================
      // 3. Industry Comparison Bar
      // ============================
      var peerNames = peers.map(function(p) { return p.name; });
      var peerScores = peers.map(function(p) { return p.gonogo_score; });
      var barColors = peers.map(function(p) {
        return p.slug === brandSlug ? '#11a551' : 'rgba(59,130,246,0.5)';
      });
      var barBorders = peers.map(function(p) {
        return p.slug === brandSlug ? '#11a551' : 'rgba(59,130,246,0.7)';
      });

      new Chart(document.getElementById('industry-chart'), {
        type: 'bar',
        data: {
          labels: peerNames,
          datasets: [{
            label: 'GoNoGo Score',
            data: peerScores,
            backgroundColor: barColors,
            borderColor: barBorders,
            borderWidth: 1,
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: peers.length > 8 ? 'y' : 'x',
          scales: {
            x: {
              grid: { color: peers.length > 8 ? tc.gridColor : 'transparent' },
              ticks: { color: tc.tickColor, font: { family: 'Inter', size: 10 }, maxRotation: 45 },
              max: peers.length > 8 ? 100 : undefined
            },
            y: {
              grid: { color: peers.length > 8 ? 'transparent' : tc.gridColor },
              ticks: { color: tc.tickColor, font: { family: 'Inter', size: 10 }, stepSize: 20 },
              max: peers.length > 8 ? undefined : 100,
              min: 0
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: tc.tooltipBg, titleColor: tc.tooltipTitle, bodyColor: tc.tooltipBody,
              borderColor: tc.tooltipBorder, borderWidth: 1, cornerRadius: 8, padding: 10,
              callbacks: {
                label: function(ctx) {
                  var suffix = peers[ctx.dataIndex] && peers[ctx.dataIndex].slug === brandSlug ? ' (Your Brand)' : '';
                  return 'Score: ' + ctx.raw + '/100' + suffix;
                }
              }
            }
          }
        }
      });

      // ============================
      // 4. Industry Rankings Table
      // ============================
      var tableHtml = '<table class="data-table" style="width:100%;"><thead><tr>' +
        '<th style="text-align:center;width:40px;">#</th>' +
        '<th style="text-align:left;">Brand</th>' +
        '<th style="text-align:center;">Score</th>' +
        '<th style="text-align:center;">Verdict</th>' +
        '</tr></thead><tbody>';

      peers.forEach(function(p, idx) {
        var isThis = p.slug === brandSlug;
        var rowStyle = isThis ? 'background:var(--green-bg);' : '';
        var nameStyle = isThis ? 'font-weight:700;color:var(--green-text);' : 'font-weight:500;';
        var verdictLabel = p.verdict || getVerdictFromScore(p.gonogo_score);
        var color = getScoreColor(p.gonogo_score);

        tableHtml += '<tr style="' + rowStyle + '">' +
          '<td style="text-align:center;font-weight:700;font-size:var(--text-sm);color:var(--text-muted);">' + (idx + 1) + '</td>' +
          '<td style="' + nameStyle + 'font-size:var(--text-sm);">' +
            Components.escapeHTML(p.name) +
            (isThis ? ' <span style="font-size:10px;background:var(--green-dim);color:var(--green-text);padding:1px 6px;border-radius:4px;margin-left:4px;">You</span>' : '') +
          '</td>' +
          '<td style="text-align:center;">' +
            '<span style="display:inline-block;padding:2px 10px;border-radius:var(--radius-sm);background:' + color + '15;color:' + color + ';font-weight:700;font-size:var(--text-sm);">' + p.gonogo_score + '</span>' +
          '</td>' +
          '<td style="text-align:center;">' + Components.renderVerdictBadge(verdictLabel) + '</td>' +
        '</tr>';
      });

      tableHtml += '</tbody></table>';
      document.getElementById('industry-table').innerHTML = tableHtml;

      // ============================
      // 5. Strengths & Concerns
      // ============================
      var strengthsHtml = '';
      (brand.strengths || []).forEach(function(s) {
        strengthsHtml += '<li style="display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-secondary);">' +
          '<i class="fa-solid fa-check" style="color:var(--green);margin-top:3px;flex-shrink:0;"></i> ' + Components.escapeHTML(s) +
        '</li>';
      });
      document.getElementById('strengths-list').innerHTML = strengthsHtml || '<li class="text-sm text-muted">No strengths listed</li>';

      var concernsHtml = '';
      (brand.concerns || []).forEach(function(c) {
        concernsHtml += '<li style="display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-secondary);">' +
          '<i class="fa-solid fa-exclamation" style="color:var(--orange);margin-top:3px;flex-shrink:0;width:14px;text-align:center;"></i> ' + Components.escapeHTML(c) +
        '</li>';
      });
      document.getElementById('concerns-list').innerHTML = concernsHtml || '<li class="text-sm text-muted">No concerns listed</li>';
    }
  </script>
  <style>
    @media (max-width: 768px) {
      .admin-main > div:nth-child(2) { grid-template-columns: 1fr !important; }
      .admin-main > div:nth-child(4) { grid-template-columns: 1fr !important; }
    }
  </style>
</body>
</html>
