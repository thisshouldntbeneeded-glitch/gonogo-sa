<!DOCTYPE html>
<html lang="en-ZA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoNoGo SA — Public Users</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    <main class="admin-main" id="admin-content" style="display:none;">
      <div class="admin-header">
        <div>
          <h1 class="admin-title"><i class="fa-solid fa-users" style="color:var(--green)"></i> Public Users</h1>
          <p class="text-sm text-secondary">Registered accounts across GoNoGo</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="exportUsersCSV()">
          <i class="fa-solid fa-download"></i> Export CSV
        </button>
      </div>

      <!-- KPI Cards -->
      <div class="kpi-grid" style="margin-bottom:var(--space-6);" id="user-kpis">
        <div class="kpi-card"><div class="kpi-label">Loading...</div></div>
      </div>

      <!-- Persona Insights -->
      <div class="card" style="margin-bottom:var(--space-6);" id="persona-insights" hidden>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4)">
          <h3 style="font-size:var(--text-base);font-weight:700"><i class="fa-solid fa-fingerprint" style="color:var(--green);margin-right:var(--space-2)"></i>Consumer Persona Insights</h3>
          <span class="text-xs text-muted" id="persona-adoption-label"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)">
          <div>
            <div class="text-xs text-muted" style="font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:var(--space-3)">Top Priority Categories</div>
            <div id="cat-bars"></div>
          </div>
          <div>
            <div class="text-xs text-muted" style="font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:var(--space-3)">Persona Distribution</div>
            <div id="persona-dist"></div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="card" style="margin-bottom:var(--space-6);">
        <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center;">
          <div class="form-group" style="margin-bottom:0;flex:1;min-width:200px;">
            <input type="text" id="user-search" placeholder="Search by name or email..." oninput="filterUsers()">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <select id="filter-region" onchange="filterUsers()">
              <option value="">All Regions</option>
              <option value="za">South Africa</option>
              <option value="uk">United Kingdom</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <select id="filter-status" onchange="filterUsers()">
              <option value="">All Statuses</option>
              <option value="confirmed">Confirmed</option>
              <option value="unconfirmed">Unconfirmed</option>
              <option value="banned">Banned</option>
            </select>
          </div>
          <span class="text-xs text-muted" id="user-count-label"></span>
        </div>
      </div>

      <!-- Users Table -->
      <div class="card" style="overflow-x:auto;">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th style="cursor:pointer" onclick="sortUsers('display_name')">Name <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('email')">Email <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('region')">Region <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('email_confirmed_at')">Confirmed <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('last_sign_in_at')">Last Sign In <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('created_at')">Joined <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th style="cursor:pointer" onclick="sortUsers('persona')">Persona <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
        <div id="users-empty" style="display:none;text-align:center;padding:var(--space-8);">
          <i class="fa-solid fa-user-slash" style="font-size:36px;color:var(--text-muted);margin-bottom:var(--space-3);display:block"></i>
          <p class="text-sm text-muted">No registered users yet</p>
        </div>
      </div>

      <div style="padding:var(--space-6) 0;text-align:center;">
        <p class="text-xs text-muted">&copy; 2026 GoNoGo South Africa</p>
      </div>
    </main>
  </div>

  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="components.js"></script>
  <script src="api.js"></script>

  <script>
    document.getElementById('sidebar-container').innerHTML = Components.renderAdminSidebar('users');

    if (Components.checkAdminAuth()) {
      initUsersPage();
    }

    var allUsers = [];
    var filteredUsers = [];
    var currentSort = { field: 'created_at', dir: 'desc' };

    async function initUsersPage() {
      document.getElementById('admin-content').style.display = 'block';

      try {
        allUsers = await GoNoGoAPI.supabaseRequest(
          'user_accounts?select=id,email,display_name,region,email_confirmed_at,last_sign_in_at,created_at,banned_until,meta_display_name,meta_region,priorities,persona,persona_set_at&order=created_at.desc'
        );
      } catch (e) {
        console.error('Error loading users:', e);
        allUsers = [];
      }

      renderKPIs();
      renderPersonaInsights();
      filterUsers();
    }

    function renderKPIs() {
      var total = allUsers.length;
      var confirmed = allUsers.filter(function(u) { return u.email_confirmed_at; }).length;
      var unconfirmed = total - confirmed;
      var za = allUsers.filter(function(u) { return (u.region || u.meta_region) === 'za'; }).length;
      var uk = allUsers.filter(function(u) { return (u.region || u.meta_region) === 'uk'; }).length;

      // Recent (last 7 days)
      var weekAgo = new Date();
      weekAgo.setDate(weekAgo.getDate() - 7);
      var recent = allUsers.filter(function(u) { return new Date(u.created_at) > weekAgo; }).length;

      // Active (signed in within last 30 days)
      var monthAgo = new Date();
      monthAgo.setDate(monthAgo.getDate() - 30);
      var active = allUsers.filter(function(u) { return u.last_sign_in_at && new Date(u.last_sign_in_at) > monthAgo; }).length;

      document.getElementById('user-kpis').innerHTML =
        '<div class="kpi-card">' +
          '<div class="kpi-value">' + total + '</div>' +
          '<div class="kpi-label">Total Users</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value" style="color:var(--green)">' + confirmed + '</div>' +
          '<div class="kpi-label">Confirmed</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value" style="color:var(--yellow,#f59e0b)">' + unconfirmed + '</div>' +
          '<div class="kpi-label">Unconfirmed</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value">' + recent + '</div>' +
          '<div class="kpi-label">New (7 days)</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value">' + active + '</div>' +
          '<div class="kpi-label">Active (30 days)</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value">' +
            '<span title="South Africa">\ud83c\uddff\ud83c\udde6 ' + za + '</span>' +
            '<span style="margin:0 8px;color:var(--text-muted)">|</span>' +
            '<span title="United Kingdom">\ud83c\uddec\ud83c\udde7 ' + uk + '</span>' +
          '</div>' +
          '<div class="kpi-label">By Region</div>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<div class="kpi-value" style="color:var(--green)">' + allUsers.filter(function(u) { return u.persona; }).length + '</div>' +
          '<div class="kpi-label">Persona Set</div>' +
        '</div>';
    }

    function renderPersonaInsights() {
      var withPersona = allUsers.filter(function(u) { return u.priorities && u.priorities.length >= 3; });
      if (withPersona.length === 0) return;
      document.getElementById('persona-insights').hidden = false;
      var total = allUsers.length;
      document.getElementById('persona-adoption-label').textContent = withPersona.length + ' of ' + total + ' users (' + Math.round(withPersona.length / total * 100) + '% adoption)';

      // Category frequency (count how often each cat appears as a priority)
      var catCounts = {};
      var catFirst = {};
      var catNames = { product_value: 'Product Value', innovation: 'Innovation', customer_support: 'Customer Support', compliance: 'Compliance', sustainability: 'Sustainability', satisfaction: 'Customer Satisfaction' };
      Object.keys(catNames).forEach(function(k) { catCounts[k] = 0; catFirst[k] = 0; });
      withPersona.forEach(function(u) {
        u.priorities.forEach(function(k) { catCounts[k] = (catCounts[k] || 0) + 1; });
        catFirst[u.priorities[0]] = (catFirst[u.priorities[0]] || 0) + 1;
      });
      var maxCount = Math.max.apply(null, Object.values(catCounts)) || 1;
      var catArr = Object.keys(catNames).map(function(k) { return { key: k, name: catNames[k], count: catCounts[k] || 0, first: catFirst[k] || 0 }; });
      catArr.sort(function(a, b) { return b.count - a.count; });
      document.getElementById('cat-bars').innerHTML = catArr.map(function(c) {
        var pct = Math.round(c.count / maxCount * 100);
        return '<div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-2)">' +
          '<span class="text-xs" style="width:120px;text-align:right;color:var(--text-secondary);font-weight:500">' + c.name + '</span>' +
          '<div style="flex:1;height:6px;background:var(--bg-primary);border-radius:3px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:var(--green);border-radius:3px"></div></div>' +
          '<span class="text-xs" style="width:50px;color:var(--text-muted)">' + c.count + ' <span style="opacity:0.5">(' + c.first + ' #1)</span></span>' +
        '</div>';
      }).join('');

      // Persona distribution
      var personaCounts = {};
      withPersona.forEach(function(u) {
        var p = u.persona || 'Unknown';
        personaCounts[p] = (personaCounts[p] || 0) + 1;
      });
      var pArr = Object.keys(personaCounts).map(function(k) { return { name: k, count: personaCounts[k] }; });
      pArr.sort(function(a, b) { return b.count - a.count; });
      document.getElementById('persona-dist').innerHTML = pArr.map(function(p) {
        var pct = Math.round(p.count / withPersona.length * 100);
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)">' +
          '<span class="text-sm" style="font-weight:500">' + Components.escapeHTML(p.name) + '</span>' +
          '<span class="text-xs text-muted">' + p.count + ' (' + pct + '%)</span>' +
        '</div>';
      }).join('');
    }

    function filterUsers() {
      var search = (document.getElementById('user-search').value || '').toLowerCase();
      var region = document.getElementById('filter-region').value;
      var status = document.getElementById('filter-status').value;

      filteredUsers = allUsers.filter(function(u) {
        var name = (u.display_name || u.meta_display_name || '').toLowerCase();
        var email = (u.email || '').toLowerCase();
        var userRegion = u.region || u.meta_region || '';

        if (search && name.indexOf(search) === -1 && email.indexOf(search) === -1) return false;
        if (region && userRegion !== region) return false;

        if (status === 'confirmed' && !u.email_confirmed_at) return false;
        if (status === 'unconfirmed' && u.email_confirmed_at) return false;
        if (status === 'banned' && !u.banned_until) return false;

        return true;
      });

      // Sort
      sortArray(filteredUsers, currentSort.field, currentSort.dir);

      document.getElementById('user-count-label').textContent =
        filteredUsers.length + ' of ' + allUsers.length + ' users';

      renderTable();
    }

    function sortUsers(field) {
      if (currentSort.field === field) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.dir = field === 'created_at' || field === 'last_sign_in_at' || field === 'email_confirmed_at' ? 'desc' : 'asc';
      }
      filterUsers();
    }

    function sortArray(arr, field, dir) {
      arr.sort(function(a, b) {
        var va = a[field] || '';
        var vb = b[field] || '';
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return dir === 'asc' ? -1 : 1;
        if (va > vb) return dir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function renderTable() {
      var tbody = document.getElementById('users-tbody');
      var empty = document.getElementById('users-empty');

      if (filteredUsers.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = filteredUsers.map(function(u) {
        var name = Components.escapeHTML(u.display_name || u.meta_display_name || '—');
        var email = Components.escapeHTML(u.email || '');
        var region = u.region || u.meta_region || '—';
        var regionLabel = region === 'za' ? '\ud83c\uddff\ud83c\udde6 SA' : region === 'uk' ? '\ud83c\uddec\ud83c\udde7 UK' : region;
        var confirmed = u.email_confirmed_at;
        var confirmedLabel = confirmed
          ? '<span style="color:var(--green)" title="' + formatDate(confirmed) + '"><i class="fa-solid fa-circle-check"></i> Yes</span>'
          : '<span style="color:var(--yellow,#f59e0b)"><i class="fa-solid fa-clock"></i> Pending</span>';
        var lastSignIn = u.last_sign_in_at ? timeAgo(u.last_sign_in_at) : '<span class="text-muted">Never</span>';
        var joined = formatDate(u.created_at);

        var statusBadge = '';
        if (u.banned_until) {
          statusBadge = '<span class="badge badge-red">Banned</span>';
        } else if (confirmed) {
          statusBadge = '<span class="badge badge-green">Active</span>';
        } else {
          statusBadge = '<span class="badge badge-yellow">Unconfirmed</span>';
        }

        var personaLabel = u.persona
          ? '<span class="text-xs" style="color:var(--green)" title="Priorities: ' + (u.priorities || []).join(', ') + '">' + Components.escapeHTML(u.persona) + '</span>'
          : '<span class="text-xs text-muted">&mdash;</span>';

        return '<tr>' +
          '<td><strong>' + name + '</strong></td>' +
          '<td class="text-sm">' + email + '</td>' +
          '<td class="text-sm">' + regionLabel + '</td>' +
          '<td class="text-sm">' + confirmedLabel + '</td>' +
          '<td class="text-sm">' + lastSignIn + '</td>' +
          '<td class="text-sm">' + joined + '</td>' +
          '<td class="text-sm">' + personaLabel + '</td>' +
          '<td>' + statusBadge + '</td>' +
        '</tr>';
      }).join('');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      var d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function timeAgo(iso) {
      if (!iso) return '';
      var diff = Date.now() - new Date(iso).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return mins + 'm ago';
      var hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      var days = Math.floor(hours / 24);
      if (days < 30) return days + 'd ago';
      return formatDate(iso);
    }

    function exportUsersCSV() {
      if (filteredUsers.length === 0) {
        Components.showToast('No users to export', 'error');
        return;
      }
      var headers = ['Name', 'Email', 'Region', 'Confirmed', 'Last Sign In', 'Joined', 'Persona', 'Priority 1', 'Priority 2', 'Priority 3', 'Status'];
      var rows = filteredUsers.map(function(u) {
        var name = u.display_name || u.meta_display_name || '';
        var email = u.email || '';
        var region = (u.region || u.meta_region || '').toUpperCase();
        var confirmed = u.email_confirmed_at ? 'Yes' : 'No';
        var lastSignIn = u.last_sign_in_at || '';
        var joined = u.created_at || '';
        var status = u.banned_until ? 'Banned' : (u.email_confirmed_at ? 'Active' : 'Unconfirmed');
        var persona = u.persona || '';
        var p1 = (u.priorities && u.priorities[0]) || '';
        var p2 = (u.priorities && u.priorities[1]) || '';
        var p3 = (u.priorities && u.priorities[2]) || '';
        return [name, email, region, confirmed, lastSignIn, joined, persona, p1, p2, p3, status].map(function(v) {
          return '"' + String(v).replace(/"/g, '""') + '"';
        }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'gonogo-users-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      Components.showToast('CSV exported');
    }
  </script>
</body>
</html>
